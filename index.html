<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hajime no Ippo Ring Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
  /* ══════════════════════════════════════
     DESIGN SYSTEM — RING CLASH PREMIUM
  ══════════════════════════════════════ */
  :root{
    --bg:#04060e;--bg2:#080c18;--bg3:#0d1225;--bg4:#11192e;
    --border:#141e36;--border2:#1e2e52;--border3:#2a4080;
    --text:#f0f4ff;--muted:#3a4d78;--muted2:#6878a8;
    --gold:#b87820;--gold2:#d8a030;--gold3:#f5c848;--gold4:#fff0a0;
    --red:#a80f24;--red2:#cc1228;--red3:#ff2244;
    --green:#00aa48;--green2:#00e060;
    --fd:"Oswald",sans-serif;--fh:"Black Han Sans",sans-serif;--fb:"Rajdhani",sans-serif;
    --radius:18px;--radius-sm:12px;
  }
  /* Style accent tokens per boxer type */
  .sa-balanced{--sa:#4488ff;--sa2:#88bbff;--sa3:rgba(68,136,255,.18);--sa4:rgba(68,136,255,.07);--sag:68,136,255}
  .sa-slugger {--sa:#ff6820;--sa2:#ffb070;--sa3:rgba(255,104,32,.18);--sa4:rgba(255,104,32,.07);--sag:255,104,32}
  .sa-counter {--sa:#bb44ff;--sa2:#ddaaff;--sa3:rgba(187,68,255,.18);--sa4:rgba(187,68,255,.07);--sag:187,68,255}
  .sa-tank    {--sa:#18d880;--sa2:#80ffcc;--sa3:rgba(24,216,128,.18);--sa4:rgba(24,216,128,.07);--sag:24,216,128}
  .sa-speed   {--sa:#ffd020;--sa2:#ffe880;--sa3:rgba(255,208,32,.18);--sa4:rgba(255,208,32,.07);--sag:255,208,32}
  .sa-buff    {--sa:#7070ff;--sa2:#aaaaff;--sa3:rgba(112,112,255,.18);--sa4:rgba(112,112,255,.07);--sag:112,112,255}

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
  body{font-family:var(--fb);font-weight:500}
  #app{width:100vw;height:100dvh;position:relative}

  /* ════════════════════════════════
     KEYFRAMES
  ════════════════════════════════ */
  .view{position:absolute;inset:0;display:flex;flex-direction:column;animation:vIn .3s cubic-bezier(.2,0,.6,1) both}
  @keyframes vIn        {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes hpPulse    {0%,100%{opacity:1}50%{opacity:.38}}
  @keyframes turnBlink  {0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes floatY     {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes bandShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
  @keyframes selPop     {0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
  @keyframes pipPop     {0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
  @keyframes stunShake  {0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  @keyframes logIn      {from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulseGlow  {0%,100%{opacity:.6}50%{opacity:1}}
  @keyframes arenaFlare {0%{opacity:0;transform:scaleX(0)}50%{opacity:1}100%{opacity:0;transform:scaleX(1)}}
  @keyframes ropeSwing  {0%,100%{transform:scaleY(1)}50%{transform:scaleY(.97)}}
  @keyframes shimmerPass{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
  /* Battle action animations */
  @keyframes fcPunchUp  {0%{transform:translateY(0)scale(1)}22%{transform:translateY(-14px)scale(1.08)}65%{transform:translateY(4px)scale(.95)}100%{transform:translateY(0)scale(1)}}
  @keyframes fcPunchDn  {0%{transform:translateY(0)scale(1)}22%{transform:translateY(14px)scale(1.08)}65%{transform:translateY(-4px)scale(.95)}100%{transform:translateY(0)scale(1)}}
  @keyframes fcHit      {0%{transform:translateX(0)}10%{transform:translateX(-14px)}25%{transform:translateX(14px)}42%{transform:translateX(-9px)}58%{transform:translateX(9px)}74%{transform:translateX(-4px)}88%{transform:translateX(4px)}100%{transform:translateX(0)}}
  @keyframes hitFlash   {0%,100%{opacity:0}28%{opacity:.75}}
  @keyframes hitGold    {0%,100%{opacity:0}28%{opacity:.9}}
  @keyframes healFlash  {0%,100%{opacity:0}28%{opacity:.55}}
  @keyframes koFlash    {0%{opacity:0}12%{opacity:1}55%{opacity:.7}100%{opacity:0}}
  @keyframes sigRipple  {0%{transform:scale(.5);opacity:.9}100%{transform:scale(2.5);opacity:0}}
  @keyframes dmgFloat   {0%{opacity:1;transform:translateX(-50%)translateY(0)scale(1)}15%{opacity:1;transform:translateX(-50%)translateY(-20px)scale(1.18)}78%{opacity:.3;transform:translateX(-50%)translateY(-58px)scale(.82)}100%{opacity:0;transform:translateX(-50%)translateY(-78px)scale(.6)}}
  @keyframes logSlide   {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes sigBurst   {0%{transform:scale(1)}18%{transform:scale(1.11)}48%{transform:scale(.95)}74%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes ctrlIn     {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes newBoxerIn {0%{opacity:0;transform:scale(.82)translateY(20px)}55%{opacity:1;transform:scale(1.05)translateY(-5px)}100%{opacity:1;transform:scale(1)translateY(0)}}
  @keyframes cardEnter  {from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

  /* Fight card animation states */
  .fight-card.punching-up {animation:fcPunchUp .42s cubic-bezier(.3,0,.7,1) both!important}
  .fight-card.punching-dn {animation:fcPunchDn .42s cubic-bezier(.3,0,.7,1) both!important}
  .fight-card.taking-hit  {animation:fcHit .4s cubic-bezier(.25,.8,.25,1) both!important}
  .fight-card.sig-burst   {animation:sigBurst .52s cubic-bezier(.3,0,.7,1) both!important}
  .hit-ov{position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;z-index:10}
  .hit-ov.red  {background:rgba(255,40,70,.5);animation:hitFlash .44s ease both}
  .hit-ov.gold {background:rgba(255,220,80,.55);animation:hitGold .58s ease both;box-shadow:inset 0 0 60px rgba(255,200,60,.35)}
  .hit-ov.heal {background:rgba(0,240,100,.32);animation:healFlash .46s ease both}
  .hit-ov.ko   {background:rgba(255,255,255,.9);animation:koFlash .65s ease both}
  /* Signature ripple overlay */
  .sig-ripple{position:absolute;border-radius:50%;border:3px solid var(--gold3);pointer-events:none;z-index:11;animation:sigRipple .7s ease both;width:100%;height:100%;top:0;left:0}
  /* Damage floats */
  .dmg-float{position:absolute;z-index:20;pointer-events:none;font-family:var(--fd);font-weight:700;letter-spacing:.06em;animation:dmgFloat 1.1s cubic-bezier(.25,.8,.25,1) both;transform:translateX(-50%)}
  .dmg-float.crit {font-size:2.6rem;color:#ff2055;text-shadow:0 0 24px rgba(255,32,85,.9),0 0 60px rgba(255,32,85,.4),0 2px 0 rgba(0,0,0,.8)}
  .dmg-float.sig  {font-size:2.3rem;color:var(--gold3);text-shadow:0 0 24px rgba(245,200,72,.9),0 0 60px rgba(245,200,72,.4),0 2px 0 rgba(0,0,0,.8)}
  .dmg-float.norm {font-size:1.8rem;color:#ff8888;text-shadow:0 0 12px rgba(255,136,136,.6),0 2px 0 rgba(0,0,0,.8)}
  .dmg-float.heal {font-size:1.6rem;color:#00f870;text-shadow:0 0 16px rgba(0,248,112,.7)}
  .dmg-float.bleed{font-size:1.3rem;color:#ff5555;text-shadow:0 0 10px rgba(255,85,85,.5)}
  .log-txt.slide{animation:logSlide .3s ease both}
  .ctrl.ctrl-in {animation:ctrlIn .35s ease both}

  /* ════════════════════════════════
     BUTTONS — premium glass style
  ════════════════════════════════ */
  .btn{
    border:1px solid var(--border2);
    background:linear-gradient(160deg,rgba(22,34,70,.95),rgba(10,16,40,.95));
    color:var(--text);border-radius:var(--radius-sm);padding:10px 16px;
    font-family:var(--fd);font-weight:600;letter-spacing:.12em;cursor:pointer;font-size:.85rem;
    transition:transform .16s,box-shadow .16s,border-color .16s,background .16s;
    touch-action:manipulation;min-height:44px;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    user-select:none;-webkit-user-select:none;position:relative;overflow:hidden;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.09),transparent 55%);pointer-events:none;border-radius:inherit}
  .btn::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 50%);pointer-events:none}
  .btn:hover{transform:translateY(-2px);border-color:var(--border3);box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06)}
  .btn:active{transform:translateY(1px)scale(.97)}
  .btn:disabled{opacity:.18;transform:none;cursor:not-allowed;box-shadow:none}
  .btn-p{
    background:linear-gradient(150deg,#e01838,#8c0c1e);
    border-color:#ff2244;
    box-shadow:0 4px 20px rgba(200,16,40,.45),inset 0 1px 0 rgba(255,120,140,.2);
  }
  .btn-p:not(:disabled):hover{background:linear-gradient(150deg,#ff2244,#b01428);box-shadow:0 8px 28px rgba(200,16,40,.7)}
  .btn-sig{
    background:linear-gradient(150deg,#c08818,#6e4800);
    border-color:var(--gold3);color:#1a0e00;
    box-shadow:0 4px 18px rgba(192,136,24,.35),inset 0 1px 0 rgba(255,240,120,.25);
  }
  .btn-sig.live{
    box-shadow:0 0 0 2px var(--gold3),0 5px 22px rgba(192,136,24,.8),0 0 40px rgba(192,136,24,.35);
    animation:pulseGlow 1.2s ease-in-out infinite;
  }
  .btn-sig:not(:disabled):hover{background:linear-gradient(150deg,#e8aa20,#8a5c08);box-shadow:0 8px 28px rgba(200,160,30,.7)}

  /* ════════════════════════════════
     TOAST
  ════════════════════════════════ */
  .toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none}
  .toast{
    background:rgba(6,10,22,.96);border:1px solid var(--border2);border-radius:999px;
    padding:10px 22px;box-shadow:0 6px 30px rgba(0,0,0,.85);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    animation:vIn .2s ease both;font-size:.86rem;white-space:nowrap;letter-spacing:.04em;
  }

  /* ════════════════════════════════
     MENU — cinematic title screen
  ════════════════════════════════ */
  .menu{
    align-items:center;justify-content:center;text-align:center;gap:24px;padding:32px 24px;
    background:
      radial-gradient(ellipse 120% 70% at 50% 115%,rgba(168,12,28,.5),transparent 65%),
      radial-gradient(ellipse 80% 50% at 8% 12%,rgba(68,100,255,.08),transparent 55%),
      radial-gradient(ellipse 60% 40% at 92% 10%,rgba(180,60,255,.06),transparent 50%),
      linear-gradient(180deg,#04060e,#070a18);
  }
  .menu::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:
      repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(168,136,32,.05) 48px),
      repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(168,136,32,.03) 48px);
  }
  .menu::after{content:'';position:absolute;inset:14px;pointer-events:none;border:1px solid rgba(200,136,32,.12);border-radius:24px;box-shadow:inset 0 0 60px rgba(168,12,28,.06)}
  .menu>*{position:relative;z-index:1}
  .menu-logo{display:flex;flex-direction:column;align-items:center;gap:8px}
  .t1{font-family:var(--fh);font-size:clamp(2.8rem,11vw,6.5rem);line-height:.86;letter-spacing:.04em;color:#dde4ff;text-shadow:0 0 80px rgba(180,200,255,.2),0 4px 0 rgba(0,0,0,.95)}
  .t2{
    font-family:var(--fh);font-size:clamp(2.2rem,9vw,5rem);line-height:1;
    background:linear-gradient(135deg,#ff2040,#cc0e28);
    display:inline-block;padding:4px 32px 4px 28px;
    transform:skewX(-6deg);
    box-shadow:8px 8px 0 rgba(0,0,0,.7),0 0 60px rgba(200,16,40,.6),inset 0 1px 0 rgba(255,80,100,.3);
    position:relative;letter-spacing:.06em;
  }
  .t2::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent 55%);pointer-events:none}
  .t3{font-family:var(--fd);font-weight:400;font-size:clamp(1.6rem,6vw,3.5rem);color:var(--muted2);letter-spacing:.3em}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .sub{color:var(--muted);font-size:.82rem;letter-spacing:.1em}
  .gold-rule{
    width:120px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold3),transparent);
    box-shadow:0 0 8px rgba(245,200,72,.4);
  }

  /* ════════════════════════════════
     PANEL
  ════════════════════════════════ */
  .panel{
    margin:10px;border:1px solid var(--border);border-radius:var(--radius);
    background:linear-gradient(180deg,#0a1022,#060c1a);
    padding:12px;overflow:hidden;display:flex;flex-direction:column;gap:10px;
    box-shadow:0 8px 40px rgba(0,0,0,.7);
  }
  .panel-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .panel-title{font-family:var(--fd);font-weight:600;letter-spacing:.16em;font-size:1rem;color:var(--gold2)}
  .tabs{display:flex;gap:8px}
  .tally{display:flex;gap:6px;align-items:center}
  .tally-chip{font-size:.68rem;font-family:var(--fd);letter-spacing:.1em;background:var(--bg3);border:1px solid var(--border2);border-radius:999px;padding:3px 12px;color:var(--muted2)}
  .tally-chip.done{border-color:var(--gold2);color:var(--gold3);box-shadow:0 0 8px rgba(220,160,48,.2)}

  /* ════════════════════════════════
     TCG DECK CARDS
  ════════════════════════════════ */
  .cards{flex:1;overflow-y:auto;overflow-x:hidden;display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));grid-auto-rows:272px;gap:12px;align-content:start;padding-bottom:4px}
  .cards::-webkit-scrollbar{width:3px}.cards::-webkit-scrollbar-track{background:transparent}.cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
  .tcg{
    position:relative;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;
    background:linear-gradient(165deg,#0e1a30 0%,#08101e 60%,#060c18 100%);
    border:1px solid var(--border2);
    box-shadow:0 6px 24px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.04);
    display:flex;flex-direction:column;
    transition:transform .22s cubic-bezier(.25,.8,.25,1),box-shadow .22s,border-color .22s;
    touch-action:manipulation;
  }
  .tcg:hover{transform:translateY(-7px)scale(1.03);border-color:var(--sa,var(--border3));box-shadow:0 20px 48px rgba(0,0,0,.8),0 0 0 1px var(--sa,var(--border3)),0 0 28px var(--sa3,transparent)}
  .tcg:active{transform:translateY(0)scale(.97)}
  .tcg.sel{border-color:var(--sa,var(--red3));box-shadow:0 0 0 2px var(--sa,var(--red3)),0 10px 32px rgba(0,0,0,.7),0 0 44px var(--sa3,rgba(180,12,36,.2))}
  .tcg-band{height:4px;flex-shrink:0;background:linear-gradient(90deg,transparent,var(--sa,#3a4870),var(--sa2,#6070a8),transparent);background-size:250% auto;animation:bandShimmer 4s linear infinite}
  .tcg.sel .tcg-band{animation:bandShimmer 1.4s linear infinite}
  .tcg-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 9px 3px;flex-shrink:0;gap:5px}
  .tcg-type{font-size:.55rem;font-family:var(--fd);font-weight:600;letter-spacing:.15em;border:1px solid var(--sa,var(--border2));color:var(--sa2,var(--muted2));background:rgba(0,0,0,.4);border-radius:999px;padding:2px 9px;white-space:nowrap}
  .tcg-icon-sm{font-size:.88rem;line-height:1;flex-shrink:0}
  .tcg-cost-badge{font-size:.68rem;font-family:var(--fd);font-weight:700;letter-spacing:.06em;background:linear-gradient(135deg,var(--gold2),#7a5c0e);color:#0e0800;border-radius:999px;padding:2px 9px}
  .tcg-art{flex:1;margin:0 7px;border-radius:9px;min-height:0;background:#08101e center/cover no-repeat;border:1px solid rgba(255,255,255,.06);display:grid;place-items:center;font-size:3.4rem;position:relative;overflow:hidden}
  .tcg-art::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(4,8,18,.9));pointer-events:none}
  .tcg-buff-ico{flex:1;margin:0 7px;border-radius:9px;min-height:0;background:radial-gradient(ellipse at 50% 55%,var(--sa3,rgba(99,102,241,.14)),transparent 72%);border:1px solid rgba(255,255,255,.05);display:grid;place-items:center;font-size:3.6rem;position:relative}
  .tcg-plate{padding:5px 9px 3px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.05)}
  .tcg-name{font-family:var(--fd);font-weight:600;font-size:.94rem;letter-spacing:.04em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcg-flavor{font-size:.67rem;color:var(--muted2);line-height:1.25;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcg-stats{display:flex;justify-content:space-around;padding:5px 7px 8px;flex-shrink:0;gap:2px;border-top:1px solid rgba(255,255,255,.04);background:linear-gradient(180deg,transparent,rgba(0,0,0,.45))}
  .ts{display:flex;flex-direction:column;align-items:center;gap:0;flex:1}
  .ts-l{font-size:.53rem;letter-spacing:.12em;font-family:var(--fd);font-weight:600;color:var(--muted)}
  .ts-v{font-size:.94rem;font-family:var(--fd);font-weight:700;letter-spacing:.02em;line-height:1.1}
  .tcg-sig{font-size:.58rem;font-family:var(--fd);font-weight:600;letter-spacing:.08em;color:var(--gold2);text-align:center;padding:0 8px 6px;border-top:1px solid rgba(220,160,48,.1);padding-top:4px}
  .tcg-chk{position:absolute;top:9px;right:9px;width:22px;height:22px;background:var(--sa,var(--red2));border-radius:50%;display:grid;place-items:center;font-size:.75rem;color:#fff;z-index:4;box-shadow:0 2px 10px rgba(0,0,0,.6);animation:selPop .2s cubic-bezier(.35,0,.2,1.5) both}

  /* ════════════════════════════════
     ARENA LOBBY
  ════════════════════════════════ */
  .arena-hd{font-family:var(--fd);font-weight:600;letter-spacing:.15em;font-size:.86rem;color:var(--gold2);display:flex;align-items:center;gap:8px}
  .arena-hd::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold2),transparent)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .choice{
    position:relative;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;
    background:linear-gradient(165deg,#0e1a30,#080e20);
    padding:16px 14px;cursor:pointer;
    transition:transform .18s,box-shadow .18s,border-color .18s;touch-action:manipulation;
  }
  .choice::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold2),#7a5c08)}
  .choice:hover{transform:translateY(-5px);border-color:var(--gold2);box-shadow:0 12px 36px rgba(0,0,0,.6),0 0 0 1px var(--gold2),0 0 24px rgba(192,136,32,.2)}
  .choice:active{transform:scale(.97)}
  .choice-ico{font-size:1.8rem;margin-bottom:8px;display:block}
  .choice h3{font-family:var(--fd);font-weight:600;letter-spacing:.1em;font-size:1.1rem;color:var(--text)}
  .choice p{font-size:.74rem;color:var(--muted2);margin-top:4px;line-height:1.4}
  .rooms{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:144px;overflow-y:auto}
  .room{border:1px solid var(--border);border-radius:10px;background:var(--bg3);padding:9px 12px;cursor:pointer;transition:border-color .14s,background .14s;touch-action:manipulation}
  .room:hover{border-color:var(--border2);background:var(--bg4)}
  .room b{font-family:var(--fd);font-weight:600;letter-spacing:.1em;font-size:1rem;color:var(--gold2)}
  .warn{border:1px solid rgba(168,130,40,.4);background:rgba(100,75,20,.12);color:#f0d080;border-radius:10px;padding:9px 12px;font-size:.76rem}

  /* ════════════════════════════════
     BATTLE LAYOUT — cinematic arena
  ════════════════════════════════ */
  .battle{
    display:grid;
    grid-template-columns:1fr 88px;
    grid-template-rows:auto 1fr auto 1fr auto;
    overflow:hidden;
    position:relative;
    background:
      radial-gradient(ellipse 180% 50% at 50% -5%,rgba(180,12,28,.22),transparent 60%),
      radial-gradient(ellipse 180% 50% at 50% 105%,rgba(40,80,200,.12),transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 50%,#06091a,#04060e);
  }
  /* Animated arena floor reflection */
  .battle::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:
      repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.008) 3px),
      repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.005) 61px);
  }
  /* Arena rope divider — subtle horizontal line at the center */
  .battle::after{
    content:'';position:absolute;left:0;right:0;top:50%;height:1px;
    background:linear-gradient(90deg,transparent 5%,rgba(200,150,40,.2) 20%,rgba(200,150,40,.5) 50%,rgba(200,150,40,.2) 80%,transparent 95%);
    pointer-events:none;z-index:0;
    box-shadow:0 0 12px rgba(200,150,40,.15);
  }
  /* Card zone — centers the fight-card-wrap */
  .card-zone{
    display:flex;align-items:center;justify-content:center;
    position:relative;z-index:1;overflow:hidden;
    grid-column:1;
  }

  /* ════════════════════════════════
     STATUS BARS (top / bottom)
  ════════════════════════════════ */
  .bar{
    padding:7px 14px;
    background:linear-gradient(90deg,rgba(4,7,16,.98),rgba(8,12,26,.96));
    border-bottom:1px solid rgba(255,255,255,.04);
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    position:relative;z-index:2;
    box-shadow:0 2px 16px rgba(0,0,0,.6);
    grid-column:1;
  }
  .bar-left{display:flex;align-items:center;gap:9px}
  .bar-lbl{font-family:var(--fd);font-weight:600;letter-spacing:.1em;font-size:.82rem;color:var(--muted2)}
  .bar-tc{
    font-family:var(--fd);font-weight:700;font-size:.72rem;letter-spacing:.1em;
    background:linear-gradient(135deg,var(--gold2),#6a4c08);color:#0e0800;
    border-radius:999px;padding:3px 11px;
    box-shadow:0 2px 8px rgba(180,130,24,.3);
  }
  .slots{display:flex;gap:5px;align-items:center}
  .slot{
    width:34px;height:34px;border:1px solid var(--border2);border-radius:9px;
    background:linear-gradient(160deg,var(--bg3),var(--bg2));
    display:grid;place-items:center;font-size:1.05rem;transition:all .15s;
  }
  button.slot{cursor:pointer;touch-action:manipulation}
  button.slot:not(:disabled):hover{border-color:var(--gold2);background:var(--bg4);transform:scale(1.16);box-shadow:0 0 14px rgba(200,160,32,.4)}
  button.slot:not(:disabled):active{transform:scale(.88)}
  .slot.dead{opacity:.12;filter:grayscale(1)blur(.5px)}
  .slot.active-slot{border-color:var(--sa,var(--border3));box-shadow:0 0 14px var(--sa3,transparent),0 0 0 1px rgba(var(--sag,80,100,200),.3)}

  /* ════════════════════════════════
     FIGHT CARD — REAL TCG CARD STYLE
  ════════════════════════════════ */
  @keyframes cardIdle{
    0%,100%{box-shadow:0 0 0 2px rgba(var(--sag,80,100,200),.25),0 12px 48px rgba(0,0,0,.85),0 0 0 4px rgba(0,0,0,.6)}
    50%{box-shadow:0 0 0 2px rgba(var(--sag,80,100,200),.55),0 16px 56px rgba(0,0,0,.9),0 0 40px rgba(var(--sag,80,100,200),.18),0 0 0 4px rgba(0,0,0,.6)}
  }
  @keyframes cardArtPan{0%{background-position:center 30%}100%{background-position:center 35%}}

  /* Wrapper holds card + HP bar below it */
  .fight-card-wrap{
    display:flex;flex-direction:column;align-items:center;
    padding:4px 12px 0;
    position:relative;
  }

  .fight-card{
    /* True TCG card proportions: ~2.5" × 3.5" → 5:7 ratio */
    width:min(160px, 42vw);
    aspect-ratio:5/7;
    border-radius:14px;
    overflow:hidden;
    /* Multi-layer TCG card border: outer dark frame, then gold/color accent line, inner content */
    border:3px solid rgba(0,0,0,.85);
    outline:1px solid rgba(var(--sag,80,100,200),.45);
    box-shadow:
      0 0 0 1px rgba(var(--sag,80,100,200),.2),
      inset 0 0 0 1px rgba(255,255,255,.06),
      0 14px 48px rgba(0,0,0,.85);
    display:flex;flex-direction:column;
    position:relative;
    animation:cardIdle 5s ease-in-out infinite;
    isolation:isolate;
    cursor:default;
    flex-shrink:0;
    background:linear-gradient(165deg,#0e1830,#06091a);
  }
  /* Holographic foil corner accents */
  .fight-card::before{
    content:'';position:absolute;inset:0;z-index:4;pointer-events:none;border-radius:11px;
    background:
      linear-gradient(135deg, rgba(var(--sag,80,100,200),.18) 0%, transparent 28%),
      linear-gradient(225deg, rgba(var(--sag,80,100,200),.12) 0%, transparent 22%),
      linear-gradient(315deg, rgba(var(--sag,80,100,200),.1) 0%, transparent 20%),
      linear-gradient(45deg,  rgba(var(--sag,80,100,200),.1) 0%, transparent 20%);
  }
  /* Full-art boxer image — fills entire card */
  .fc-fullart{
    position:absolute;inset:0;z-index:0;
    background:#06090e center 25%/cover no-repeat;
    transition:transform .6s cubic-bezier(.25,.8,.25,1),filter .4s;
  }
  /* Cinematic gradient overlay */
  .fc-overlay{
    position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(
      180deg,
      rgba(4,7,18,.88) 0%,
      rgba(4,7,18,.38) 20%,
      rgba(4,7,18,.0) 38%,
      rgba(4,7,18,.0) 52%,
      rgba(4,7,18,.5) 66%,
      rgba(4,7,18,.94) 80%,
      rgba(4,7,18,1) 100%
    );
  }
  /* Edge vignette */
  .fc-vignette{position:absolute;inset:0;z-index:1;pointer-events:none;box-shadow:inset 0 0 40px rgba(0,0,0,.65),inset 0 0 14px rgba(0,0,0,.35)}
  /* Style color accent tint */
  .fc-tint{
    position:absolute;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(ellipse 100% 55% at 50% 115%,rgba(var(--sag,80,100,200),.28),transparent 70%),
      radial-gradient(ellipse 60% 30% at 50% 100%,rgba(var(--sag,80,100,200),.14),transparent 60%);
  }
  /* Shimmer sweep on hover */
  .fc-shimmer{
    position:absolute;top:0;bottom:0;left:0;width:40%;z-index:2;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);
    transform:translateX(-100%);
  }
  .fight-card:hover .fc-fullart{transform:scale(1.05) translateY(-2%)}
  .fight-card:hover .fc-shimmer{animation:shimmerPass .7s ease both}

  /* Content layer above all overlays */
  .fc-content{position:relative;z-index:3;display:flex;flex-direction:column;height:100%}

  /* Color band at top — thick TCG foil strip */
  .fc-band{
    height:4px;flex-shrink:0;
    background:linear-gradient(90deg,
      rgba(var(--sag,80,100,200),.0) 0%,
      rgba(var(--sag,80,100,200),1) 20%,
      rgba(255,255,255,.9) 50%,
      rgba(var(--sag,80,100,200),1) 80%,
      rgba(var(--sag,80,100,200),.0) 100%
    );
    background-size:250% auto;animation:bandShimmer 2.5s linear infinite;
    box-shadow:0 0 8px rgba(var(--sag,80,100,200),.6);
  }

  /* Card header — name + type + guard */
  .fc-hdr{
    display:flex;align-items:center;gap:5px;padding:6px 9px 5px;flex-shrink:0;
    background:linear-gradient(180deg,rgba(4,7,18,.92) 0%,rgba(4,7,18,.6) 70%,transparent);
  }
  .fc-hdr-name{
    font-family:var(--fd);font-weight:700;font-size:.88rem;letter-spacing:.04em;flex:1;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1;
    text-shadow:0 1px 10px rgba(0,0,0,.95),0 0 20px rgba(0,0,0,.5);
  }
  .fc-type-pill{
    font-size:.44rem;font-family:var(--fd);font-weight:700;letter-spacing:.14em;
    border:1px solid rgba(var(--sag,80,100,200),.6);
    color:var(--sa2,var(--muted2));
    background:rgba(0,0,0,.7);border-radius:999px;padding:2px 7px;white-space:nowrap;flex-shrink:0;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    box-shadow:0 0 8px rgba(var(--sag,80,100,200),.2);
  }
  .fc-guard-pill{
    font-size:.44rem;font-family:var(--fd);font-weight:700;letter-spacing:.07em;
    background:linear-gradient(135deg,rgba(245,168,0,.95),rgba(180,110,0,.9));
    color:#1a0c00;border-radius:999px;padding:2px 7px;flex-shrink:0;
    box-shadow:0 0 14px rgba(245,168,0,.55);animation:pulseGlow 1s ease-in-out infinite;
  }

  /* Art spacer */
  .fc-art-zone{flex:1;min-height:0;position:relative}
  .fc-art-emoji{position:absolute;inset:0;display:grid;place-items:center;font-size:3.8rem;filter:drop-shadow(0 4px 20px rgba(0,0,0,.9));z-index:2}

  /* Stats panel — frosted glass at the bottom of card */
  .fc-stats-panel{
    flex-shrink:0;padding:6px 9px 8px;
    background:linear-gradient(0deg,rgba(4,7,18,1) 50%,rgba(4,7,18,.9) 75%,transparent);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-top:1px solid rgba(var(--sag,80,100,200),.18);
  }
  .fc-subtitle{font-size:.5rem;font-weight:600;letter-spacing:.1em;color:var(--sa2,var(--muted2));text-transform:uppercase;margin-bottom:4px;text-shadow:0 0 10px rgba(var(--sag,80,100,200),.4)}

  /* Momentum pips */
  .fc-mom{display:flex;gap:4px;align-items:center;margin-bottom:5px}
  .pip{
    width:9px;height:9px;border-radius:50%;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.05);
    transition:all .25s cubic-bezier(.25,.8,.25,1);
  }
  .pip.on{background:#2a4898;border-color:#5878d8;box-shadow:0 0 6px rgba(80,120,220,.5)}
  .pip.rdy{background:var(--gold2);border-color:var(--gold3);box-shadow:0 0 10px rgba(220,160,48,.85),0 0 20px rgba(220,160,48,.3)}
  .pip.max{background:#e02045;border-color:#ff3060;box-shadow:0 0 14px rgba(224,32,70,.95),0 0 28px rgba(224,32,70,.4);animation:pipPop .65s ease-in-out infinite}

  /* Stats row */
  .fc-srow{display:flex;gap:10px;align-items:center}
  .fst{display:flex;gap:2px;align-items:baseline}
  .fst-l{font-size:.46rem;font-family:var(--fd);font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  .fst-v{font-size:.86rem;font-family:var(--fd);font-weight:700;line-height:1;text-shadow:0 1px 8px rgba(0,0,0,.9)}

  /* Status effect badges */
  .fc-statuses{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
  .sbadge{
    font-size:.46rem;font-family:var(--fd);font-weight:700;letter-spacing:.06em;
    border-radius:999px;padding:2px 7px;white-space:nowrap;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  .sb-bleed{background:rgba(200,30,30,.38);border:1px solid #ef4444;color:#ffc0c0;box-shadow:0 0 10px rgba(220,40,40,.3)}
  .sb-stun{background:rgba(220,170,0,.3);border:1px solid #f5c820;color:#fde060;animation:stunShake 1.8s ease-in-out infinite;box-shadow:0 0 10px rgba(220,170,0,.3)}
  .sb-weaken{background:rgba(160,60,240,.3);border:1px solid #bb44ff;color:#ddb0ff;box-shadow:0 0 10px rgba(160,60,240,.3)}
  .sb-power{background:rgba(240,100,20,.32);border:1px solid #ff7020;color:#ffc070;box-shadow:0 0 10px rgba(240,100,20,.3)}

  /* ════════════════════════════════
     HP BAR — below the card
  ════════════════════════════════ */
  .fc-hp-bar{
    width:min(160px, 42vw);
    margin-top:5px;
    padding:4px 6px 2px;
    background:linear-gradient(90deg,rgba(4,7,18,.92),rgba(10,14,30,.9),rgba(4,7,18,.92));
    border:1px solid rgba(var(--sag,80,100,200),.25);
    border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.4);
    display:flex;flex-direction:column;gap:2px;
  }
  .fc-hp-label{
    display:flex;justify-content:space-between;align-items:center;
    font-family:var(--fd);font-weight:700;font-size:.58rem;letter-spacing:.06em;
    color:var(--muted2);
  }
  .fc-hp-label .hp-name{color:var(--sa2,var(--text));font-size:.6rem;letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
  .fc-hp-label .hp-num{flex-shrink:0}
  .hpb{
    width:100%;height:8px;border-radius:999px;
    background:rgba(0,0,0,.7);
    border:1px solid rgba(255,255,255,.07);
    overflow:hidden;position:relative;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.5);
  }
  .hpfill{
    height:100%;border-radius:999px;position:relative;
    background:linear-gradient(90deg,#00a048,#00e860);
    transition:width .5s cubic-bezier(.25,.8,.25,1);
    box-shadow:0 0 10px rgba(0,200,80,.5);
  }
  .hpfill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.28);border-radius:999px}
  .hpfill.mid{background:linear-gradient(90deg,#c07000,#f0c030);box-shadow:0 0 10px rgba(220,160,0,.5)}
  .hpfill.low{background:linear-gradient(90deg,#aa0f20,#ff2040);animation:hpPulse .8s ease-in-out infinite;box-shadow:0 0 12px rgba(220,20,50,.6)}
  .hp-num{font-family:var(--fd);font-weight:700;font-size:.72rem;letter-spacing:.02em;white-space:nowrap;flex-shrink:0;text-shadow:0 1px 8px rgba(0,0,0,.95)}
  .hp-num.low{color:#ff3355}.hp-num.mid{color:#f5a800}

  /* ════════════════════════════════
     BATTLE LOG
  ════════════════════════════════ */
  .logbox{
    display:flex;align-items:center;justify-content:center;
    padding:6px 16px;text-align:center;
    background:linear-gradient(90deg,rgba(4,7,18,.98) 0%,rgba(10,14,32,.96) 50%,rgba(4,7,18,.98) 100%);
    border-top:1px solid rgba(200,150,40,.15);
    border-bottom:1px solid rgba(200,150,40,.15);
    min-height:50px;position:relative;overflow:hidden;z-index:2;
    box-shadow:0 0 30px rgba(0,0,0,.8);
    grid-column:1;
  }
  /* Decorative gold corners */
  .logbox::before{
    content:'';position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none;
    background:
      linear-gradient(135deg,rgba(200,150,40,.12) 0%,transparent 30%),
      linear-gradient(225deg,rgba(200,150,40,.12) 0%,transparent 30%),
      linear-gradient(315deg,rgba(200,150,40,.12) 0%,transparent 30%),
      linear-gradient(45deg,rgba(200,150,40,.12) 0%,transparent 30%);
  }
  .logbox::after{
    content:'';position:absolute;left:12%;right:12%;top:50%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(200,150,40,.25),transparent);
  }
  .log-inner{position:relative;z-index:1}
  .turn-lbl{font-family:var(--fd);font-weight:600;letter-spacing:.32em;font-size:.62rem;color:var(--muted);margin-bottom:2px}
  .turn-lbl.yours{color:#ff3355;animation:turnBlink 1.1s ease-in-out infinite;text-shadow:0 0 16px rgba(255,51,85,.6)}
  .turn-lbl.stunned-lbl{color:#f5c820;animation:turnBlink .75s ease-in-out infinite;text-shadow:0 0 12px rgba(245,200,32,.5)}
  .log-txt{font-family:var(--fd);font-weight:600;font-size:1.05rem;letter-spacing:.04em;text-shadow:0 1px 10px rgba(0,0,0,.9)}

  /* ════════════════════════════════
     CONTROLS PANEL
  ════════════════════════════════ */
  .ctrl{
    border-top:1px solid rgba(255,255,255,.05);
    background:linear-gradient(180deg,rgba(8,12,26,.97),rgba(4,7,16,.99));
    padding:7px 10px;display:flex;flex-direction:column;gap:7px;
    position:relative;z-index:2;
    box-shadow:0 -4px 24px rgba(0,0,0,.7);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    grid-column:1;
  }
  .ctrl::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(200,150,40,.2),transparent)}
  .ctrl-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
  .ctrl-info{display:flex;align-items:center;gap:8px;flex:1}
  .ctrl-lbl{font-family:var(--fd);font-weight:600;letter-spacing:.1em;font-size:.82rem;color:var(--muted2)}
  .tc-badge{
    font-family:var(--fd);font-weight:700;font-size:.7rem;letter-spacing:.1em;
    background:linear-gradient(135deg,var(--gold2),#6a4808);color:#0e0800;
    border-radius:999px;padding:3px 11px;
    box-shadow:0 2px 8px rgba(180,130,20,.35);
  }
  .stun-note{
    font-size:.58rem;font-family:var(--fd);font-weight:700;letter-spacing:.1em;color:#f5c820;
    background:rgba(220,170,0,.18);border:1px solid rgba(220,170,0,.45);
    border-radius:999px;padding:2px 9px;animation:stunShake 1.8s ease-in-out infinite;
    box-shadow:0 0 10px rgba(220,170,0,.25);
  }

  /* Action buttons row */
  .act-row{display:flex;gap:7px}
  .act-row .btn{flex:1;min-height:44px;font-size:.78rem}

  /* ════════════════════════════════
     SIDE BUFF PANEL
  ════════════════════════════════ */
  .buff-side{
    grid-column:2;
    grid-row:1 / -1;
    display:flex;flex-direction:column;gap:6px;
    padding:8px 5px;
    overflow-y:auto;overflow-x:hidden;
    background:linear-gradient(180deg,rgba(4,7,18,.98),rgba(8,12,26,.96));
    border-left:1px solid rgba(255,255,255,.05);
    box-shadow:-4px 0 20px rgba(0,0,0,.5);
    position:relative;z-index:3;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .buff-side::-webkit-scrollbar{width:2px}
  .buff-side::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
  .buff-side::before{
    content:'BUFFS';
    display:block;font-family:var(--fd);font-weight:700;font-size:.48rem;
    letter-spacing:.18em;color:var(--muted);text-align:center;
    padding-bottom:5px;border-bottom:1px solid rgba(200,150,40,.15);
    flex-shrink:0;
  }

  /* Buff cards — vertical layout in side panel */
  .buff{
    width:100%;flex-shrink:0;scroll-snap-align:start;
    border:1px solid var(--border2);border-radius:10px;
    background:linear-gradient(165deg,rgba(14,26,56,.95),rgba(8,14,32,.95));
    padding:7px 6px;cursor:pointer;position:relative;overflow:hidden;
    transition:transform .16s,border-color .16s,box-shadow .16s;touch-action:manipulation;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:flex;flex-direction:column;align-items:center;text-align:center;gap:2px;
  }
  .buff::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4455dd,#8890ff)}
  .buff::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent 50%);pointer-events:none;border-radius:inherit}
  .buff:not(.dis):hover{transform:scale(1.06);border-color:#5568cc;box-shadow:0 6px 20px rgba(0,0,0,.6),0 0 0 1px #5568cc,0 0 14px rgba(85,104,204,.3)}
  .buff:not(.dis):active{transform:scale(.94)}
  .buff.dis{opacity:.2;cursor:not-allowed}
  .buff-top{display:flex;justify-content:center;align-items:center;flex-direction:column;gap:2px;margin-bottom:0}
  .buff-ico{font-size:1.5rem;line-height:1}
  .buff-tc{font-size:.55rem;font-family:var(--fd);font-weight:700;background:linear-gradient(135deg,var(--gold2),#7a5808);color:#0e0800;border-radius:999px;padding:1px 6px;margin-top:1px}
  .buff-nm{font-family:var(--fd);font-weight:600;font-size:.6rem;letter-spacing:.03em;line-height:1.1;word-break:break-word}
  .buff-dc{font-size:.52rem;color:var(--muted2);margin-top:1px;line-height:1.2;display:none}

  /* ════════════════════════════════
     VICTORY / DEFEAT OVERLAY
  ════════════════════════════════ */
  .ov{
    position:absolute;inset:0;z-index:10;
    display:grid;place-items:center;
    background:radial-gradient(ellipse 120% 120% at 50% 50%,rgba(8,12,26,.96),rgba(2,4,12,.99));
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    animation:vIn .4s ease both;
  }
  .ov-box{text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
  .ov-result{
    font-family:var(--fh);font-size:clamp(4rem,13vw,7.5rem);letter-spacing:.1em;line-height:.86;
    animation:floatY 3s ease-in-out infinite;
  }
  .win{
    color:var(--green2);
    text-shadow:0 0 60px rgba(0,224,96,.7),0 0 140px rgba(0,180,80,.4),0 4px 0 rgba(0,0,0,.9);
  }
  .lose{
    color:var(--red3);

/* ══════════════════════════════════════════
   BATTLE MECHANICS
══════════════════════════════════════════ */
function hpClass(h,m){const p=h/m;return p<.3?"low":p<.58?"mid":""}
function hashRoll(seed){let h=0;for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))%100000;return(Math.sin(h)+1)/2}
function styleBonus(style){if(style==="slugger")return 6;if(style==="speed")return 2;if(style==="balanced")return 1;return 0}
function nextAlive(s){return s.boxers.findIndex(x=>!x.dead)}
function condOk(f,s){if(!f.cond)return true;const a=s.boxers[s.active];if(f.cond==="low")return a.hp<=a.maxHp*.4;return true}

/* Apply status effect to a target boxer */
function applyEffect(effect,target,src){
  if(!target.statuses)target.statuses={};
  if(effect==="stun"){target.statuses.stun=1;return"⚡ STUNNED!"}
  if(effect==="bleed"){const dmg=Math.max(8,Math.floor(src.atk*.2));target.statuses.bleed={dmg,turns:2};return`🩸 BLEEDING (${dmg}/turn)`}
  if(effect==="weaken"){target.statuses.weaken={turns:2};return"🛡 WEAKENED!"}
  return null
}

/* New applyBuff — handles all effect types */
function applyBuff(f,s,opSide){
  const a=s.boxers[s.active];
  if(!a.statuses)a.statuses={};
  if(f.effect==="hp")          {a.hp=Math.min(a.maxHp,a.hp+f.val)}
  else if(f.effect==="atk")    {a.atk+=f.val}
  else if(f.effect==="def")    {a.def+=f.val}
  else if(f.effect==="tc")     {s.tc=Math.min(10,s.tc+f.val)}
  else if(f.effect==="cleanse"){a.statuses={}}
  else if(f.effect==="cleanse_hp"){a.statuses={};a.hp=Math.min(a.maxHp,a.hp+f.val)}
  else if(f.effect==="atk_risk"){a.atk+=f.val;a.hp=Math.max(1,a.hp-(f.cost_hp||15))}
  else if(f.effect==="hp_pct") {a.hp=Math.min(a.maxHp,a.hp+Math.floor((a.maxHp-a.hp)*(f.val||.5)))}
  else if(f.effect==="power_up"){a.statuses.power_up={mult:f.mult||1.8}}
  else if(f.effect==="multi")  {
    a.atk+=(f.extra?.atk||0);
    a.def+=(f.extra?.def||0);
    if(f.extra?.hp)a.hp=Math.min(a.maxHp,a.hp+(f.extra.hp));
  }
  // handle special side-effects
  if(f.special==="cleanse_stun"){delete a.statuses.stun}
}

/* Core attack resolver — now supports special moves */
function resolveAttack(state,atk,def,salt,isSpecial){
  const sig=isSpecial?SIGNATURES[atk.id]:null;
  if(!atk.statuses)atk.statuses={};
  if(!def.statuses)def.statuses={};

  // Dodge (only on normal attacks)
  if(!isSpecial){
    const dodgeChance=def.style==="speed"?.18:.06;
    if(hashRoll(`${salt}|dodge`)<dodgeChance){
      atk.momentum=Math.min(5,atk.momentum+1);
      return{log:`${def.name} slips the punch!`}
    }
  }

  // Base damage
  let dmg=Math.max(8,atk.atk-Math.floor(def.def*.62))+styleBonus(atk.style)+(atk.momentum*2);

  // Signature multiplier
  if(sig)dmg=Math.floor(dmg*sig.mult);

  // Power-up buff: multiply then consume
  if(atk.statuses.power_up){
    dmg=Math.floor(dmg*(atk.statuses.power_up.mult||1.8));
    delete atk.statuses.power_up;
  }

  // Weaken debuff: defender takes +35% dmg
  if(def.statuses.weaken){
    dmg=Math.floor(dmg*1.35);
    def.statuses.weaken.turns--;
    if(def.statuses.weaken.turns<=0)delete def.statuses.weaken;
  }

  // Crit (not on specials — they're already powerful)
  let crit=false;
  if(!isSpecial){
    const critChance=Math.min(.26,.05+atk.momentum*.05);
    if(hashRoll(`${salt}|crit`)<critChance){dmg=Math.floor(dmg*1.55);crit=true}
  }

  // Guard reduction + counter-punch
  let counter=0;
  if(def.guard){
    dmg=Math.floor(dmg*.5);
    if(def.style==="counter"){counter=Math.max(8,Math.floor(def.atk*.45));atk.hp=Math.max(0,atk.hp-counter)}
    def.guard=false;
  }

  def.hp=Math.max(0,def.hp-dmg);
  // After special: momentum resets to 0; after normal: +1 (cap 5)
  atk.momentum=isSpecial?0:Math.min(5,atk.momentum+1);

  // Build log string
  let parts=[];
  if(isSpecial)parts.push(`${sig.icon} ${sig.name}!`);
  const hitter=isSpecial?"Deals":atk.name+" lands";
  parts.push(`${hitter} ${dmg}${crit?" 💥CRIT":""}`);
  if(counter)parts.push(`Counter ${counter}`);

  // Apply special effect
  if(sig?.effect){const fx=applyEffect(sig.effect,def,atk);if(fx)parts.push(fx)}

  return{log:parts.join(" — "),dmg,crit}
}

/* endTurn: flips turn AND procs bleed DoT on the incoming player */
function endTurn(bb){
  bb.turn=bb.turn==="host"?"guest":"host";
  bb.turnCount++;
  if(bb.state!=="playing")return;
  const incoming=bb[bb.turn];
  const bx=incoming.boxers[incoming.active];
  if(!bx||bx.dead)return;
  if(!bx.statuses)bx.statuses={};
  if(bx.statuses.bleed){
    const dmg=bx.statuses.bleed.dmg;
    bx.hp=Math.max(0,bx.hp-dmg);
    bx.statuses.bleed.turns--;
    if(bx.statuses.bleed.turns<=0)delete bx.statuses.bleed;
    bb.log.push(`🩸 ${bx.name} bleeds for ${dmg}!`);
    if(bx.hp<=0){
      bx.hp=0;bx.dead=true;
      const ni=nextAlive(incoming);
      if(ni<0){bb.state="finished";bb.winner=bb.turn==="host"?"guest":"host"}
      else{incoming.active=ni;bb.log.push(`${bx.name} collapses! ${incoming.boxers[ni].name} steps up!`)}
    }
  }
}

/* ══════════════════════════════════════════
   CORE ACTION HANDLER
   Supports: attack · special · guard · switch · buff · pass
══════════════════════════════════════════ */
function onlineApplyAction(bb,role,kind,idx){
  const me=bb[role],op=bb[role==="host"?"guest":"host"];
  const myA=me.boxers[me.active],opA=op.boxers[op.active];
  if(!myA.statuses)myA.statuses={};
  if(!opA.statuses)opA.statuses={};

  const isStunned=!!(myA.statuses.stun&&myA.statuses.stun>0);

  // Stun gate: only allow pass when stunned
  if(isStunned&&kind!=="pass")return null;

  let log=null;
  // Rich result object consumed by animateAction
  const res={kind,ko:false,dmg:0,crit:false,isSig:false,dodged:false,heal:false,bleedDmg:0};

  if(kind==="attack"||kind==="special"){
    const isSpecial=kind==="special";
    if(isSpecial){
      if(myA.momentum<3||me.tc<2)return null;
      me.tc-=2;
    }
    const r=resolveAttack(bb,myA,opA,`${bb.turnCount}|${myA.iid}|${opA.iid}`,isSpecial);
    log=r.log;
    res.dmg=r.dmg||0;
    res.crit=!!r.crit;
    res.isSig=isSpecial;
    res.dodged=!!r.dodged;
    if(!isSpecial)me.tc=Math.min(10,me.tc+1);
    if(opA.hp<=0){
      opA.hp=0;opA.dead=true;
      res.ko=true;
      log=`🥊 KO! ${opA.name} is down!`;
      const ni=nextAlive(op);
      if(ni<0){bb.state="finished";bb.winner=role}
      else{op.active=ni;log+=` ${op.boxers[ni].name} steps in!`}
    }
  }else if(kind==="switch"){
    if(typeof idx!=="number"||idx===me.active||!me.boxers[idx]||me.boxers[idx].dead||me.tc<1)return null;
    myA.momentum=0; // momentum lost on tag-out
    me.active=idx;me.tc-=1;
    log=`🔄 ${me.boxers[idx].name} tagged in!`
  }else if(kind==="buff"){
    if(typeof idx!=="number"||!me.buffs[idx])return null;
    const f=me.buffs[idx];
    if(f.used||me.tc<f.cost||!condOk(f,me))return null;
    const hpBefore=myA.hp;
    applyBuff(f,me,op);
    f.used=true;me.tc-=f.cost;
    res.heal=myA.hp>hpBefore;
    log=`✨ ${myA.name} uses ${f.name}!`
  }else if(kind==="guard"){
    myA.guard=true;myA.momentum=Math.min(5,myA.momentum+1);
    log=`🛡 ${myA.name} raises guard! (+1 MOM)`
  }else if(kind==="pass"){
    if(isStunned){
      myA.statuses.stun--;
      if(myA.statuses.stun<=0)delete myA.statuses.stun;
      log=`💪 ${myA.name} shakes off the stun!`
    }else{
      me.tc=Math.min(10,me.tc+1);
      log="⏳ Passed — +1 TC"
    }
  }

  if(!log)return null;
  bb.log.push(log);

  // Capture bleed damage that endTurn may apply, and detect KO from bleed
  const prevHp=bb[bb.turn==="host"?"guest":"host"]?.boxers[bb[bb.turn==="host"?"guest":"host"]?.active]?.hp;
  endTurn(bb);
  const afterSide=bb[bb.turn];
  const afterBx=afterSide?.boxers[afterSide?.active];
  if(afterBx&&afterBx.dead){res.ko=true}
  // Detect bleed DoT damage that occurred during endTurn
  const incomingSide=bb[bb.turn];
  const incomingBx=incomingSide?.boxers[incomingSide?.active];
  if(incomingBx&&!incomingBx.dead&&typeof prevHp==="number"){
    const bleedDmg=prevHp-incomingBx.hp;
    if(bleedDmg>0)res.bleedDmg=bleedDmg;
  }

  return res;
}

async function createRoom(){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const id=rid(),code=rcode(),hostName="Host-"+S.online.uid.slice(-4).toUpperCase();const room={code,status:"open",createdAt:now(),updatedAt:now(),hostUid:S.online.uid,hostName,hostDeck:{b:S.deckBoxers,f:S.deckBuffs},guestUid:null,guestName:null,guestDeck:null,battle:null};try{await roomsRef(id).set(room);S.online.roomId=id;S.online.role="host";watchRoom(id);toast(`Room ${code} created.`)}catch(e){console.error(e);toast(`Create failed: ${e.code||"unknown"}`)}}
async function joinByCode(){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const code=(prompt("Enter room code:")||"").trim().toUpperCase();if(!code)return;try{const s=await roomsRef().orderByChild("code").equalTo(code).get();let id=null;s.forEach(c=>{const v=c.val()||{};if(!id&&v.status==="open")id=c.key});if(!id)return toast("No open room with that code.");await joinRoom(id)}catch(e){console.error(e);toast(`Join failed: ${e.code||"unknown"}`)}}
async function joinRoom(id){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const ref=roomsRef(id);try{const tx=await ref.transaction(room=>{if(!room||room.status!=="open"||room.guestUid)return;room.guestUid=S.online.uid;room.guestName="Guest-"+S.online.uid.slice(-4).toUpperCase();room.guestDeck={b:S.deckBoxers,f:S.deckBuffs};room.status="playing";room.battle=mkBattle("online",room.hostDeck,room.guestDeck,room.hostName,room.guestName);room.updatedAt=now();return room},undefined,false);if(!tx.committed)return toast("Room not available.");S.online.roomId=id;S.online.role="guest";watchRoom(id)}catch(e){console.error(e);toast(`Join failed: ${e.code||"unknown"}`)}}
function subscribeRooms(){if(!S.online.db||S.online.listCb)return;const q=roomsRef().orderByChild("status").equalTo("open");const cb=snap=>{const rows=[];snap.forEach(ch=>{const v=ch.val()||{};rows.push({id:ch.key,code:v.code||"-----",hostName:v.hostName||"Host",createdAt:v.createdAt||0})});rows.sort((a,b)=>b.createdAt-a.createdAt);S.roomList=rows.slice(0,40);if(S.view==="arena")renderArena()};q.on("value",cb);S.online.listCb=cb}
function watchRoom(id){if(S.online.roomCb&&S.online.roomId)roomsRef(S.online.roomId).off("value",S.online.roomCb);const cb=snap=>{const room=snap.val();if(!room){toast("Room closed.");S.online.roomId=null;S.online.role=null;goto("arena");return}if(room.battle){S.battle=deep(room.battle);S.battle.mode="online";if(S.view!=="battle")goto("battle");else renderBattle()}};roomsRef(id).on("value",cb);S.online.roomCb=cb;if(S.view!=="battle")goto("battle")}

/* ══════════════════════════════════════════
   FIGHT CARD — redesigned with pips + status badges
══════════════════════════════════════════ */
function momPips(mom){
  return Array.from({length:5},(_,i)=>{
    let cls="";
    if(i<mom){cls=mom>=5?"max":mom>=3?"rdy":"on"}
    return`<div class="pip ${cls}"></div>`
  }).join("")
}
function statusBadges(st){
  if(!st)return"";
  const b=[];
  if(st.bleed) b.push(`<span class="sbadge sb-bleed">🩸 BLEED ×${st.bleed.turns}</span>`);
  if(st.stun)  b.push(`<span class="sbadge sb-stun">⚡ STUNNED</span>`);
  if(st.weaken)b.push(`<span class="sbadge sb-weaken">🛡 WEAKEN ×${st.weaken.turns}</span>`);
  if(st.power_up) b.push(`<span class="sbadge sb-power">💢 POWERED</span>`);
  return b.join("")
}

/* Surgically update a fight card already in the DOM */
function updateCard(bx,cardId){
  const pct=Math.max(0,(bx.hp/bx.maxHp)*100).toFixed(1);
  const hpC=hpClass(bx.hp,bx.maxHp);
  const fill=document.getElementById(`${cardId}-fill`);
  if(fill){fill.style.width=pct+"%";fill.className="hpfill"+(hpC?" "+hpC:"")}
  const hpn=document.getElementById(`${cardId}-hpnum`);
  if(hpn){hpn.className="hp-num"+(hpC?" "+hpC:"");hpn.innerHTML=`${bx.hp}<span style="color:var(--muted);font-size:.82em">/${bx.maxHp}</span>`}
  const momEl=document.getElementById(`${cardId}-mom`);
  if(momEl){momEl.textContent=`${bx.momentum||0}/5`;momEl.style.color=bx.momentum>=3?"#f8d068":"var(--muted2)"}
  const pipsEl=document.getElementById(`${cardId}-pips`);
  if(pipsEl)pipsEl.innerHTML=momPips(bx.momentum||0);
  const sts=document.getElementById(`${cardId}-sts`);if(sts)sts.innerHTML=statusBadges(bx.statuses);
  const atkEl=document.getElementById(`${cardId}-atk`);if(atkEl)atkEl.textContent=bx.atk;
  const defEl=document.getElementById(`${cardId}-def`);if(defEl)defEl.textContent=bx.def;
  const card=document.getElementById(cardId);
  if(card){
    let gp=card.querySelector(".fc-guard-pill");
    if(bx.guard&&!gp){const hdr=card.querySelector(".fc-hdr");if(hdr){gp=document.createElement("div");gp.className="fc-guard-pill";gp.textContent="🛡 GUARD";hdr.appendChild(gp)}}
    if(!bx.guard&&gp)gp.remove();
  }
}

/* Fully replace a fight card when a KO swaps the active boxer */
function replaceCard(bx,cardId){
  const old=document.getElementById(cardId);
  if(!old)return;
  // Replace the wrap (card+hp bar) for KO transition
  const wrap=document.getElementById(cardId+"-wrap")||old;
  wrap.style.transition="opacity .3s ease, transform .3s cubic-bezier(.5,0,.5,1), filter .3s ease";
  wrap.style.filter="brightness(3) saturate(0)";
  wrap.style.transform="scale(.95) translateY(4px)";
  wrap.style.opacity="0";
  setTimeout(()=>{
    const tmp=document.createElement("div");
    tmp.innerHTML=fightCard(bx,cardId);
    const newWrap=tmp.firstElementChild;
    newWrap.style.animation="newBoxerIn .55s cubic-bezier(.3,0,.7,1) both";
    wrap.replaceWith(newWrap);
  },320);
}

/* Floating damage number over a card element */
function spawnFloat(cardEl,text,cls){
  if(!cardEl)return;
  const f=document.createElement("div");
  f.className="dmg-float "+cls;
  f.textContent=text;
  f.style.left=(28+Math.random()*44)+"%";
  f.style.top="26%";
  cardEl.style.overflow="visible";
  cardEl.appendChild(f);
  setTimeout(()=>{f.remove();},1050);
}

/* Hit overlay flash */
function flashCard(cardEl,type){
  if(!cardEl)return;
  const ov=document.createElement("div");
  ov.className="hit-ov"+(type?" "+type:"");
  cardEl.appendChild(ov);
  setTimeout(()=>ov.remove(),540);
}

/* ══════════════════════════════════════════
   ANIMATION ENGINE — sequences every action visually
══════════════════════════════════════════ */
function animateAction(result,isPlayerAction,afterDone){
  const b=S.battle;
  const opCard=document.getElementById("fc-op");
  const myCard=document.getElementById("fc-me");
  const atkCard=isPlayerAction?myCard:opCard;
  const defCard=isPlayerAction?opCard:myCard;
  const ms=t=>new Promise(r=>setTimeout(r,t));

  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";

  async function run(){
    const kind=result?.kind||"pass";
    const isAtk=kind==="attack"||kind==="special";

    if(isAtk&&!result.dodged){
      // 1 — Attacker bounce
      if(atkCard){
        atkCard.classList.add(isPlayerAction?"punching-dn":"punching-up");
        if(result.isSig)atkCard.classList.add("sig-burst");
      }
      await ms(160);

      // 2 — Defender shakes + flash + float
      if(defCard){
        defCard.classList.add("taking-hit");
        flashCard(defCard,result.isSig?"gold":"red");
        if(result.isSig){const rip=document.createElement("div");rip.className="sig-ripple";defCard.appendChild(rip);setTimeout(()=>rip.remove(),800)}
        if(result.dmg>0){
          const cls=result.isSig?"sig":result.crit?"crit":"norm";
          spawnFloat(defCard,"-"+result.dmg,cls);
        }
      }

      // 3 — HP bar update (CSS handles smooth slide)
      await ms(90);
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(260);
      if(atkCard)atkCard.classList.remove("punching-dn","punching-up","sig-burst");
      if(defCard)defCard.classList.remove("taking-hit");

      // If a KO happened the active boxer changed — replace the whole card
      if(result.ko){
        const defId=isPlayerAction?"fc-op":"fc-me";
        const defSide=isPlayerAction?b[opKey]:b[myKey];
        // Brief white KO flash on the defeated card
        const koCard=document.getElementById(defId);
        if(koCard)flashCard(koCard,"ko");
        await ms(220);
        replaceCard(defSide.boxers[defSide.active],defId);
        // Also update the attacker card (momentum reset etc.)
        updateCard(b[isPlayerAction?myKey:opKey].boxers[b[isPlayerAction?myKey:opKey].active],
                   isPlayerAction?"fc-me":"fc-op");
      }

    }else if(isAtk&&result.dodged){
      if(defCard)defCard.classList.add("taking-hit");
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(400);
      if(defCard)defCard.classList.remove("taking-hit");

    }else{
      // Buff / guard / pass / switch — also handle switch KO (switch to new boxer)
      if(result.heal&&atkCard)flashCard(atkCard,"heal");
      if(result.heal&&atkCard)spawnFloat(atkCard,"+","heal");
      if(result.ko){
        // KO from bleed etc.
        const defId=isPlayerAction?"fc-op":"fc-me";
        const defSide=isPlayerAction?b[opKey]:b[myKey];
        replaceCard(defSide.boxers[defSide.active],defId);
      } else {
        updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
        updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      }
      await ms(280);
    }

    // 4 — Bleed DoT float
    if(result.bleedDmg>0){
      const bleedTarget=isPlayerAction?opCard:myCard;
      spawnFloat(bleedTarget,"🩸 -"+result.bleedDmg,"bleed");
      await ms(70);
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(300);
    }

    // 5 — Slide log
    const lt=document.querySelector(".log-txt");
    if(lt){lt.classList.remove("slide");void lt.offsetWidth;lt.textContent=b.log[b.log.length-1]||"";lt.classList.add("slide")}
    await ms(110);

    afterDone();
  }
  run().catch(console.error);
}


/* ══════════════════════════════════════════
   RENDER BATTLE
══════════════════════════════════════════ */
function renderBattle(){
  const b=S.battle;
  if(!b)return goto("menu");
  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";
  const me=b[myKey],op=b[opKey];
  const myTurn=b.mode==="ai"?b.turn==="host":b.turn===myRole;
  const can=b.state==="playing"&&myTurn&&!S.online.lock;
  const myA=me.boxers[me.active];
  const isStunned=!!(myA?.statuses?.stun&&myA.statuses.stun>0);
  const sig=SIGNATURES[myA?.id]||{name:"SPECIAL",icon:"⚡"};
  const canSig=can&&!isStunned&&(myA?.momentum||0)>=3&&me.tc>=2;
  const isWin=(b.mode==="ai"&&b.winner==="host")||(b.mode==="online"&&b.winner===myRole);

  // Turn label
  let turnLbl,turnClass="turn-lbl";
  if(!can){turnLbl="○ OPPONENT TURN"}
  else if(isStunned){turnLbl="⚡ STUNNED — PASS TO RECOVER";turnClass="turn-lbl stunned-lbl"}
  else{turnLbl="● YOUR TURN";turnClass="turn-lbl yours"}

  app().innerHTML=`<div class="view battle">
    <!-- Opponent bar -->
    <div class="bar">
      <div class="bar-left">
        <div class="slots">${op.boxers.map((x,i)=>`<div class="slot ${x.dead?"dead":""} ${i===op.active?"active-slot":""}">${x.icon}</div>`).join("")}</div>
        <div class="bar-lbl">${op.label}</div>
        <div style="font-size:.6rem;font-family:var(--fd);color:var(--muted);letter-spacing:.06em">${op.boxers[op.active].name}</div>
      </div>
      <div class="bar-tc">TC ${op.tc}</div>
    </div>

    <!-- Opponent fight card -->
    <div class="card-zone">${fightCard(op.boxers[op.active],"fc-op")}</div>

    <!-- Battle log -->
    <div class="logbox">
      <div class="log-inner">
        <div class="${turnClass}">${turnLbl}</div>
        <div class="log-txt">${b.log[b.log.length-1]||""}</div>
      </div>
    </div>

    <!-- My fight card -->
    <div class="card-zone">${fightCard(myA,"fc-me")}</div>

    <!-- Controls -->
    <div class="ctrl ctrl-in" id="ctrl-root">
      <div class="ctrl-top">
        <div class="ctrl-info">
          <span class="ctrl-lbl">${me.label}</span>
          <span style="font-size:.58rem;font-family:var(--fd);color:var(--muted);letter-spacing:.06em">${myA.name}</span>
          <span class="tc-badge" id="my-tc">TC ${me.tc}</span>
          ${isStunned&&can?'<span class="stun-note">⚡ STUNNED</span>':""}
        </div>
        <div class="slots">${me.boxers.map((x,i)=>`<button class="slot ${x.dead?"dead":""} ${i===me.active?"active-slot":""}" data-sw="${i}" ${(!can||i===me.active||x.dead||isStunned)?"disabled":""}>${x.icon}</button>`).join("")}</div>
      </div>
      <div class="act-row">
        <button class="btn" id="a-guard" ${(can&&!isStunned)?"":"disabled"}>GUARD</button>
        <button class="btn btn-sig ${canSig?"live":""}" id="a-sig" ${canSig?"":"disabled"}>${sig.icon} ${sig.name}</button>
        <button class="btn" id="a-pass" ${can?"":"disabled"}>${(isStunned&&can)?"SHAKE OFF":"PASS"}</button>
        <button class="btn btn-p" id="a-hit" ${(can&&!isStunned)?"":"disabled"}>ATTACK</button>
      </div>
    </div>

    <!-- Side buff panel -->
    <div class="buff-side" id="buff-side-panel">
      ${me.buffs.map((f,i)=>{
        const u=can&&!f.used&&me.tc>=f.cost&&!isStunned;
        return`<button class="buff ${u?"":"dis"}" data-bf="${i}" ${u?"":"disabled"}>
          <div class="buff-top"><div class="buff-ico">${f.icon}</div><div class="buff-tc">${f.cost}TC</div></div>
          <div class="buff-nm">${f.name}</div>
        </button>`
      }).join("")}
    </div>

    <!-- Victory/Defeat overlay -->
    ${b.state==="finished"?`<div class="ov"><div class="ov-box">
      <div class="ov-result ${isWin?"win":"lose"}">${isWin?"VICTORY":"DEFEAT"}</div>
      <div class="ov-rule"></div>
      <div class="ov-sub">${isWin?"THE CROWD GOES WILD":"THE BELL HAS RUNG"}</div>
      <div class="ov-stats">
        <div class="ov-stat"><b>Turn ${b.turnCount}</b><span>turns fought</span></div>
      </div>
      <button class="btn btn-p" id="b-ex" style="font-size:1.1rem;padding:13px 32px">RETURN TO MENU</button>
    </div></div>`:""}
  </div>`;

  if(b.state==="finished"){
    document.getElementById("b-ex").onclick=()=>{
      if(S.online.roomCb&&S.online.roomId)roomsRef(S.online.roomId).off("value",S.online.roomCb);
      S.online.roomCb=null;S.online.roomId=null;S.online.role=null;S.battle=null;goto("menu")
    };return
  }

  document.getElementById("a-hit")?.addEventListener("click",()=>act("attack"));
  document.getElementById("a-sig")?.addEventListener("click",()=>act("special"));
  document.getElementById("a-guard")?.addEventListener("click",()=>act("guard"));
  document.getElementById("a-pass")?.addEventListener("click",()=>act("pass"));
  app().querySelectorAll("[data-sw]").forEach(el=>el.addEventListener("click",()=>act("switch",+el.dataset.sw)));
  app().querySelectorAll("[data-bf]").forEach(el=>el.addEventListener("click",()=>act("buff",+el.dataset.bf)));
}

/* ══════════════════════════════════════════
   ACT — routes to AI or online
══════════════════════════════════════════ */
async function act(kind,idx){
  const b=S.battle;if(!b||b.state!=="playing")return;
  if(b.mode==="ai")return actAI(kind,idx);
  if(!S.online.roomId||S.online.lock)return;
  const role=S.online.role;if(b.turn!==role)return;
  S.online.lock=true;
  try{
    const tx=await roomsRef(S.online.roomId).transaction(room=>{
      if(!room||room.status!=="playing"||!room.battle)return room;
      const bb=room.battle;if(bb.turn!==role||bb.state!=="playing")return room;
      const ok=onlineApplyAction(bb,role,kind,idx);if(!ok)return room;
      if(bb.state==="finished")room.status="finished";
      room.updatedAt=now();return room
    },undefined,false);
    if(!tx.committed)toast("Action rejected.")
  }catch(e){console.error(e);toast(`Sync error: ${e.code||"unknown"}`)}
  finally{S.online.lock=false}
}

function actAI(kind,idx){
  const b=S.battle;
  if(!b||b.state!=="playing"||b.turn!=="host"||S.animating)return;
  S.animating=true;
  setCtrlEnabled(false);
  const result=onlineApplyAction(b,"host",kind,idx);
  if(!result){S.animating=false;setCtrlEnabled(true);return}
  animateAction(result,true,()=>{
    S.animating=false;
    if(b.state==="finished"){renderBattle();return}
    setCtrlEnabled(true);
    refreshTurnUI();
    if(b.state==="playing")setTimeout(doAiTurn,680);
  });
}

function doAiTurn(){
  const b=S.battle;
  if(!b||b.mode!=="ai"||b.state!=="playing"||b.turn!=="guest"||S.animating)return;
  S.animating=true;setCtrlEnabled(false);
  const ai=b.guest,a=ai.boxers[ai.active];
  if(!a.statuses)a.statuses={};
  let kind="attack",idx=undefined;
  if(a.statuses.stun){kind="pass"}
  else{
    const low=a.hp<=a.maxHp*.38,canSig=a.momentum>=3&&ai.tc>=2;
    const all=ai.buffs.map((f,i)=>({f,i})).filter(x=>!x.f.used&&ai.tc>=x.f.cost&&condOk(x.f,ai));
    const heals=all.filter(x=>["hp","hp_pct","cleanse","cleanse_hp"].includes(x.f.effect));
    const power=all.filter(x=>["atk","power_up","atk_risk"].includes(x.f.effect));
    const roll=Math.random();
    if(canSig&&roll<.52)                    {kind="special"}
    else if(low&&heals.length&&roll<.62)    {kind="buff";idx=heals[Math.floor(Math.random()*heals.length)].i}
    else if(power.length&&roll<.26&&!low)   {kind="buff";idx=power[Math.floor(Math.random()*power.length)].i}
    else if(!a.guard&&a.momentum<3&&roll<.18){kind="guard"}
  }
  const result=onlineApplyAction(b,"guest",kind,idx);
  if(!result){S.animating=false;setCtrlEnabled(true);return}
  animateAction(result,false,()=>{
    S.animating=false;
    if(b.state==="finished"){renderBattle();return}
    setCtrlEnabled(true);
    refreshTurnUI();
  });
}

function setCtrlEnabled(on){
  ["a-hit","a-sig","a-guard","a-pass"].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.disabled=on?el.dataset.natural==="true"?false:el.disabled:true;
  });
}

function refreshTurnUI(){
  const b=S.battle;if(!b||b.state!=="playing")return;
  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";
  const me=b[myKey],op=b[opKey];
  const myA=me.boxers[me.active];
  const myTurn=b.mode==="ai"?b.turn==="host":b.turn===myRole;
  const can=b.state==="playing"&&myTurn&&!S.online.lock&&!S.animating;
  const isStunned=!!(myA?.statuses?.stun&&myA.statuses.stun>0);
  const sig=SIGNATURES[myA?.id]||{name:"SPECIAL",icon:"⚡"};
  const canSig=can&&!isStunned&&(myA?.momentum||0)>=3&&me.tc>=2;
  // Log
  const lt=document.querySelector(".log-txt");
  if(lt){lt.classList.remove("slide");void lt.offsetWidth;lt.textContent=b.log[b.log.length-1]||"";lt.classList.add("slide")}
  // Turn label
  const tl=document.querySelector(".turn-lbl");
  if(tl){
    if(!can){tl.textContent="○ OPPONENT TURN";tl.className="turn-lbl"}
    else if(isStunned){tl.textContent="⚡ STUNNED — PASS TO RECOVER";tl.className="turn-lbl stunned-lbl"}
    else{tl.textContent="● YOUR TURN";tl.className="turn-lbl yours"}
  }
  // TC
  const myTcEl=document.getElementById("my-tc");if(myTcEl)myTcEl.textContent="TC "+me.tc;
  const opTcEl=document.querySelector(".bar-tc");if(opTcEl)opTcEl.textContent="TC "+op.tc;
  // Rebuild ctrl
  const ctrl=document.getElementById("ctrl-root");if(!ctrl)return;
  const actRow=ctrl.querySelector(".act-row");
  if(actRow){
    actRow.innerHTML=
      `<button class="btn" id="a-guard" ${(can&&!isStunned)?"":"disabled"}>🛡 GUARD</button>`+
      `<button class="btn btn-sig ${canSig?"live":""}" id="a-sig" ${canSig?"":"disabled"}>${sig.icon} ${sig.name}</button>`+
      `<button class="btn" id="a-pass" ${can?"":"disabled"}>${(isStunned&&can)?"SHAKE OFF":"PASS"}</button>`+
      `<button class="btn btn-p" id="a-hit" ${(can&&!isStunned)?"":"disabled"}>ATTACK</button>`;
    document.getElementById("a-hit")?.addEventListener("click",()=>act("attack"));
    document.getElementById("a-sig")?.addEventListener("click",()=>act("special"));
    document.getElementById("a-guard")?.addEventListener("click",()=>act("guard"));
    document.getElementById("a-pass")?.addEventListener("click",()=>act("pass"));
  }
  const swRow=ctrl.querySelector(".slots");
  if(swRow){
    swRow.innerHTML=me.boxers.map((x,i)=>`<button class="slot ${x.dead?"dead":""} ${i===me.active?"active-slot":""}" data-sw="${i}" ${(!can||i===me.active||x.dead||isStunned)?"disabled":""}>${x.icon}</button>`).join("");
    ctrl.querySelectorAll("[data-sw]").forEach(el=>el.addEventListener("click",()=>act("switch",+el.dataset.sw)));
  }
  // Rebuild side buff panel
  const sidePanel=document.getElementById("buff-side-panel");
  if(sidePanel){
    sidePanel.innerHTML=me.buffs.map((f,i)=>{const u=can&&!f.used&&me.tc>=f.cost&&!isStunned;return`<button class="buff ${u?"":"dis"}" data-bf="${i}" ${u?"":"disabled"}><div class="buff-top"><div class="buff-ico">${f.icon}</div><div class="buff-tc">${f.cost}TC</div></div><div class="buff-nm">${f.name}</div></button>`}).join("");
    sidePanel.querySelectorAll("[data-bf]").forEach(el=>el.addEventListener("click",()=>act("buff",+el.dataset.bf)));
  }
}


    load();render();
  </script>
</body>
