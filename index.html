<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hajime no Ippo Ring Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
    :root { --bg:#0b0d14; --bg2:#141a2f; --line:#323b62; --text:#f4f7ff; --muted:#a4add0; --red:#d5153d; --green:#00e676; --fd:"Bebas Neue",sans-serif; --fb:"Barlow Condensed",sans-serif; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); }
    body { font-family:var(--fb); }
    #app { width:100vw; height:100vh; position:relative; }
    .view { position:absolute; inset:0; display:flex; flex-direction:column; animation:fade .2s ease; }
    .btn { border:1px solid var(--line); background:#18203b; color:#fff; border-radius:10px; padding:10px 14px; font-family:var(--fd); letter-spacing:.08em; cursor:pointer; transition:.13s; }
    .btn:hover { transform:translateY(-2px); border-color:#59679f; }
    .btn:disabled { opacity:.35; transform:none; cursor:not-allowed; }
    .btn-p { background:linear-gradient(150deg,#ff4e78,var(--red)); border-color:#ff7693; }
    .menu { align-items:center; justify-content:center; text-align:center; gap:16px; padding:16px; background:radial-gradient(ellipse 120% 90% at 50% 50%, rgba(213,21,61,.2), transparent 64%), radial-gradient(ellipse 120% 90% at 0% 0%, rgba(85,165,255,.15), transparent 64%), var(--bg); }
    .t1,.t3 { font-family:var(--fd); font-size:clamp(3rem,12vw,6.8rem); line-height:.84; }
    .t2 { font-family:var(--fd); font-size:clamp(2rem,8vw,4rem); line-height:1; background:var(--red); display:inline-block; padding:0 18px; transform:skewX(-10deg); }
    .row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    .sub { color:var(--muted); }
    .toast-wrap { position:fixed; top:12px; left:50%; transform:translateX(-50%); z-index:50; }
    .toast { background:#101521; border:1px solid #3a456d; border-radius:999px; padding:9px 14px; }
    .panel { margin:12px; border:1px solid var(--line); border-radius:14px; background:linear-gradient(160deg,#1a2037 0%, #10162a 100%); padding:10px; overflow:hidden; }
    .head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; }
    .tabs,.actions { display:flex; gap:8px; }
    .grid3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    .choice { border:1px solid #3a446e; border-radius:12px; background:#171d33; padding:10px; cursor:pointer; }
    .choice h3 { font-family:var(--fd); letter-spacing:.07em; font-size:1.1rem; }
    .choice p { font-size:.8rem; color:#b4bdd9; }
    .rooms { margin-top:8px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; max-height:170px; overflow:auto; }
    .room { border:1px solid #3c4673; border-radius:10px; background:#141b2f; padding:8px; cursor:pointer; }
    .warn { margin-top:8px; border:1px solid #8a6b2c; background:rgba(138,107,44,.2); color:#ffd892; border-radius:8px; padding:8px; font-size:.8rem; }
    .cards { flex:1; overflow:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); grid-auto-rows:270px; gap:10px; align-content:start; }
    .tcg { border:1px solid #49547f; border-radius:14px; background:linear-gradient(180deg,rgba(246,199,92,.22) 0 38px,rgba(246,199,92,0) 39px), linear-gradient(160deg,#1a213b,#12172a); padding:8px; display:flex; flex-direction:column; gap:6px; box-shadow:0 8px 18px rgba(0,0,0,.35); cursor:pointer; transition:.13s; }
    .tcg:hover { transform:translateY(-2px); border-color:#6576b0; }
    .tcg.sel { border-color:#ff7493; box-shadow:0 0 0 1px rgba(255,116,147,.35), 0 14px 24px rgba(210,21,61,.25); }
    .tcg-top { display:flex; justify-content:space-between; align-items:center; gap:6px; }
    .name { font-family:var(--fd); font-size:1.05rem; letter-spacing:.05em; line-height:.95; }
    .badge { font-size:.62rem; border:1px solid #4a547d; background:#11172c; border-radius:999px; padding:2px 7px; color:#c0c9ea; }
    .art { height:120px; border:1px solid #3f486f; border-radius:10px; background:#101528 center/cover no-repeat; display:grid; place-items:center; font-size:2rem; }
    .title { font-size:.75rem; color:#cad2f3; line-height:1; min-height:28px; }
    .statline { display:flex; gap:5px; flex-wrap:wrap; }
    .pill { font-size:.66rem; border:1px solid #4b567f; background:#10162a; border-radius:999px; padding:2px 6px; }
    .hp { color:#ff9fb5; } .atk { color:#ffd787; } .def { color:#9fceff; } .tc { color:#b6fcb5; } .sp { color:#e6beff; }
    .battle { display:grid; grid-template-rows:auto 1fr auto 1fr auto; }
    .bar { padding:8px 10px; border-bottom:1px solid #313a5d; background:#11182d; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .slots { display:flex; gap:6px; } .slot { width:36px; height:36px; border:1px solid #46507a; border-radius:8px; background:#151c33; display:grid; place-items:center; }
    .slot.dead { opacity:.25; filter:grayscale(1); }
    .fight-card { margin:auto 10px; width:calc(100% - 20px); max-width:700px; border:1px solid #4b5683; border-radius:14px; background:linear-gradient(180deg,rgba(246,199,92,.2) 0 32px,rgba(246,199,92,0) 33px), linear-gradient(160deg,#1a2038,#12182e); padding:10px; display:flex; gap:10px; box-shadow:0 10px 24px rgba(0,0,0,.35); }
    .fight-art { width:96px; min-width:96px; height:96px; border:1px solid #45507b; border-radius:10px; background:#101526 center/cover no-repeat; display:grid; place-items:center; font-size:2rem; }
    .fname { font-family:var(--fd); font-size:1.15rem; letter-spacing:.05em; line-height:.95; }
    .hpb { height:8px; border:1px solid #404a74; border-radius:999px; background:#12192f; overflow:hidden; margin:4px 0; }
    .hpfill { height:100%; background:linear-gradient(90deg,#00e676,#41ffb5); transition:width .22s; }
    .hpfill.mid { background:linear-gradient(90deg,#ff9a25,#ffd16b); } .hpfill.low { background:linear-gradient(90deg,#ff3f66,#ff7c99); }
    .logbox { text-align:center; min-height:58px; display:grid; place-items:center; padding:8px; }
    .turn { font-family:var(--fd); letter-spacing:.2em; color:#bdc5e8; } .log { font-family:var(--fd); font-size:1.02rem; }
    .ctrl { border-top:1px solid #313a5d; background:#10162b; padding:8px; display:flex; flex-direction:column; gap:8px; }
    .buffs { display:flex; gap:8px; overflow:auto; }
    .buff { min-width:138px; border:1px solid #46507a; border-radius:11px; background:linear-gradient(180deg,rgba(90,169,255,.2),transparent 45%), #141a31; padding:6px; text-align:left; cursor:pointer; }
    .buff.dis { opacity:.35; cursor:not-allowed; }
    .ov { position:absolute; inset:0; background:rgba(0,0,0,.84); display:grid; place-items:center; }
    .ov h1 { font-family:var(--fd); font-size:clamp(3rem,10vw,5rem); letter-spacing:.1em; } .win{color:var(--green)} .lose{color:#ff5f82}
    @keyframes fade{from{opacity:0}to{opacity:1}}
    @media (max-width:760px){ .grid3,.rooms{grid-template-columns:1fr} .cards{grid-template-columns:repeat(2,minmax(0,1fr));grid-auto-rows:248px} .fight-art{width:74px;min-width:74px;height:74px} .fname{font-size:1rem} }
  </style>
</head>
<body>

  <script>
    "use strict";
    const FIREBASE_CONFIG={apiKey:"AIzaSyDi-5UoX0hDw7O6UQY5pduKgxQMX5C4KY4",authDomain:"ringclash1.firebaseapp.com",databaseURL:"https://ringclash1-default-rtdb.europe-west1.firebasedatabase.app",projectId:"ringclash1",storageBucket:"ringclash1.firebasestorage.app",messagingSenderId:"373910829853",appId:"1:373910829853:web:319a0093fedf3ef7123ff4"};
    const BOXERS=[{id:"ippo",name:"Makunouchi Ippo",title:"The Wind God",style:"balanced",hp:130,atk:54,def:20,icon:"🥊",img:"assets/boxers/ippo.jpg"},{id:"takamura",name:"Takamura Mamoru",title:"The Beast",style:"slugger",hp:150,atk:60,def:24,icon:"🐻",img:"assets/boxers/takamura.jpg"},{id:"miyata",name:"Miyata Ichiro",title:"Counter King",style:"counter",hp:90,atk:49,def:44,icon:"⚡",img:"assets/boxers/miyata.jpg"},{id:"sendou",name:"Sendou Takeshi",title:"Naniwa Tiger",style:"slugger",hp:122,atk:66,def:14,icon:"🐅",img:"assets/boxers/sendou.jpg"},{id:"volg",name:"Volg Zangief",title:"Red Wolf",style:"balanced",hp:112,atk:52,def:34,icon:"🐺",img:"assets/boxers/volg.jpg"},{id:"ricardo",name:"Ricardo Martinez",title:"The Legend",style:"balanced",hp:168,atk:70,def:31,icon:"👑",img:"assets/boxers/ricardo.jpg"},{id:"date",name:"Date Eiji",title:"The Veteran",style:"tank",hp:128,atk:50,def:37,icon:"🍷",img:"assets/boxers/date.jpg"},{id:"mashiba",name:"Mashiba Ryo",title:"The Reaper",style:"counter",hp:102,atk:59,def:28,icon:"💀",img:"assets/boxers/mashiba.jpg"},{id:"itagaki",name:"Itagaki Manabu",title:"Speed Star",style:"speed",hp:86,atk:43,def:54,icon:"🌀",img:"assets/boxers/itagaki.jpg"},{id:"alfredo",name:"Alfredo Gonzales",title:"Metztli",style:"balanced",hp:140,atk:64,def:30,icon:"🇲🇽",img:"assets/boxers/alfredo.jpg"},{id:"aoki",name:"Aoki Masaru",title:"Frog King",style:"tank",hp:121,atk:41,def:39,icon:"🐸",img:"assets/boxers/aoki.jpg"},{id:"kimura",name:"Kimura Tatsuya",title:"Dragon Fish",style:"speed",hp:114,atk:46,def:35,icon:"🐟",img:"assets/boxers/kimura.jpg"}];
    const BUFFS=[{id:"mitts",name:"Mitts",cost:1,effect:"atk",val:14,icon:"🥊",desc:"+14 ATK"},{id:"steak",name:"Steak",cost:2,effect:"hp",val:60,icon:"🥩",desc:"+60 HP"},{id:"weights",name:"Weights",cost:1,effect:"def",val:16,icon:"⛓️",desc:"+16 DEF"},{id:"focus",name:"Focus",cost:0,effect:"def",val:8,icon:"🧘",desc:"+8 DEF"},{id:"fury",name:"Fury",cost:3,effect:"atk",val:45,icon:"🔥",cond:"low",desc:"+45 ATK (Low HP)"},{id:"doctor",name:"Doctor",cost:2,effect:"hp",val:40,icon:"🩺",desc:"+40 HP"},{id:"plan",name:"Game Plan",cost:1,effect:"tc",val:2,icon:"📝",desc:"+2 TC"},{id:"ice",name:"Ice Pack",cost:1,effect:"hp",val:24,icon:"🧊",desc:"+24 HP"},{id:"peekaboo",name:"Peek-a-boo",cost:2,effect:"def",val:28,icon:"🙈",desc:"+28 DEF"},{id:"adrenaline",name:"Adrenaline",cost:3,effect:"atk",val:36,icon:"💉",desc:"+36 ATK"},{id:"roadwork",name:"Roadwork",cost:1,effect:"tc",val:1,icon:"🏃",desc:"+1 TC"},{id:"corner",name:"Corner Advice",cost:2,effect:"hp",val:48,icon:"📣",desc:"+48 HP"}];
    const S={view:"menu",deckTab:"boxers",deckBoxers:["ippo","takamura","miyata"],deckBuffs:["mitts","steak","weights","focus","doctor"],battle:null,roomList:[],toastTmr:null,online:{db:null,uid:null,roomNode:"rooms",roomId:null,role:null,roomCb:null,listCb:null,lock:false}};
    const app=()=>document.getElementById("app"),deep=x=>JSON.parse(JSON.stringify(x)),now=()=>Date.now(),hasCfg=()=>!!(FIREBASE_CONFIG.apiKey&&!FIREBASE_CONFIG.apiKey.startsWith("PASTE_")),roomsRef=(p="")=>S.online.db.ref(p?`${S.online.roomNode}/${p}`:S.online.roomNode),rid=()=>`r_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,rcode=()=>Math.random().toString(36).slice(2,7).toUpperCase();
    const artBg=u=>u?`style="background-image:url('${u}');"`:"";
    function toast(m){const w=document.getElementById("toast-wrap");w.innerHTML=`<div class="toast">${m}</div>`;clearTimeout(S.toastTmr);S.toastTmr=setTimeout(()=>w.innerHTML="",2600)}
    function load(){try{const d=JSON.parse(localStorage.getItem("ring_rebuild_v1")||"{}");if(Array.isArray(d.b)&&d.b.length)S.deckBoxers=d.b;if(Array.isArray(d.f)&&d.f.length)S.deckBuffs=d.f}catch{}}
    function save(){localStorage.setItem("ring_rebuild_v1",JSON.stringify({b:S.deckBoxers,f:S.deckBuffs}))}
    async function initOnline(){if(!hasCfg())return false;if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);if(!S.online.db)S.online.db=firebase.database();if(firebase.auth().currentUser){S.online.uid=firebase.auth().currentUser.uid;return true}try{await firebase.auth().signInAnonymously();S.online.uid=firebase.auth().currentUser?.uid||null;return !!S.online.uid}catch(e){console.error(e);toast("Enable Anonymous Auth in Firebase.");return false}}
    async function detectNode(){const ns=["rooms","rooms2","rooms2d"];for(const n of ns){try{await S.online.db.ref(n).limitToFirst(1).get();S.online.roomNode=n;return}catch{}}S.online.roomNode="rooms"}
    function goto(v){S.view=v;render()}
    function readyDeck(){if(S.deckBoxers.length!==3||S.deckBuffs.length!==5){toast("Pick 3 fighters and 5 buffs.");return false}return true}
    function mkSide(bids,fids,label){return{label,boxers:bids.map((id,i)=>{const b=BOXERS.find(x=>x.id===id);return{...b,maxHp:b.hp,hp:b.hp,dead:false,guard:false,momentum:0,iid:`${label}_${i}`}}),buffs:fids.map((id,i)=>{const f=BUFFS.find(x=>x.id===id);return{...f,used:false,iid:`${label}_f${i}`}}),active:0,tc:2}}
    function mkAiDeck(){return{b:deep(BOXERS).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.id),f:deep(BUFFS).sort(()=>Math.random()-.5).slice(0,5).map(x=>x.id)}}
    function mkBattle(mode,hd,gd,hn,gn){return{mode,state:"playing",turn:"host",turnCount:1,winner:null,log:["The bell rings!"],host:mkSide(hd.b,hd.f,hn),guest:mkSide(gd.b,gd.f,gn)}}
    function hpClass(h,m){const p=h/m;return p<.3?"low":(p<.6?"mid":"")}
    function hashRoll(seed){let h=0;for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))%100000;return (Math.sin(h)+1)/2}
    function styleBonus(style){if(style==="slugger")return 6;if(style==="speed")return 2;return 0}
    function resolveAttack(state,atk,def,salt){
      const dodgeChance=def.style==="speed"?0.15:0.05;
      if(hashRoll(`${salt}|dodge`) < dodgeChance){ atk.momentum=Math.min(3,atk.momentum+1); return {log:`${def.name} evades the punch!`}; }
      let dmg=Math.max(8,atk.atk-Math.floor(def.def/2))+styleBonus(atk.style)+(atk.momentum*2);
      const critChance=Math.min(0.35,0.08+atk.momentum*0.08);
      let crit=false,counter=0;
      if(hashRoll(`${salt}|crit`) < critChance){dmg=Math.floor(dmg*1.5);crit=true;}
      if(def.guard){dmg=Math.floor(dmg*0.6);if(def.style==="counter"){counter=Math.max(6,Math.floor(def.atk*0.35));atk.hp=Math.max(0,atk.hp-counter);}def.guard=false;}
      def.hp=Math.max(0,def.hp-dmg);atk.momentum=Math.min(3,atk.momentum+1);def.momentum=0;
      const log=`${atk.name} lands ${dmg}${crit?" CRIT":""}${counter?` · Counter ${counter}`:""}`;
      return {log};
    }
    function nextAlive(s){return s.boxers.findIndex(x=>!x.dead)}
    function condOk(f,s){if(!f.cond)return true;const a=s.boxers[s.active];if(f.cond==="low")return a.hp<=a.maxHp*.4;return true}
    function applyBuff(f,s){const a=s.boxers[s.active];if(f.effect==="atk")a.atk+=f.val;if(f.effect==="def")a.def+=f.val;if(f.effect==="hp")a.hp=Math.min(a.maxHp,a.hp+f.val);if(f.effect==="tc")s.tc=Math.min(8,s.tc+f.val)}
    function endTurn(bb){bb.turn=bb.turn==="host"?"guest":"host";bb.turnCount++}

    function render(){if(S.view==="menu")return renderMenu();if(S.view==="deck")return renderDeck();if(S.view==="arena")return renderArena();if(S.view==="battle")return renderBattle()}
    function renderMenu(){app().innerHTML=`<div class="view menu"><div class="t1">HAJIME NO</div><div class="t2">IPPO</div><div class="t3">RING CLASH</div><div class="row"><button class="btn btn-p" id="m-ar">ENTER ARENA</button><button class="btn" id="m-de">DECK BUILDER</button></div><div class="sub">Strategic turn-based TCG combat · Online rooms</div></div>`;document.getElementById("m-ar").onclick=()=>goto("arena");document.getElementById("m-de").onclick=()=>goto("deck")}
    function renderDeck(){const isB=S.deckTab==="boxers",src=isB?BOXERS:BUFFS,sel=isB?S.deckBoxers:S.deckBuffs,ready=S.deckBoxers.length===3&&S.deckBuffs.length===5;app().innerHTML=`<div class="view panel"><div class="head"><button class="btn" id="d-bk">Back</button><div>Fighters ${S.deckBoxers.length}/3 · Buffs ${S.deckBuffs.length}/5</div><button class="btn btn-p" id="d-sv" ${ready?"":"disabled"}>Save</button></div><div class="tabs"><button class="btn ${isB?"btn-p":""}" id="d-tb">Boxers</button><button class="btn ${!isB?"btn-p":""}" id="d-tf">Buffs</button></div><div class="cards">${src.map(x=>`<div class="tcg ${sel.includes(x.id)?"sel":""}" data-id="${x.id}"><div class="tcg-top"><div class="name">${x.name}</div><div class="badge">${isB?"BOXER":"BUFF"}</div></div><div class="art" ${isB?artBg(x.img):""}>${isB?"":x.icon}</div><div class="title">${isB?`${x.title} · ${x.style.toUpperCase()}`:x.desc}</div>${isB?`<div class="statline"><span class="pill hp">HP ${x.hp}</span><span class="pill atk">ATK ${x.atk}</span><span class="pill def">DEF ${x.def}</span><span class="pill sp">${x.style}</span></div>`:`<div class="statline"><span class="pill tc">COST ${x.cost}</span><span class="pill">${x.effect.toUpperCase()}</span></div>`}</div>`).join("")}</div></div>`;document.getElementById("d-bk").onclick=()=>goto("menu");document.getElementById("d-sv").onclick=()=>{save();toast("Deck saved.");goto("menu")};document.getElementById("d-tb").onclick=()=>{S.deckTab="boxers";renderDeck()};document.getElementById("d-tf").onclick=()=>{S.deckTab="buffs";renderDeck()};app().querySelectorAll("[data-id]").forEach(el=>el.onclick=()=>toggle(el.dataset.id,isB?"boxer":"buff"))}
    function toggle(id,k){if(k==="boxer"){if(S.deckBoxers.includes(id))S.deckBoxers=S.deckBoxers.filter(x=>x!==id);else if(S.deckBoxers.length<3)S.deckBoxers.push(id);else return toast("3 fighters max.")}else{if(S.deckBuffs.includes(id))S.deckBuffs=S.deckBuffs.filter(x=>x!==id);else if(S.deckBuffs.length<5)S.deckBuffs.push(id);else return toast("5 buffs max.")}renderDeck()}

    async function renderArena(){const cfg=hasCfg();if(cfg){await initOnline();await detectNode();subscribeRooms()}app().innerHTML=`<div class="view panel"><div class="head"><button class="btn" id="a-bk">Back</button><div style="font-family:var(--fd);letter-spacing:.08em;">Choose Match</div><div></div></div><div class="grid3"><div class="choice" id="a-ai"><h3>AI Match</h3><p>Single-player tactical duel.</p></div><div class="choice" id="a-cr"><h3>Create Room</h3><p>Host live online match.</p></div><div class="choice" id="a-jn"><h3>Join by Code</h3><p>Enter a room code.</p></div></div><div style="margin-top:10px;font-family:var(--fd);letter-spacing:.08em;">Open Rooms</div><div class="rooms">${S.roomList.length?S.roomList.map(r=>`<div class="room" data-r="${r.id}"><b>${r.code}</b><div style="font-size:.78rem;color:#aab4d7;">${r.hostName}</div></div>`).join(""):`<div style="color:#9da8cd;">No open rooms.</div>`}</div>${cfg?`<div class="warn">Connected node: ${S.online.roomNode}</div>`:`<div class="warn">Fill FIREBASE_CONFIG first.</div>`}</div>`;document.getElementById("a-bk").onclick=()=>goto("menu");document.getElementById("a-ai").onclick=startAI;document.getElementById("a-cr").onclick=createRoom;document.getElementById("a-jn").onclick=joinByCode;app().querySelectorAll("[data-r]").forEach(el=>el.onclick=()=>joinRoom(el.dataset.r))}
    function startAI(){if(!readyDeck())return;const me={b:S.deckBoxers,f:S.deckBuffs},ai=mkAiDeck();S.battle=mkBattle("ai",me,ai,"YOU","CPU");goto("battle")}
    async function createRoom(){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const id=rid(),code=rcode(),hostName="Host-"+S.online.uid.slice(-4).toUpperCase();const room={code,status:"open",createdAt:now(),updatedAt:now(),hostUid:S.online.uid,hostName,hostDeck:{b:S.deckBoxers,f:S.deckBuffs},guestUid:null,guestName:null,guestDeck:null,battle:null};try{await roomsRef(id).set(room);S.online.roomId=id;S.online.role="host";watchRoom(id);toast(`Room ${code} created.`)}catch(e){console.error(e);toast(`Create failed: ${e.code||"unknown"}`)}}
    async function joinByCode(){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const code=(prompt("Enter room code:")||"").trim().toUpperCase();if(!code)return;try{const s=await roomsRef().orderByChild("code").equalTo(code).get();let id=null;s.forEach(c=>{const v=c.val()||{};if(!id&&v.status==="open")id=c.key});if(!id)return toast("No open room with that code.");await joinRoom(id)}catch(e){console.error(e);toast(`Join failed: ${e.code||"unknown"}`)}}
    async function joinRoom(id){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const ref=roomsRef(id);try{const tx=await ref.transaction(room=>{if(!room||room.status!=="open"||room.guestUid)return;room.guestUid=S.online.uid;room.guestName="Guest-"+S.online.uid.slice(-4).toUpperCase();room.guestDeck={b:S.deckBoxers,f:S.deckBuffs};room.status="playing";room.battle=mkBattle("online",room.hostDeck,room.guestDeck,room.hostName,room.guestName);room.updatedAt=now();return room},undefined,false);if(!tx.committed)return toast("Room not available.");S.online.roomId=id;S.online.role="guest";watchRoom(id)}catch(e){console.error(e);toast(`Join failed: ${e.code||"unknown"}`)}}
    function subscribeRooms(){if(!S.online.db||S.online.listCb)return;const q=roomsRef().orderByChild("status").equalTo("open");const cb=snap=>{const rows=[];snap.forEach(ch=>{const v=ch.val()||{};rows.push({id:ch.key,code:v.code||"-----",hostName:v.hostName||"Host",createdAt:v.createdAt||0})});rows.sort((a,b)=>b.createdAt-a.createdAt);S.roomList=rows.slice(0,40);if(S.view==="arena")renderArena()};q.on("value",cb);S.online.listCb=cb}
    function watchRoom(id){if(S.online.roomCb&&S.online.roomId)roomsRef(S.online.roomId).off("value",S.online.roomCb);const cb=snap=>{const room=snap.val();if(!room){toast("Room closed.");S.online.roomId=null;S.online.role=null;goto("arena");return}if(room.battle){S.battle=deep(room.battle);S.battle.mode="online";if(S.view!=="battle")goto("battle");else renderBattle()}};roomsRef(id).on("value",cb);S.online.roomCb=cb;if(S.view!=="battle")goto("battle")}

    function fightCard(bx){const pct=Math.max(0,(bx.hp/bx.maxHp)*100).toFixed(1);return `<div class="fight-card"><div class="fight-art" ${artBg(bx.img)}>${bx.img?"":bx.icon}</div><div style="flex:1;min-width:0;"><div style="display:flex;justify-content:space-between;align-items:center;gap:6px;"><div class="fname">${bx.name}</div><div class="badge">FIGHTER</div></div><div class="title">${bx.title} · ${bx.style.toUpperCase()}</div><div class="hpb"><div class="hpfill ${hpClass(bx.hp,bx.maxHp)}" style="width:${pct}%"></div></div><div class="statline"><span class="pill hp">HP ${bx.hp}/${bx.maxHp}</span><span class="pill atk">ATK ${bx.atk}</span><span class="pill def">DEF ${bx.def}</span><span class="pill sp">MOM ${bx.momentum||0}</span>${bx.guard?'<span class="pill tc">GUARD</span>':''}</div></div></div>`}
    function renderBattle(){const b=S.battle;if(!b)return goto("menu");const myRole=b.mode==="online"?S.online.role:"host",myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";const me=b[myKey],op=b[opKey],myTurn=(b.mode==="ai"?b.turn==="host":b.turn===myRole),can=b.state==="playing"&&myTurn&&!S.online.lock;app().innerHTML=`<div class="view battle"><div class="bar"><div class="slots">${op.boxers.map(x=>`<div class="slot ${x.dead?"dead":""}">${x.icon}</div>`).join("")}</div><div>${op.label} · TC ${op.tc}</div></div>${fightCard(op.boxers[op.active])}<div class="logbox"><div><div class="turn">${can?"YOUR TURN":"OPPONENT TURN"}</div><div class="log">${b.log[b.log.length-1]||""}</div></div></div>${fightCard(me.boxers[me.active])}<div class="ctrl"><div class="actions"><div class="slots">${me.boxers.map((x,i)=>`<button class="slot ${x.dead?"dead":""}" data-sw="${i}" ${(!can||i===me.active||x.dead)?"disabled":""}>${x.icon}</button>`).join("")}</div><div class="actions"><button class="btn" id="a-guard" ${can?"":"disabled"}>GUARD</button><button class="btn" id="a-pass" ${can?"":"disabled"}>END TURN</button><button class="btn btn-p" id="a-hit" ${can?"":"disabled"}>ATTACK</button></div></div><div class="buffs">${me.buffs.map((f,i)=>{const u=can&&!f.used&&me.tc>=f.cost;return `<button class="buff ${u?"":"dis"}" data-bf="${i}" ${u?"":"disabled"}><div class="badge">BUFF</div><div style="font-size:1.2rem">${f.icon}</div><div style="font-family:var(--fd);line-height:1">${f.name}</div><div style="font-size:.7rem;color:#b4bde1">${f.desc}</div><div class="statline"><span class="pill tc">${f.cost} TC</span></div></button>`}).join("")}</div></div>${b.state==="finished"?`<div class="ov"><div style="text-align:center"><h1 class="${((b.mode==="ai"&&b.winner==="host")||(b.mode==="online"&&b.winner===myRole))?"win":"lose"}">${((b.mode==="ai"&&b.winner==="host")||(b.mode==="online"&&b.winner===myRole))?"VICTORY":"DEFEAT"}</h1><button class="btn btn-p" id="b-ex">MENU</button></div></div>`:""}</div>`;if(b.state==="finished"){document.getElementById("b-ex").onclick=()=>{if(S.online.roomCb&&S.online.roomId)roomsRef(S.online.roomId).off("value",S.online.roomCb);S.online.roomCb=null;S.online.roomId=null;S.online.role=null;S.battle=null;goto("menu")};return}document.getElementById("a-hit").onclick=()=>act("attack");document.getElementById("a-guard").onclick=()=>act("guard");document.getElementById("a-pass").onclick=()=>act("pass");app().querySelectorAll("[data-sw]").forEach(el=>el.onclick=()=>act("switch",+el.dataset.sw));app().querySelectorAll("[data-bf]").forEach(el=>el.onclick=()=>act("buff",+el.dataset.bf))}

    function onlineApplyAction(bb,role,kind,idx){const me=bb[role],op=bb[role==="host"?"guest":"host"],myA=me.boxers[me.active],opA=op.boxers[op.active];let log=null;if(kind==="attack"){const r=resolveAttack(bb,myA,opA,`${bb.turnCount}|${myA.iid}|${opA.iid}`);log=r.log;me.tc=Math.min(8,me.tc+1);if(opA.hp<=0){opA.hp=0;opA.dead=true;log=`KO! ${opA.name} is down`;const ni=nextAlive(op);if(ni<0){bb.state="finished";bb.winner=role}else op.active=ni}}else if(kind==="switch"){if(typeof idx!=="number"||idx===me.active||!me.boxers[idx]||me.boxers[idx].dead||me.tc<1)return null;me.active=idx;me.tc-=1;log=`${me.boxers[idx].name} tagged in`}else if(kind==="buff"){if(typeof idx!=="number"||!me.buffs[idx])return null;const f=me.buffs[idx];if(f.used||me.tc<f.cost||!condOk(f,me))return null;applyBuff(f,me);f.used=true;me.tc-=f.cost;log=`${myA.name} used ${f.name}`}else if(kind==="guard"){myA.guard=true;myA.momentum=Math.min(3,myA.momentum+1);log=`${myA.name} takes guard stance`}else if(kind==="pass"){me.tc=Math.min(8,me.tc+1);log="Turn passed (+1 TC)"}if(!log)return null;bb.log.push(log);endTurn(bb);return true}
    async function act(kind,idx){const b=S.battle;if(!b||b.state!=="playing")return;if(b.mode==="ai")return actAI(kind,idx);if(!S.online.roomId||S.online.lock)return;const role=S.online.role;if(b.turn!==role)return;S.online.lock=true;try{const tx=await roomsRef(S.online.roomId).transaction(room=>{if(!room||room.status!=="playing"||!room.battle)return room;const bb=room.battle;if(bb.turn!==role||bb.state!=="playing")return room;const ok=onlineApplyAction(bb,role,kind,idx);if(!ok)return room;if(bb.state==="finished")room.status="finished";room.updatedAt=now();return room},undefined,false);if(!tx.committed)toast("Action rejected.")}catch(e){console.error(e);toast(`Sync error: ${e.code||"unknown"}`)}finally{S.online.lock=false}}

    function actAI(kind,idx){const b=S.battle;if(!b||b.state!=="playing"||b.turn!=="host")return;const ok=onlineApplyAction(b,"host",kind,idx);if(!ok)return;renderBattle();if(b.state==="playing")setTimeout(aiTurn,700)}
    function aiTurn(){const b=S.battle;if(!b||b.mode!=="ai"||b.state!=="playing"||b.turn!=="guest")return;const ai=b.guest,a=ai.boxers[ai.active];const low=a.hp<=a.maxHp*.45;const canGuard=!a.guard&&ai.tc>=0;const usable=ai.buffs.map((f,i)=>({f,i})).filter(x=>!x.f.used&&ai.tc>=x.f.cost&&condOk(x.f,ai));if(low&&canGuard&&Math.random()<.35){onlineApplyAction(b,"guest","guard")}else if(usable.length&&Math.random()<.33){const pick=usable[Math.floor(Math.random()*usable.length)];onlineApplyAction(b,"guest","buff",pick.i)}else{onlineApplyAction(b,"guest","attack")}renderBattle()}
    load();render();
  </script>
