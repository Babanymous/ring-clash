<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hajime no Ippo: Ring Clash Ultra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #000;
  --bg2:       #080808;
  --bg3:       #111;
  --border:    #1c1c1c;
  --border2:   #2a2a2a;
  --red:       #dc143c;
  --red-dark:  #8b0c23;
  --red-light: #ff1744;
  --gold:      #ffd700;
  --green:     #00e676;
  --orange:    #ff8c00;
  --blue:      #2979ff;
  --white:     #fff;
  --dim:       #555;
  --dimmer:    #333;
  --font-d:    'Bebas Neue', sans-serif;
  --font-b:    'Barlow Condensed', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:var(--bg); }
body {
  color: var(--white);
  font-family: var(--font-b);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
/* Scanlines overlay */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
}
#app { height:100vh; width:100vw; overflow:hidden; position:relative; }
#toast-wrap { position:fixed; top:72px; left:50%; transform:translateX(-50%); z-index:2000; pointer-events:none; }
.toast {
  background: var(--red); color:#fff;
  font-family: var(--font-d); font-size:1.05rem; letter-spacing:.12em;
  padding:11px 28px; border-radius:100px;
  border:1.5px solid rgba(255,255,255,.2);
  box-shadow: 0 0 40px rgba(220,20,60,.6), 0 8px 24px rgba(0,0,0,.6);
  animation: dropIn .3s cubic-bezier(.175,.885,.32,1.275) forwards;
}
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

/* ── KEYFRAMES ── */
@keyframes dropIn   { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
@keyframes viewIn   { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes punchUp  { 0%{transform:scale(1) translateY(0)} 50%{transform:scale(1.18) translateY(-28px);filter:brightness(1.5)} 100%{transform:scale(1) translateY(0)} }
@keyframes punchDn  { 0%{transform:scale(1) translateY(0)} 50%{transform:scale(1.18) translateY(28px);filter:brightness(1.5)} 100%{transform:scale(1) translateY(0)} }
@keyframes flashRed { 0%,100%{background-color:transparent} 30%{background-color:rgba(220,20,60,.22)} }
@keyframes flashBlu { 0%,100%{background-color:transparent} 30%{background-color:rgba(41,121,255,.22)} }
@keyframes koSlam   { 0%{transform:scale(2) rotate(-4deg);opacity:0} 60%{transform:scale(.95) rotate(1deg);opacity:1} 100%{transform:scale(1) rotate(0)} }
@keyframes beatHp   { 0%{transform:scaleX(1)} 20%{transform:scaleX(1.04)} 100%{transform:scaleX(1)} }
@keyframes pulsBtn  { 0%,100%{box-shadow:0 0 20px rgba(220,20,60,.4),0 4px 0 var(--red-dark)} 50%{box-shadow:0 0 44px rgba(220,20,60,.75),0 4px 0 var(--red-dark)} }
@keyframes titleGlo { 0%,100%{text-shadow:0 0 80px rgba(220,20,60,.25),0 3px 0 rgba(220,20,60,.5)} 50%{text-shadow:0 0 140px rgba(220,20,60,.55),0 3px 0 rgba(220,20,60,.9)} }
@keyframes bounce   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
@keyframes logIn    { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.45} }

/* ── SHARED ── */
.view { position:absolute; inset:0; display:flex; flex-direction:column; animation:viewIn .22s ease; }

/* ── BUTTONS ── */
.btn-p {
  background:#fff; color:#000;
  font-family:var(--font-d); font-size:1.4rem; letter-spacing:.15em;
  padding:16px 44px; border:none; cursor:pointer;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:all .14s;
}
.btn-p:hover { background:var(--red); color:#fff; transform:translateY(-2px); box-shadow:0 8px 28px rgba(220,20,60,.45); }
.btn-p:active { transform:translateY(0); }

.btn-s {
  background:transparent; color:var(--white);
  font-family:var(--font-d); font-size:1.4rem; letter-spacing:.15em;
  padding:16px 44px; border:2px solid var(--border2); cursor:pointer;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:all .14s;
}
.btn-s:hover { border-color:#fff; transform:translateY(-2px); }

/* ════════════════════════════════════════
   MENU
════════════════════════════════════════ */
.view-menu {
  align-items:center; justify-content:center;
  background: radial-gradient(ellipse 90% 70% at 50% 55%, rgba(220,20,60,.08) 0%, transparent 70%), #000;
  overflow:hidden;
}
.menu-rays {
  position:absolute; inset:0; pointer-events:none;
  background: repeating-conic-gradient(from 0deg at 50% 50%, rgba(220,20,60,.025) 0deg 1deg, transparent 1deg 9deg);
}
.menu-body { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:44px; }

.menu-title { text-align:center; line-height:.88; }
.mt-top {
  font-family:var(--font-d);
  font-size:clamp(4.5rem,14vw,8.5rem);
  color:#fff; letter-spacing:-.02em;
  animation: titleGlo 3s ease infinite;
}
.mt-band {
  display:inline-block; background:var(--red); padding:3px 22px;
  transform:skewX(-9deg); margin:2px 0;
  box-shadow:0 0 40px rgba(220,20,60,.55);
}
.mt-no {
  font-family:var(--font-d);
  font-size:clamp(2.5rem,7vw,4.5rem);
  color:#fff; letter-spacing:.1em;
  display:inline-block; transform:skewX(9deg);
}
.mt-bot {
  font-family:var(--font-d);
  font-size:clamp(4.5rem,14vw,8.5rem);
  color:#fff; letter-spacing:-.02em;
  animation: titleGlo 3s ease 1.5s infinite;
}
.mt-sub {
  font-family:var(--font-d); font-size:clamp(.9rem,2.5vw,1.6rem);
  background:#fff; color:#000; display:inline-block;
  padding:5px 18px; margin-top:14px; letter-spacing:.3em;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
}
.menu-btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.menu-note { color:#383838; font-size:.82rem; letter-spacing:.06em; }

/* ════════════════════════════════════════
   DECK BUILDER
════════════════════════════════════════ */
.view-deck { background:#050505; }
.deck-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; background:#090909;
  border-bottom:1px solid var(--border); flex-shrink:0; gap:10px;
}
.btn-back {
  background:none; border:1px solid var(--border2); color:var(--dim);
  font-family:var(--font-b); font-weight:700; font-size:.85rem; letter-spacing:.08em;
  padding:7px 14px; border-radius:4px; cursor:pointer; transition:all .12s; text-transform:uppercase;
}
.btn-back:hover { color:#fff; border-color:#fff; }
.deck-counts { display:flex; gap:18px; }
.d-cnt { font-family:var(--font-d); font-size:1.05rem; color:var(--dim); letter-spacing:.06em; transition:color .2s; }
.d-cnt.ok { color:var(--green); }
.btn-confirm {
  background:var(--red); color:#fff;
  font-family:var(--font-d); font-size:.95rem; letter-spacing:.14em;
  padding:9px 22px; border:none; border-radius:4px; cursor:pointer; transition:all .14s;
}
.btn-confirm:disabled { background:var(--border); color:var(--dimmer); cursor:not-allowed; }
.btn-confirm:not(:disabled):hover { background:var(--red-light); transform:scale(1.04); }

.deck-tabs { display:flex; padding:10px 18px; gap:8px; flex-shrink:0; background:#050505; }
.tab-btn {
  flex:1; padding:11px; background:none;
  border:1px solid var(--border); color:var(--dimmer);
  font-family:var(--font-d); font-size:.95rem; letter-spacing:.1em;
  border-radius:4px; cursor:pointer; transition:all .14s;
}
.tab-btn:hover { border-color:var(--border2); color:#888; }
.tab-btn.active { background:var(--bg3); border-color:var(--red); color:#fff; }

.card-grid {
  flex:1; overflow-y:auto; padding:14px 18px;
  display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px;
  align-content:start;
}
.m-card {
  background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  cursor:pointer; transition:all .15s; opacity:.45; filter:grayscale(.4); position:relative;
  overflow:hidden;
}
.m-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;
}
.m-card:hover { opacity:.82; filter:grayscale(0); border-color:var(--border2); transform:translateY(-3px); }
.m-card.sel { opacity:1; filter:grayscale(0); border-color:var(--red); box-shadow:0 0 18px rgba(220,20,60,.32); }
.m-card-in { padding:11px 10px; display:flex; flex-direction:column; align-items:center; gap:4px; }
.m-icon { font-size:2.4rem; line-height:1; margin-bottom:3px; filter:drop-shadow(0 2px 6px rgba(0,0,0,.8)); }
.m-name { font-family:var(--font-d); font-size:.82rem; letter-spacing:.05em; text-align:center; color:#fff; line-height:1.1; }
.m-title { font-size:.62rem; color:var(--red); font-weight:700; letter-spacing:.1em; text-align:center; text-transform:uppercase; }
.m-stats { display:flex; gap:5px; font-size:.68rem; font-weight:700; margin-top:3px; flex-wrap:wrap; justify-content:center; }
.s-hp { color:#ff4466; } .s-atk { color:#ffaa00; } .s-def { color:#4da6ff; }
.s-tc { color:var(--gold); font-family:var(--font-d); } .s-eff { color:#666; text-transform:uppercase; font-size:.58rem; }
.m-check {
  position:absolute; top:5px; right:5px; background:var(--red); color:#fff;
  font-size:.65rem; font-weight:900; width:16px; height:16px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}

/* ════════════════════════════════════════
   BATTLE
════════════════════════════════════════ */
.view-battle {
  display:grid;
  grid-template-rows: auto 1fr auto 1fr auto;
  height:100vh; background:var(--bg); overflow:hidden;
}
.view-battle::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 70% 35% at 50% 0%,   rgba(220,20,60,.07)   0%, transparent 60%),
    radial-gradient(ellipse 70% 35% at 50% 100%, rgba(41,121,255,.07)  0%, transparent 60%);
}
.flash-red { animation:flashRed .55s ease-in-out; }
.flash-blu { animation:flashBlu .55s ease-in-out; }

/* Opp area */
.b-opp-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 14px; z-index:1;
  background:rgba(220,20,60,.04); border-bottom:1px solid rgba(220,20,60,.1);
}
.team-slots { display:flex; gap:7px; align-items:center; }
.t-slot {
  width:40px; height:40px; border-radius:7px;
  display:flex; align-items:center; justify-content:center; font-size:1.3rem;
  border:1px solid var(--border); background:var(--bg2); transition:all .2s; cursor:default;
}
.t-slot.mine   { border-color:var(--green); background:rgba(0,230,118,.08); box-shadow:0 0 10px rgba(0,230,118,.28); }
.t-slot.theirs { border-color:var(--red);   background:rgba(220,20,60,.08);  box-shadow:0 0 10px rgba(220,20,60,.28); }
.t-slot.dead   { opacity:.18; filter:grayscale(1); }
.t-slot.switchable { cursor:pointer; }
.t-slot.switchable:hover { border-color:#fff; transform:scale(1.1); }
.p-tag { font-family:var(--font-d); color:var(--dimmer); font-size:.85rem; letter-spacing:.1em; margin-left:3px; }

.tc-bar { display:flex; gap:3px; }
.tc-pip {
  width:11px; height:6px; border-radius:2px;
  background:var(--bg3); border:1px solid var(--border); transition:all .2s;
}
.tc-pip.on      { background:#fff; box-shadow:0 0 6px rgba(255,255,255,.45); border-color:rgba(255,255,255,.3); }
.tc-pip.on-opp  { background:rgba(220,20,60,.7); box-shadow:0 0 5px rgba(220,20,60,.4); border-color:rgba(220,20,60,.3); }

/* Fighter cards in arena */
.b-card-wrap {
  display:flex; align-items:center; justify-content:center;
  z-index:1; padding:6px 14px;
}
.anim-punch  { animation:punchUp .36s cubic-bezier(.175,.885,.32,1.275); }
.anim-oppunch { animation:punchDn .36s cubic-bezier(.175,.885,.32,1.275); }

.b-card {
  display:flex; align-items:center; gap:14px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:10px 16px;
  width:100%; max-width:420px; position:relative; overflow:hidden;
}
.b-card::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(135deg, rgba(255,255,255,.025) 0%, transparent 50%);
}
.bc-ico {
  font-size:2.8rem; line-height:1; flex-shrink:0;
  filter:drop-shadow(0 0 14px rgba(255,255,255,.1));
  transition:transform .3s;
}
.b-card:hover .bc-ico { transform:scale(1.12); }
.bc-body { flex:1; min-width:0; }
.bc-name {
  font-family:var(--font-d); font-size:1.2rem; letter-spacing:.05em;
  color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px;
}
.bc-hpwrap {
  height:7px; background:var(--bg3); border-radius:4px; overflow:hidden;
  margin-bottom:3px; border:1px solid var(--border);
}
.bc-hpbar {
  height:100%; border-radius:4px; transition:width .4s ease;
  transform-origin:left center;
}
.hp-hi  { background:linear-gradient(90deg,#00c851,#00e676); }
.hp-md  { background:linear-gradient(90deg,#ff8c00,#ffb300); }
.hp-lo  { background:linear-gradient(90deg,var(--red),#ff4466); box-shadow:0 0 7px rgba(220,20,60,.55); }
.bc-hptxt { font-size:.72rem; font-weight:700; color:#444; margin-bottom:3px; font-variant-numeric:tabular-nums; }
.bc-stats { display:flex; gap:10px; font-size:.82rem; font-weight:700; color:#666; }
.ko-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.88);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-d); font-size:3.5rem; color:var(--red); letter-spacing:.2em;
  text-shadow:0 0 40px rgba(220,20,60,.8);
  animation:koSlam .3s cubic-bezier(.175,.885,.32,1.275);
}
.b-card.dead { opacity:.5; }

/* Combat log */
.b-log {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:6px 16px; z-index:1; text-align:center; min-height:54px;
}
.b-turn {
  font-family:var(--font-d); font-size:.68rem; letter-spacing:.45em;
  margin-bottom:3px; text-transform:uppercase;
}
.b-turn.mine { color:var(--green); }
.b-turn.theirs { color:var(--red); animation:pulse 1.1s infinite; }
.b-turn.thinking { color:#666; animation:pulse 1.1s infinite; }
.b-logtext {
  font-family:var(--font-d); font-size:1.05rem; color:#fff; letter-spacing:.04em;
  animation:logIn .25s ease;
}

/* Controls */
.b-controls {
  background:rgba(5,5,5,.98); border-top:1px solid var(--border);
  padding:10px 14px; z-index:1; flex-shrink:0;
}
.ctrl-top {
  display:flex; align-items:center; justify-content:space-between;
  gap:10px; margin-bottom:10px; flex-wrap:nowrap;
}
.my-tc-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
.tc-lbl { font-family:var(--font-d); font-size:.62rem; letter-spacing:.2em; color:var(--dimmer); }

.punch-btn {
  font-family:var(--font-d); font-size:1.5rem; letter-spacing:.2em;
  padding:13px 28px; border:none; cursor:pointer;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:all .12s; white-space:nowrap;
}
.punch-btn.on {
  background:var(--red); color:#fff;
  box-shadow:0 0 22px rgba(220,20,60,.5),0 4px 0 var(--red-dark);
  animation:pulsBtn 2s ease infinite;
}
.punch-btn.on:hover { background:var(--red-light); transform:translateY(-2px); box-shadow:0 0 50px rgba(220,20,60,.7),0 6px 0 var(--red-dark); }
.punch-btn.on:active { transform:translateY(2px); box-shadow:0 0 18px rgba(220,20,60,.3),0 2px 0 var(--red-dark); }
.punch-btn.off { background:var(--bg3); color:var(--dimmer); cursor:not-allowed; box-shadow:none; }

/* Buff bar */
.buff-bar { display:flex; gap:7px; overflow-x:auto; padding-bottom:3px; }
.buff-bar::-webkit-scrollbar { height:3px; }
.buff-bar::-webkit-scrollbar-thumb { background:var(--border2); }
.bf-card {
  flex-shrink:0; width:76px; background:var(--bg2); border:1px solid var(--border);
  border-radius:8px; padding:7px 6px; display:flex; flex-direction:column;
  align-items:center; gap:3px; transition:all .14s; position:relative;
}
.bf-card.usable { opacity:1; cursor:pointer; }
.bf-card.usable:hover { border-color:#fff; transform:translateY(-5px); box-shadow:0 10px 28px rgba(0,0,0,.6); }
.bf-card.disabled { opacity:.3; filter:grayscale(.5); }
.bf-card.used     { opacity:.12; filter:grayscale(1); }
.bf-ico { font-size:1.35rem; line-height:1; }
.bf-name { font-family:var(--font-d); font-size:.68rem; letter-spacing:.04em; text-align:center; color:#fff; line-height:1; }
.bf-cost { font-size:.58rem; font-weight:700; color:var(--gold); }
.bf-cond {
  position:absolute; top:3px; right:3px; background:var(--orange); color:#000;
  font-size:.48rem; font-weight:900; padding:1px 3px; border-radius:2px; letter-spacing:.04em;
}

/* Victory screen */
.v-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.96);
  backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center;
  z-index:200; animation:dropIn .35s ease;
}
.v-body { display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; }
.v-trophy { font-size:5.5rem; animation:bounce 1.1s infinite; }
.v-result { font-family:var(--font-d); font-size:clamp(3.5rem,11vw,6.5rem); letter-spacing:.1em; }
.v-win  { color:var(--green); text-shadow:0 0 60px rgba(0,230,118,.45); }
.v-lose { color:var(--red);   text-shadow:0 0 60px rgba(220,20,60,.45); }
.v-sub  { font-family:var(--font-d); font-size:1.1rem; letter-spacing:.55em; color:var(--dimmer); margin-top:-10px; margin-bottom:14px; }

/* CPU thinking indicator */
.thinking-dot { display:inline-block; animation:pulse 1.1s infinite; }

/* Responsive tweaks */
@media (max-width:360px) {
  .punch-btn { font-size:1.2rem; padding:11px 20px; }
  .bf-card { width:68px; }
  .bc-name { font-size:1rem; }
  .bc-ico { font-size:2.3rem; }
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-wrap"></div>

<script>
'use strict';

/* ════════════════════════════════════════════════════════
   DATA
════════════════════════════════════════════════════════ */
const BOXERS = [
  { id:'b_ippo',        type:'boxer', name:'Makunouchi Ippo',  title:'The Wind God',      hp:135, maxHp:135, atk:54, def:20, icon:'🥊', desc:'Dempsey Roll: Massive power in short bursts.' },
  { id:'b_takamura',    type:'boxer', name:'Takamura Mamoru',  title:'Ultimate Beast',    hp:155, maxHp:155, atk:60, def:25, icon:'🐻', desc:'World Champion: Fearsome power and durability.' },
  { id:'b_miyata',      type:'boxer', name:'Miyata Ichirou',   title:'Lightning God',     hp:90,  maxHp:90,  atk:50, def:45, icon:'⚡', desc:'Counter King: Low health, elite defense.' },
  { id:'b_sendou',      type:'boxer', name:'Sendou Takeshi',   title:'Naniwa Tiger',      hp:125, maxHp:125, atk:65, def:15, icon:'🐅', desc:'Wild Instinct: Strongest puncher in Japan.' },
  { id:'b_volg',        type:'boxer', name:'Volg Zangief',     title:'Red Wolf',          hp:115, maxHp:115, atk:52, def:35, icon:'🐺', desc:'Technical: High balance of offense and defense.' },
  { id:'b_mashiba',     type:'boxer', name:'Mashiba Ryou',     title:'The Grim Reaper',   hp:100, maxHp:100, atk:58, def:28, icon:'💀', desc:'Flicker Jabs: Reach keeps opponents at bay.' },

const S = {
  view:     'menu',
  deckBoxers: [],
  deckBuffs:  [],

  toastTmr: null,
};

/* ════════════════════════════════════════════════════════
   PROFILE
════════════════════════════════════════════════════════ */
function loadProfile() {
  try {
    const d = JSON.parse(localStorage.getItem('rcu_v2') || '{}');
    S.deckBoxers = Array.isArray(d.b) ? d.b : ['b_ippo','b_takamura','b_miyata'];
    S.deckBuffs  = Array.isArray(d.f) ? d.f : ['f_mitts','f_steak','f_weights','f_focus','f_ice'];
  } catch {
    S.deckBoxers = ['b_ippo','b_takamura','b_miyata'];
    S.deckBuffs  = ['f_mitts','f_steak','f_weights','f_focus','f_ice'];
  }
}
function saveProfile() {
  localStorage.setItem('rcu_v2', JSON.stringify({ b:S.deckBoxers, f:S.deckBuffs }));
}

/* ════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════ */
function toast(msg) {
  const w = document.getElementById('toast-wrap');
  if (!w) return;
  w.innerHTML = `<div class="toast">${msg}</div>`;
  clearTimeout(S.toastTmr);
  S.toastTmr = setTimeout(() => { if(w) w.innerHTML=''; }, 3000);
}

/* ════════════════════════════════════════════════════════
   ROUTING
════════════════════════════════════════════════════════ */
const app = () => document.getElementById('app');

function goto(v) { S.view = v; render(); }

function render() {
  switch(S.view) {
    case 'menu':   renderMenu();   break;
    case 'deck':   renderDeck();   break;
    case 'battle': renderBattle(); break;
  }
}

/* ════════════════════════════════════════════════════════
   MENU
════════════════════════════════════════════════════════ */
function renderMenu() {
  app().innerHTML = `
    <div class="view view-menu">
      <div class="menu-rays"></div>
      <div class="menu-body">
        <div class="menu-title">
          <div class="mt-top">HAJIME</div>
          <div class="mt-band"><span class="mt-no">NO</span></div>
          <div class="mt-bot">IPPO</div>
          <div class="mt-sub">RING CLASH ULTRA</div>
        </div>
        <div class="menu-btns">
          <button class="btn-p" id="btn-arena">⚡ ENTER ARENA</button>
          <button class="btn-s" id="btn-deck">📦 STRATEGY HUB</button>
        </div>
        <div class="menu-note">Single Player vs AI &nbsp;·&nbsp; Deck saves locally</div>
      </div>
    </div>`;
  document.getElementById('btn-arena').addEventListener('click', startBattle);
  document.getElementById('btn-deck').addEventListener('click', () => goto('deck'));
}

/* ════════════════════════════════════════════════════════
   DECK BUILDER
════════════════════════════════════════════════════════ */
function renderDeck() {
  const isBox = S.deckTab === 'boxers';
  const cards = isBox ? BOXERS : BUFFS;
  const sel   = isBox ? S.deckBoxers : S.deckBuffs;
  const ready = S.deckBoxers.length === 3 && S.deckBuffs.length === 5;

  app().innerHTML = `
    <div class="view view-deck">
      <div class="deck-hdr">
        <button class="btn-back" id="btn-bk">← Back</button>
        <div class="deck-counts">
          <span class="d-cnt ${S.deckBoxers.length===3?'ok':''}">Fighters: ${S.deckBoxers.length}/3</span>
          <span class="d-cnt ${S.deckBuffs.length===5?'ok':''}">Arsenal: ${S.deckBuffs.length}/5</span>
        </div>
        <button class="btn-confirm" id="btn-sv" ${ready?'':'disabled'}>✓ CONFIRM SQUAD</button>
      </div>
      <div class="deck-tabs">
        <button class="tab-btn ${isBox?'active':''}" data-tab="boxers">FIGHTER ROSTER (${S.deckBoxers.length}/3)</button>
        <button class="tab-btn ${!isBox?'active':''}" data-tab="buffs">TRAINING BUFFS (${S.deckBuffs.length}/5)</button>
      </div>
      <div class="card-grid">
        ${cards.map(c => {
          const isSel = sel.includes(c.id);
          return `
          <div class="m-card ${isSel?'sel':''}" data-id="${c.id}" data-ctype="${isBox?'boxer':'buff'}">
            <div class="m-card-in">
              <div class="m-icon">${c.icon}</div>
              <div class="m-name">${c.name}</div>
              <div class="m-title">${c.title || (c.effect||'').toUpperCase()}</div>
              ${isBox
                ? `<div class="m-stats"><span class="s-hp">♥${c.hp}</span><span class="s-atk">⚡${c.atk}</span><span class="s-def">🛡${c.def}</span></div>`
                : `<div class="m-stats"><span class="s-tc">${c.cost}TC</span><span class="s-eff">${(c.effect||'').replace(/_/g,' ')}</span></div>`
              }
              ${isSel ? '<div class="m-check">✓</div>' : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  document.getElementById('btn-bk').addEventListener('click', () => goto('menu'));
  document.getElementById('btn-sv').addEventListener('click', () => {
    if (!ready) { toast('Pick 3 Fighters and 5 Buffs!'); return; }
    saveProfile(); toast('Strategy Saved! 🥊'); setTimeout(() => goto('menu'), 1200);
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => {
    S.deckTab = b.dataset.tab; renderDeck();
  }));
  document.querySelectorAll('.m-card').forEach(c => c.addEventListener('click', () => {
    toggleCard(c.dataset.id, c.dataset.ctype);
  }));
}

function toggleCard(id, type) {
  if (type === 'boxer') {
    if (S.deckBoxers.includes(id)) S.deckBoxers = S.deckBoxers.filter(x=>x!==id);
    else if (S.deckBoxers.length < 3) S.deckBoxers = [...S.deckBoxers, id];
    else { toast('3 Fighters max!'); return; }
  } else {
    if (S.deckBuffs.includes(id)) S.deckBuffs = S.deckBuffs.filter(x=>x!==id);
    else if (S.deckBuffs.length < 5) S.deckBuffs = [...S.deckBuffs, id];
    else { toast('5 Buffs max!'); return; }
  }
  renderDeck();
}

/* ════════════════════════════════════════════════════════
   BATTLE INIT
════════════════════════════════════════════════════════ */
function makePlayers(bIds, fIds, name) {
  return {
    name,
    boxers: bIds.map((id, i) => {
      const src = BOXERS.find(b=>b.id===id);
      return { ...src, hp: src.maxHp, isDead:false, iid:`${name}_${i}` };
    }),
    buffs: fIds.map((id, i) => {
      const src = BUFFS.find(f=>f.id===id);
      return { ...src, used:false, iid:`${name}_b${i}` };
    }),
    activeIdx: 0,
    tc: 2,
  };
}

function startBattle() {
  if (S.deckBoxers.length !== 3 || S.deckBuffs.length !== 5) {
    toast('Set up your squad first! Visit Strategy Hub.');
    return;
  }
  const aiBoxers = [...BOXERS].sort(()=>Math.random()-.5).slice(0,3).map(b=>b.id);
  const aiBuffs  = [...BUFFS ].sort(()=>Math.random()-.5).slice(0,5).map(b=>b.id);

  S.battle = {
    status:   'playing',
    turn:     'player',
    thinking: false,
    turnCount: 1,
    log:      ['⚡ The bell rings!'],
    winner:   null,
    anim:     null,
    player: makePlayers(S.deckBoxers, S.deckBuffs, 'YOU'),
    cpu:    makePlayers(aiBoxers, aiBuffs, 'CPU'),
  };
  goto('battle');
}

/* ════════════════════════════════════════════════════════
   BATTLE RENDER
════════════════════════════════════════════════════════ */
function hpBarClass(hp, maxHp) {
  const p = hp / maxHp;
  if (p > .55) return 'hp-hi';
  if (p > .28) return 'hp-md';
  return 'hp-lo';
}

function renderFCard(bx) {
  if (!bx) return '<div style="width:100%;height:80px;"></div>';
  const pct  = Math.max(0, (bx.hp / bx.maxHp) * 100).toFixed(1);
  const cls  = hpBarClass(bx.hp, bx.maxHp);
  return `
    <div class="b-card ${bx.isDead?'dead':''}">
      <div class="bc-ico">${bx.icon}</div>
      <div class="bc-body">
        <div class="bc-name">${bx.name}</div>
        <div class="bc-hpwrap"><div class="bc-hpbar ${cls}" style="width:${pct}%"></div></div>
        <div class="bc-hptxt">${bx.hp} / ${bx.maxHp}</div>
        <div class="bc-stats"><span>⚡ ${bx.atk}</span><span>🛡 ${bx.def}</span></div>
      </div>
      ${bx.isDead ? '<div class="ko-overlay">KO</div>' : ''}
    </div>`;
}

function renderTcPips(tc, isOpp) {
  return [...Array(8)].map((_,i)=>`<div class="tc-pip ${i<tc?(isOpp?'on-opp':'on'):''}"></div>`).join('');
}

function renderBattle() {
  const b = S.battle;
  const p = b.player, c = b.cpu;
  const isMyTurn  = b.turn==='player' && !b.thinking;
  const myActive  = p.boxers[p.activeIdx];
  const oppActive = c.boxers[c.activeIdx];
  const logText   = b.log[b.log.length-1] || '';

  // turn display
  let turnLabel, turnCls;
  if (b.thinking) { turnLabel='CPU THINKING <span class="thinking-dot">…</span>'; turnCls='thinking'; }
  else if (isMyTurn) { turnLabel='YOUR ROUND'; turnCls='mine'; }
  else { turnLabel='ENEMY MOVEMENT'; turnCls='theirs'; }

  app().innerHTML = `
    <div class="view view-battle ${b.anim==='atk'?'flash-red':b.anim==='buff'?'flash-blu':''}">

      <!-- Opponent top bar -->
      <div class="b-opp-bar">
        <div class="team-slots">
          ${c.boxers.map((bx,i)=>`
            <div class="t-slot ${i===c.activeIdx?'theirs':''} ${bx.isDead?'dead':''}" title="${bx.name}">${bx.icon}</div>
          `).join('')}
          <span class="p-tag">CPU</span>
        </div>
        <div class="tc-bar">${renderTcPips(c.tc, true)}</div>
      </div>

      <!-- Opponent card -->
      <div class="b-card-wrap ${b.anim==='atk'&&!isMyTurn?'anim-oppunch':''}">
        ${renderFCard(oppActive)}
      </div>

      <!-- Combat log -->
      <div class="b-log">
        <div class="b-turn ${turnCls}">${turnLabel}</div>
        <div class="b-logtext">${logText}</div>
      </div>

      <!-- My card -->
      <div class="b-card-wrap ${b.anim==='atk'&&isMyTurn?'anim-punch':''}">
        ${renderFCard(myActive)}
      </div>

      <!-- Controls -->
      <div class="b-controls">
        <div class="ctrl-top">
          <div class="team-slots">
            ${p.boxers.map((bx,i)=>`
              <div class="t-slot ${i===p.activeIdx?'mine':''} ${bx.isDead?'dead':''} ${(!bx.isDead&&i!==p.activeIdx&&isMyTurn)?'switchable':''}"
                   data-sw="${i}" title="${bx.name}">${bx.icon}</div>
            `).join('')}
          </div>
          <div class="my-tc-wrap">
            <div class="tc-lbl">TACTICAL COST</div>
            <div class="tc-bar">${renderTcPips(p.tc, false)}</div>
          </div>
          <button class="punch-btn ${isMyTurn?'on':'off'}" id="btn-punch" ${isMyTurn?'':'disabled'}>PUNCH</button>
        </div>

        <div class="buff-bar">
          ${p.buffs.map((bf,i)=>{
            const canUse = isMyTurn && !bf.used && p.tc >= bf.cost;
            return `
              <div class="bf-card ${bf.used?'used':canUse?'usable':'disabled'}"
                   data-bi="${i}" ${canUse?'':'title="Not available"'}>
                <div class="bf-ico">${bf.icon}</div>
                <div class="bf-name">${bf.name}</div>
                <div class="bf-cost">${bf.cost}TC</div>
                ${bf.condition?'<div class="bf-cond">COND</div>':''}
              </div>`;
          }).join('')}
        </div>
      </div>

      ${b.status==='finished'?renderVictory():''}
    </div>`;

  // Events
  if (b.status !== 'finished') {
    document.getElementById('btn-punch')?.addEventListener('click', () => { if(isMyTurn) doAttack(); });
    document.querySelectorAll('[data-sw]').forEach(el => el.addEventListener('click', () => {
      const i = +el.dataset.sw;
      if (isMyTurn && i!==p.activeIdx && !p.boxers[i].isDead) doSwitch(i);
    }));
    document.querySelectorAll('[data-bi]').forEach(el => el.addEventListener('click', () => {
      const i = +el.dataset.bi;
      if (isMyTurn) doUseBuff(i);
    }));
  } else {
    document.getElementById('btn-ret')?.addEventListener('click', () => { S.battle=null; goto('menu'); });
  }
}

function renderVictory() {
  const won = S.battle.winner === 'player';
  return `
    <div class="v-overlay">
      <div class="v-body">
        <div class="v-trophy">${won?'🏆':'💀'}</div>
        <div class="v-result ${won?'v-win':'v-lose'}">${won?'VICTORY':'DEFEAT'}</div>
        <div class="v-sub">THE FINAL BELL</div>
        <button class="btn-p" id="btn-ret">RETURN TO GYM</button>
      </div>
    </div>`;
}

/* ════════════════════════════════════════════════════════
   BATTLE LOGIC — PLAYER ACTIONS
════════════════════════════════════════════════════════ */
function doAttack() {
  const b = S.battle;
  if (b.status !== 'playing' || b.turn !== 'player' || b.thinking) return;
  b.thinking = true;

  const atk = b.player.boxers[b.player.activeIdx];
  const def = b.cpu.boxers[b.cpu.activeIdx];
  const dmg = Math.max(10, atk.atk - Math.floor(def.def / 2));
  def.hp = Math.max(0, def.hp - dmg);

  let log = `${atk.name} connects! (-${dmg} HP)`;
  if (def.hp <= 0) {
    def.hp = 0; def.isDead = true;
    log = `KO! ${def.name} is down!`;
    if (b.cpu.boxers.every(x=>x.isDead)) {
      b.status='finished'; b.winner='player'; log='🏆 You win the match!'; b.thinking=false;
    } else {
      b.cpu.activeIdx = b.cpu.boxers.findIndex(x=>!x.isDead);
    }
  }

  b.log.push(log); b.anim='atk';
  b.player.tc = Math.min(8, b.player.tc + 1);
  b.turnCount++;
  renderBattle();

  if (b.status === 'playing') {
    b.anim = null; b.turn = 'cpu';
    renderBattle();
    setTimeout(aiTurn, 1300);
  }
}

function doUseBuff(idx) {
  const b = S.battle;
  if (b.status!=='playing'||b.turn!=='player'||b.thinking) return;
  const p  = b.player;
  const bf = p.buffs[idx];
  if (!bf || bf.used || p.tc < bf.cost) return;

  const active = p.boxers[p.activeIdx];
  // Condition checks
  if (bf.condition==='low_hp'       && active.hp > active.maxHp*.4) return toast('Wait for critical HP');
  if (bf.condition==='very_low_hp'  && active.hp > active.maxHp*.2) return toast('Near death only');
  if (bf.condition==='teammate_down'&& p.boxers.filter(x=>x.isDead).length===0) return toast('Need a KO\'d ally');
  if (bf.condition==='early_game'   && b.turnCount>6)                return toast('Early rounds only');
  if (bf.condition==='last_man'     && p.boxers.filter(x=>!x.isDead).length>1) return toast('Last survivor only');
  if (bf.condition==='teammates_up' && p.boxers.filter(x=>!x.isDead).length<2) return toast('Need allies standing!');
  if (bf.condition==='high_hp'      && active.hp < active.maxHp*.8) return toast('Too bruised to focus');
  if (bf.condition==='took_dmg'     && active.hp >= active.maxHp)   return toast('Must be damaged first');

  applyBuff(bf, p, active);
  bf.used = true;
  p.tc = Math.min(8, Math.max(0, p.tc - bf.cost));
  b.log.push(`${active.name} uses ${bf.name}!`);
  b.anim = 'buff';
  renderBattle();
  b.anim = null;
}

function doSwitch(idx) {
  const b = S.battle;
  if (b.status!=='playing'||b.turn!=='player'||b.thinking) return;
  const p = b.player;
  if (p.tc < 1) return toast('Need 1 TC to switch');
  p.activeIdx = idx; p.tc -= 1;
  b.log.push(`${p.boxers[idx].name} tags in!`);
  b.thinking = true; b.turn = 'cpu'; b.turnCount++;
  renderBattle();
  b.thinking = false;
  setTimeout(aiTurn, 1300);
}

function applyBuff(bf, player, active) {
  switch(bf.effect) {
    case 'hp':        active.hp = Math.min(active.maxHp, active.hp + bf.val); break;
    case 'atk': {
      let val = bf.val;
      if (bf.condition==='teammates_up')
        val = player.boxers.filter(x=>!x.isDead&&x.iid!==active.iid).length * 20;
      active.atk += val;
      break;
    }
    case 'def':       active.def += bf.val; break;
    case 'atk_def':   active.atk += bf.val; active.def += bf.val; break;
    case 'hp_def':    active.hp = Math.min(active.maxHp, active.hp + bf.val); active.def += 15; break;
    case 'hp_all':    player.boxers.forEach(x=>{ if(!x.isDead) x.hp = Math.min(x.maxHp, x.hp+bf.val); }); break;
    case 'tc_gain':   player.tc = Math.min(8, player.tc + bf.val); break;
    case 'atk_def_hp': active.atk+=bf.val; active.def+=bf.val; active.hp=Math.min(active.maxHp,active.hp+bf.val); break;
    case 'atk_hp_neg': active.atk+=bf.val; active.hp=Math.max(1, active.hp-30); break;
  }
}

/* ════════════════════════════════════════════════════════
   AI
════════════════════════════════════════════════════════ */
function checkAiCond(bf, cpu, active, b) {
  if (!bf.condition) return true;
  const aliveTeam = cpu.boxers.filter(x=>!x.isDead).length;
  switch(bf.condition) {
    case 'low_hp':       return active.hp <= active.maxHp*.4;
    case 'very_low_hp':  return active.hp <= active.maxHp*.2;
    case 'teammate_down':return cpu.boxers.filter(x=>x.isDead).length > 0;
    case 'early_game':   return b.turnCount <= 6;
    case 'last_man':     return aliveTeam === 1;
    case 'teammates_up': return aliveTeam >= 2;
    case 'high_hp':      return active.hp >= active.maxHp*.8;
    case 'took_dmg':     return active.hp < active.maxHp;
    default:             return true;
  }
}

function aiTurn() {
  const b = S.battle;
  if (b.status!=='playing'||b.turn!=='cpu') return;
  b.thinking = true; renderBattle();

  setTimeout(() => {
    const cpu    = b.cpu;
    const active = cpu.boxers[cpu.activeIdx];

    // Maybe use a buff first
    const avail = cpu.buffs
      .map((bf,i)=>({bf,i}))
      .filter(({bf})=>!bf.used && cpu.tc>=bf.cost && checkAiCond(bf,cpu,active,b));

    if (avail.length > 0 && Math.random() < 0.38) {
      const {bf, i} = avail[Math.floor(Math.random()*avail.length)];
      applyBuff(bf, cpu, active);
      bf.used = true;
      cpu.tc = Math.min(8, Math.max(0, cpu.tc - bf.cost));
      b.log.push(`CPU: ${active.name} uses ${bf.name}!`);
      b.anim = 'buff';
      b.thinking = false; renderBattle(); b.anim = null;
      // AI still attacks after buff
      setTimeout(aiAttack, 700);
      return;
    }
    b.thinking = false;
    aiAttack();
  }, 350);
}

function aiAttack() {
  const b = S.battle;
  if (b.status!=='playing') return;
  const cpu    = b.cpu;
  const player = b.player;
  const cA     = cpu.boxers[cpu.activeIdx];
  const pA     = player.boxers[player.activeIdx];

  const dmg = Math.max(10, cA.atk - Math.floor(pA.def / 2));
  pA.hp = Math.max(0, pA.hp - dmg);

  let log = `CPU: ${cA.name} strikes! (-${dmg} HP)`;
  if (pA.hp <= 0) {
    pA.hp = 0; pA.isDead = true;
    log = `CPU KO! ${pA.name} is down!`;
    if (player.boxers.every(x=>x.isDead)) {
      b.status='finished'; b.winner='cpu'; log='💀 CPU wins the match!';
    } else {
      player.activeIdx = player.boxers.findIndex(x=>!x.isDead);
    }
  }

  b.log.push(log); b.anim='atk';
  cpu.tc = Math.min(8, cpu.tc + 1);
  b.turn = 'player'; b.turnCount++;
  b.thinking = false;
  renderBattle(); b.anim = null;
}

/* ════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════ */
loadProfile();
render();
</script>
