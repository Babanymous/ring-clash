<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hajime no Ippo: Ring Clash</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        bebas: ['"Bebas Neue"', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        boxingRed: '#d91b22',
                        boxingBlue: '#1b4bd9',
                        ringBlack: '#0d0d0d',
                        canvas: '#e3dfd3'
                    },
                    animation: {
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(4px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-8px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(8px, 0, 0)' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(100%)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #050505; color: white; overflow: hidden; touch-action: none; }
        
        .card-bg-attack { background: radial-gradient(circle at top left, #4a0c0f, #1a0204); }
        .card-bg-block { background: radial-gradient(circle at top left, #0c274a, #020a1a); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .ring-ropes {
            background-image: 
                linear-gradient(to bottom, transparent 20%, rgba(255,255,255,0.03) 21%, transparent 22%),
                linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.03) 51%, transparent 52%),
                linear-gradient(to bottom, transparent 80%, rgba(255,255,255,0.03) 81%, transparent 82%);
        }
        
        .crt-overlay {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-screen"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseAPI = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, getDocs, deleteDoc };
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // --- GAME DATA ---
        const CARDS = {
            'jab': { id: 'jab', name: 'Left Jab', type: 'attack', cost: 1, value: 8, desc: 'A swift, basic punch to test the waters.', icon: 'fist' },
            'straight': { id: 'straight', name: 'Right Straight', type: 'attack', cost: 2, value: 15, desc: 'A heavy right cross with solid power.', icon: 'fist' },
            'liver': { id: 'liver', name: 'Liver Blow', type: 'attack', cost: 2, value: 18, desc: 'A brutal hook to the body.', icon: 'fist' },
            'smash': { id: 'smash', name: 'The Smash', type: 'attack', cost: 3, value: 25, desc: 'A terrifying ¾ uppercut.', icon: 'fist' },
            'dempsey': { id: 'dempsey', name: 'Dempsey Roll', type: 'attack', cost: 4, value: 35, desc: 'A barrage of heavy hooks from blind spots.', icon: 'fist' },
            'weave': { id: 'weave', name: 'Weaving', type: 'block', cost: 1, value: 10, desc: 'Dodge incoming attacks nimbly.', icon: 'shield' },
            'guard': { id: 'guard', name: 'Cross Arm Guard', type: 'block', cost: 2, value: 20, desc: 'A sturdy guard to absorb heavy blows.', icon: 'shield' },
            'gazelle': { id: 'gazelle', name: 'Gazelle Punch', type: 'attack', cost: 3, value: 20, blockValue: 5, desc: 'Spring forward with an uppercut. Adds 5 Block.', icon: 'fist' },
        };

        const DECK_TEMPLATE = ['jab', 'jab', 'jab', 'straight', 'straight', 'weave', 'weave', 'guard', 'liver', 'smash', 'gazelle', 'dempsey'];

        // Helpers
        const shuffleArray = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const createPlayerState = (name) => {
            let deck = shuffleArray(DECK_TEMPLATE);
            let hand = deck.splice(0, 5); // Draw 5
            return {
                name: name,
                hp: 100,
                maxHp: 100,
                energy: 3,
                maxEnergy: 3,
                block: 0,
                deck: deck,
                hand: hand,
                discard: []
            };
        };

        // --- COMPONENTS ---

        const CardUI = ({ cardId, isPlayable, onClick, disabled }) => {
            const card = CARDS[cardId];
            if(!card) return null;

            const isAttack = card.type === 'attack';
            const bgClass = isAttack ? 'card-bg-attack' : 'card-bg-block';
            const accent = isAttack ? 'text-boxingRed' : 'text-blue-400';

            return (
                <div 
                    onClick={() => isPlayable && !disabled && onClick()}
                    className={`relative w-32 h-48 rounded-xl border-2 ${isPlayable && !disabled ? 'border-yellow-500 cursor-pointer hover:-translate-y-4 hover:shadow-[0_0_15px_rgba(234,179,8,0.5)] z-10' : 'border-gray-700 opacity-80'} ${bgClass} shadow-xl flex flex-col transition-all duration-200 overflow-hidden group select-none`}
                >
                    <div className="absolute top-1 left-1 bg-black/60 rounded-full w-6 h-6 flex items-center justify-center font-bebas text-lg text-yellow-400 border border-yellow-600">
                        {card.cost}
                    </div>
                    
                    <div className="flex-1 flex items-center justify-center pt-4">
                        {isAttack ? 
                            <svg className={`w-12 h-12 ${accent} opacity-80`} viewBox="0 0 24 24" fill="currentColor"><path d="M4 11V13C4 16.866 7.13401 20 11 20H13C16.866 20 20 16.866 20 13V11C20 9.89543 19.1046 9 18 9C17.7013 9 17.4178 9.06543 17.1633 9.18274C16.8111 8.47355 16.085 8 15.25 8C14.7836 8 14.3484 8.13328 13.9877 8.35626C13.6708 7.55173 12.8989 7 12 7C11.6661 7 11.3508 7.08298 11.0772 7.2269C10.7431 6.49503 10.0125 6 9.18182 6C8.52984 6 7.94723 6.29742 7.56846 6.76413L5.33714 3.78854C4.94586 3.26683 4.16843 3.16113 3.63974 3.56545L2.36026 4.54418C1.86828 4.92055 1.76104 5.62638 2.11584 6.13621L4 8.845V11Z"/></svg>
                            : 
                            <svg className={`w-12 h-12 ${accent} opacity-80`} viewBox="0 0 24 24" fill="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        }
                    </div>

                    <div className="bg-black/80 backdrop-blur-sm p-2 border-t border-gray-700 h-2/5 flex flex-col justify-between">
                        <div className="font-bebas text-sm leading-none tracking-wide text-white text-center truncate">{card.name}</div>
                        <div className="text-[9px] text-gray-400 font-inter leading-tight text-center mt-1 truncate">
                            {isAttack ? `DMG: ${card.value}` : `BLK: ${card.value}`}
                            {card.blockValue && `, BLK: ${card.blockValue}`}
                        </div>
                    </div>
                </div>
            );
        };

        const FighterDisplay = ({ state, isPlayer, isTurn, animateShake }) => {
            const hpPercent = Math.max(0, (state.hp / state.maxHp) * 100);
            return (
                <div className={`flex flex-col ${isPlayer ? 'items-end' : 'items-start'} ${animateShake ? 'animate-shake' : ''}`}>
                    <div className="flex items-end gap-3 mb-1">
                        {!isPlayer && <div className="text-xl font-bebas text-white tracking-wider">{state.name}</div>}
                        
                        <div className={`w-16 h-16 rounded bg-zinc-800 border-2 flex items-center justify-center
                            ${isTurn ? 'border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.4)]' : 'border-zinc-600'}
                            ${isPlayer ? 'order-last' : 'order-first'}`}
                        >
                            <svg className="w-10 h-10 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                        </div>
                        
                        {isPlayer && <div className="text-xl font-bebas text-white tracking-wider">{state.name}</div>}
                    </div>

                    <div className={`flex items-center gap-2 ${isPlayer ? 'flex-row-reverse' : 'flex-row'}`}>
                        {/* HP Bar */}
                        <div className="w-48 sm:w-64 h-6 bg-zinc-900 border border-zinc-700 rounded overflow-hidden relative">
                            <div className="absolute inset-0 flex items-center justify-center font-bebas text-sm text-white z-10 drop-shadow-md">
                                {state.hp} / {state.maxHp}
                            </div>
                            <div className={`h-full transition-all duration-300 ${hpPercent > 40 ? 'bg-green-600' : hpPercent > 15 ? 'bg-yellow-500' : 'bg-red-600'}`} style={{ width: `${hpPercent}%` }}></div>
                        </div>

                        {/* Block */}
                        {state.block > 0 && (
                            <div className="flex items-center justify-center w-8 h-8 rounded-full bg-blue-900 border border-blue-400 text-blue-200 font-bebas shadow-[0_0_10px_rgba(59,130,246,0.5)]">
                                {state.block}
                            </div>
                        )}
                    </div>

                    {/* Energy (Only show clearly for player, or simple pips for enemy) */}
                    <div className={`flex gap-1 mt-2 ${isPlayer ? 'flex-row-reverse' : 'flex-row'}`}>
                        {Array.from({length: state.maxEnergy}).map((_, i) => (
                            <div key={i} className={`w-4 h-4 rounded-full border border-yellow-700 ${i < state.energy ? 'bg-yellow-400 shadow-[0_0_5px_#facc15]' : 'bg-zinc-800'}`}></div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [user, setUser] = useState(null);
            const [fbAPI, setFbAPI] = useState(null);
            const [currentMatch, setCurrentMatch] = useState(null); // ID of lobby
            const [matchState, setMatchState] = useState(null);
            const [loadingText, setLoadingText] = useState("Warming up the ring...");
            const [logScrollKey, setLogScrollKey] = useState(0);

            const LOBBIES_PATH = ['artifacts', typeof __app_id !== 'undefined' ? __app_id : 'ippo-card-app', 'public', 'data', 'arenas'];

            // Initialize Firebase
            useEffect(() => {
                const initAuth = async () => {
                    if(!window.FirebaseAPI) return;
                    setFbAPI(window.FirebaseAPI);
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseAPI;
                    
                    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if(u) setLoadingText("");
                    });
                };
                initAuth();
            }, []);

            // Match Listener
            useEffect(() => {
                if(!user || !fbAPI || !currentMatch) return;
                const { getFirestore, doc, onSnapshot } = fbAPI;
                const db = getFirestore();
                
                const unsub = onSnapshot(doc(db, ...LOBBIES_PATH, currentMatch), (docSnap) => {
                    if (docSnap.exists()) {
                        setMatchState(docSnap.data());
                        setLogScrollKey(k => k + 1);
                    } else {
                        // Match deleted
                        setCurrentMatch(null);
                        setMatchState(null);
                    }
                }, (err) => {
                    console.error("Match sync error", err);
                });
                return () => unsub();
            }, [currentMatch, user, fbAPI]);

            // Auto-scroll log
            useEffect(() => {
                const logEl = document.getElementById('battle-log');
                if(logEl) logEl.scrollTop = logEl.scrollHeight;
            }, [logScrollKey]);


            const handleFindMatch = async () => {
                setLoadingText("Looking for challengers...");
                const { getFirestore, collection, getDocs, updateDoc, doc, addDoc } = fbAPI;
                const db = getFirestore();
                const arenasRef = collection(db, ...LOBBIES_PATH);

                try {
                    const snap = await getDocs(arenasRef);
                    const lobbies = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    
                    // Cleanup dead lobbies (optional, simple logic)
                    const openLobby = lobbies.find(l => l.status === 'open' && l.p1 !== user.uid);

                    if (openLobby) {
                        // Join
                        const joinState = createPlayerState(`Challenger ${user.uid.slice(0,3)}`);
                        await updateDoc(doc(db, ...LOBBIES_PATH, openLobby.id), {
                            status: 'playing',
                            p2: user.uid,
                            [`players.${user.uid}`]: joinState,
                            log: [...openLobby.log, `Challenger approached! The bell rings!`]
                        });
                        setCurrentMatch(openLobby.id);
                    } else {
                        // Create
                        const hostState = createPlayerState(`Fighter ${user.uid.slice(0,3)}`);
                        const newLobby = await addDoc(arenasRef, {
                            status: 'open',
                            p1: user.uid,
                            p2: null,
                            turn: user.uid,
                            players: {
                                [user.uid]: hostState
                            },
                            log: ['Waiting for a challenger to enter the ring...'],
                            createdAt: Date.now()
                        });
                        setCurrentMatch(newLobby.id);
                    }
                } catch (e) {
                    console.error("Matchmaking failed:", e);
                }
                setLoadingText("");
            };

            const leaveMatch = async () => {
                if(!currentMatch || !fbAPI) return;
                const { getFirestore, doc, deleteDoc } = fbAPI;
                const db = getFirestore();
                
                // If leaving, just delete the lobby to clean up. In a real game we'd handle concede.
                try {
                    await deleteDoc(doc(db, ...LOBBIES_PATH, currentMatch));
                } catch(e) {}
                setCurrentMatch(null);
                setMatchState(null);
            };

            const playCard = async (cardIndex) => {
                if (!matchState || matchState.status !== 'playing' || matchState.turn !== user.uid) return;
                
                const { getFirestore, doc, updateDoc } = fbAPI;
                const db = getFirestore();

                const myState = matchState.players[user.uid];
                const enemyUid = matchState.p1 === user.uid ? matchState.p2 : matchState.p1;
                const enemyState = matchState.players[enemyUid];
                
                const cardId = myState.hand[cardIndex];
                const card = CARDS[cardId];

                if (myState.energy < card.cost) return; // UI should block this, but safety check

                let nextMyState = JSON.parse(JSON.stringify(myState));
                let nextEnemyState = JSON.parse(JSON.stringify(enemyState));
                let newLog = [...matchState.log];

                // Pay cost
                nextMyState.energy -= card.cost;
                nextMyState.hand.splice(cardIndex, 1);
                nextMyState.discard.push(cardId);

                newLog.push(`${myState.name} plays ${card.name}!`);

                // Apply Effect
                if (card.type === 'attack') {
                    let dmg = card.value;
                    if (card.blockValue) nextMyState.block += card.blockValue;

                    if (nextEnemyState.block > 0) {
                        if (nextEnemyState.block >= dmg) {
                            nextEnemyState.block -= dmg;
                            dmg = 0;
                            newLog.push(`  Blocked!`);
                        } else {
                            dmg -= nextEnemyState.block;
                            nextEnemyState.block = 0;
                        }
                    }
                    
                    if (dmg > 0) {
                        nextEnemyState.hp -= dmg;
                        newLog.push(`  Clean hit! -${dmg} HP`);
                    }
                } else if (card.type === 'block') {
                    nextMyState.block += card.value;
                    newLog.push(`  Defense up (+${card.value} Block).`);
                }

                // Check Knockout
                let newStatus = matchState.status;
                if (nextEnemyState.hp <= 0) {
                    nextEnemyState.hp = 0;
                    newStatus = 'finished';
                    newLog.push(`\n>>> KNOCKOUT! ${myState.name} wins! <<<`);
                }

                await updateDoc(doc(db, ...LOBBIES_PATH, currentMatch), {
                    [`players.${user.uid}`]: nextMyState,
                    [`players.${enemyUid}`]: nextEnemyState,
                    log: newLog.slice(-20), // Keep log small
                    status: newStatus
                });
            };

            const endTurn = async () => {
                if (!matchState || matchState.status !== 'playing' || matchState.turn !== user.uid) return;
                
                const { getFirestore, doc, updateDoc } = fbAPI;
                const db = getFirestore();
                
                const enemyUid = matchState.p1 === user.uid ? matchState.p2 : matchState.p1;
                let nextEnemyState = JSON.parse(JSON.stringify(matchState.players[enemyUid]));
                let nextMyState = JSON.parse(JSON.stringify(matchState.players[user.uid]));
                let newLog = [...matchState.log];

                // Process turn end for me
                nextMyState.block = 0; // Block resets

                // Process turn start for enemy
                nextEnemyState.energy = nextEnemyState.maxEnergy; // Full energy
                
                // Draw card logic for enemy (doing it here keeps state centralized without cloud functions)
                if (nextEnemyState.deck.length === 0 && nextEnemyState.discard.length > 0) {
                    nextEnemyState.deck = shuffleArray(nextEnemyState.discard);
                    nextEnemyState.discard = [];
                    newLog.push(`${nextEnemyState.name} reshuffled deck.`);
                }
                if (nextEnemyState.deck.length > 0) {
                    const drawn = nextEnemyState.deck.pop();
                    nextEnemyState.hand.push(drawn);
                }

                newLog.push(`\n--- ${nextEnemyState.name}'s Turn ---`);

                await updateDoc(doc(db, ...LOBBIES_PATH, currentMatch), {
                    turn: enemyUid,
                    [`players.${user.uid}`]: nextMyState,
                    [`players.${enemyUid}`]: nextEnemyState,
                    log: newLog.slice(-20)
                });
            };

            // --- RENDERERS ---

            if (loadingText || !user) {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center bg-zinc-950 font-bebas text-white">
                        <div className="text-4xl animate-pulse text-boxingRed tracking-widest">{loadingText}</div>
                    </div>
                );
            }

            if (!currentMatch) {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-zinc-800 to-black font-bebas relative overflow-hidden">
                        <div className="absolute inset-0 ring-ropes opacity-20"></div>
                        <div className="z-10 flex flex-col items-center">
                            <h1 className="text-7xl md:text-9xl text-white tracking-widest drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] mb-2 text-center leading-none">
                                RING <span className="text-boxingRed">CLASH</span><br/>ULTRA
                            </h1>
                            <p className="font-inter text-zinc-400 mb-12 text-center max-w-md uppercase tracking-widest text-sm">Online Deck-Building Boxing</p>
                            
                            <button onClick={handleFindMatch} className="px-12 py-4 bg-boxingRed hover:bg-red-500 text-white text-3xl tracking-widest rounded-sm transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(217,27,34,0.4)] border-b-4 border-red-900 active:border-b-0 active:translate-y-1">
                                ENTER THE RING (Find Match)
                            </button>
                        </div>
                    </div>
                );
            }

            if (matchState && matchState.status === 'open') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center bg-zinc-950 font-bebas">
                        <div className="p-8 border-2 border-zinc-800 bg-zinc-900 rounded-lg shadow-2xl text-center max-w-sm w-full">
                            <div className="w-16 h-16 border-4 border-t-boxingRed border-zinc-700 rounded-full animate-spin mx-auto mb-6"></div>
                            <h2 className="text-3xl text-white tracking-wider mb-2">WAITING FOR CHALLENGER</h2>
                            <p className="text-zinc-500 font-inter text-sm mb-6">Warming up in the corner...</p>
                            <button onClick={leaveMatch} className="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded border border-zinc-600 transition-colors">
                                LEAVE LOCKER ROOM
                            </button>
                        </div>
                    </div>
                );
            }

            if (matchState && matchState.players) {
                const myState = matchState.players[user.uid];
                const enemyUid = matchState.p1 === user.uid ? matchState.p2 : matchState.p1;
                const enemyState = matchState.players[enemyUid];
                const isMyTurn = matchState.turn === user.uid && matchState.status === 'playing';
                const isGameOver = matchState.status === 'finished';

                return (
                    <div className="w-full h-full flex flex-col bg-ringBlack relative select-none">
                        {/* CRT Effect overlay */}
                        <div className="absolute inset-0 crt-overlay z-0"></div>

                        {/* Top Bar - Controls */}
                        <div className="h-12 border-b border-zinc-800 flex justify-between items-center px-4 bg-black z-20">
                            <div className="font-bebas text-zinc-500 tracking-wider">LOBBY ID: {currentMatch.slice(0,6)}</div>
                            <button onClick={leaveMatch} className="text-zinc-500 hover:text-white font-inter text-sm font-semibold transition-colors">
                                SURRENDER & LEAVE
                            </button>
                        </div>

                        {/* Battle Area */}
                        <div className="flex-1 flex flex-col z-10 p-4 pb-0 relative">
                            
                            {/* Enemy Area (Top) */}
                            <div className="flex-none flex justify-between items-start">
                                <FighterDisplay state={enemyState} isPlayer={false} isTurn={matchState.turn === enemyUid} animateShake={false} />
                                
                                {/* Deck/Discard Visuals (Enemy) */}
                                <div className="flex flex-col gap-2 items-end opacity-50">
                                    <div className="w-12 h-16 border-2 border-zinc-700 rounded bg-zinc-800 flex items-center justify-center text-xs font-bebas text-zinc-500">
                                        {enemyState.deck.length}
                                    </div>
                                    <div className="w-12 h-16 border-2 border-zinc-800 rounded flex items-center justify-center text-xs font-bebas text-zinc-600">
                                        {enemyState.discard.length}
                                    </div>
                                </div>
                            </div>

                            {/* Center Log / Arena Floor */}
                            <div className="flex-1 flex items-center justify-center relative my-4">
                                <div className="w-full max-w-md h-full max-h-48 bg-black/60 border border-zinc-800 rounded p-3 overflow-y-auto font-inter text-sm shadow-inner" id="battle-log">
                                    {matchState.log.map((line, i) => (
                                        <div key={i} className={`mb-1 ${line.includes('KNOCKOUT') ? 'text-boxingRed font-bold font-bebas text-xl' : line.includes('Turn') ? 'text-blue-400 mt-2 font-semibold' : 'text-zinc-300'}`}>
                                            {line}
                                        </div>
                                    ))}
                                </div>

                                {isGameOver && (
                                    <div className="absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-sm z-50 animate-slide-up">
                                        <div className="text-center">
                                            <h1 className="text-7xl font-bebas text-white drop-shadow-[0_0_20px_rgba(255,0,0,0.8)] mb-4">MATCH OVER</h1>
                                            <button onClick={leaveMatch} className="px-8 py-3 bg-boxingRed text-white font-bebas text-2xl rounded hover:bg-red-500 transition-colors">BACK TO MENU</button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Player Area (Bottom) */}
                            <div className="flex-none flex justify-between items-end mb-4">
                                {/* Deck/Discard Visuals (Player) */}
                                <div className="flex flex-col gap-2">
                                    <div className="w-16 h-24 border-2 border-zinc-700 rounded-lg bg-zinc-800 flex flex-col items-center justify-center text-sm font-bebas text-zinc-400 relative overflow-hidden group">
                                        <div className="absolute inset-0 bg-blue-900/20 group-hover:bg-blue-900/40 transition-colors"></div>
                                        <span>DECK</span>
                                        <span className="text-xl text-white">{myState.deck.length}</span>
                                    </div>
                                    <div className="w-16 h-24 border-2 border-zinc-800 rounded-lg flex flex-col items-center justify-center text-sm font-bebas text-zinc-600">
                                        <span>DISCARD</span>
                                        <span>{myState.discard.length}</span>
                                    </div>
                                </div>

                                <FighterDisplay state={myState} isPlayer={true} isTurn={matchState.turn === user.uid} animateShake={false} />
                            </div>
                        </div>

                        {/* Hand & Action Bar */}
                        <div className="h-56 border-t border-zinc-800 bg-zinc-950 p-4 relative z-20 flex flex-col">
                            {/* Turn Indicator & End Turn Button */}
                            <div className="absolute -top-6 left-1/2 transform -translate-x-1/2 flex items-center gap-4">
                                <div className={`px-6 py-1 rounded-t border-t border-x ${isMyTurn ? 'bg-boxingRed border-red-500 text-white shadow-[0_-5px_15px_rgba(217,27,34,0.4)]' : 'bg-zinc-800 border-zinc-700 text-zinc-500'} font-bebas text-xl tracking-widest transition-colors`}>
                                    {isMyTurn ? 'YOUR TURN' : 'OPPONENT TURN'}
                                </div>
                                {isMyTurn && !isGameOver && (
                                    <button onClick={endTurn} className="px-4 py-1 rounded bg-zinc-800 hover:bg-white hover:text-black border border-zinc-600 text-white font-bebas text-lg transition-all absolute left-full ml-4 whitespace-nowrap">
                                        END TURN
                                    </button>
                                )}
                            </div>

                            {/* Cards in Hand */}
                            <div className="flex-1 flex justify-center items-end pb-2">
                                <div className="flex px-8 relative h-48 items-end">
                                    {myState.hand.map((cardId, i) => {
                                        const cardCost = CARDS[cardId]?.cost || 0;
                                        const playable = isMyTurn && myState.energy >= cardCost;
                                        return (
                                            <div key={i} className={`transition-transform duration-300 ${i !== 0 ? '-ml-8' : ''}`}>
                                                <CardUI 
                                                    cardId={cardId} 
                                                    isPlayable={playable} 
                                                    disabled={!isMyTurn || isGameOver}
                                                    onClick={() => playCard(i)} 
                                                />
                                            </div>
                                        );
                                    })}
                                    {myState.hand.length === 0 && (
                                        <div className="font-bebas text-zinc-600 text-2xl pb-8">NO CARDS IN HAND</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
