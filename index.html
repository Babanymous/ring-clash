<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hajime no Ippo Ring Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
  /* ════════════════════════════════════════════
     DESIGN SYSTEM
  ════════════════════════════════════════════ */
  :root{
    --bg:#070a10;--bg2:#0d1322;--bg3:#131d34;--bg4:#192440;
    --border:#1c2840;--border2:#2c3c66;--border3:#3e5090;
    --text:#eef2ff;--muted:#4e5f88;--muted2:#8898c0;
    --gold:#c08828;--gold2:#e0ae48;--gold3:#f8d068;
    --red:#b81028;--red2:#d81535;--red3:#ff3355;
    --green:#00c05a;--green2:#00f068;
    --fd:"Bebas Neue",sans-serif;--fb:"Barlow Condensed",sans-serif;
  }
  /* Per-style accent variables */
  .sa-balanced{--sa:#3b82f6;--sa2:#93c5fd;--sa3:rgba(59,130,246,.14);--sa4:rgba(59,130,246,.07)}
  .sa-slugger {--sa:#f97316;--sa2:#fdba74;--sa3:rgba(249,115,22,.14);--sa4:rgba(249,115,22,.07)}
  .sa-counter  {--sa:#a855f7;--sa2:#d8b4fe;--sa3:rgba(168,85,247,.14);--sa4:rgba(168,85,247,.07)}
  .sa-tank     {--sa:#10b981;--sa2:#6ee7b7;--sa3:rgba(16,185,129,.14);--sa4:rgba(16,185,129,.07)}
  .sa-speed    {--sa:#eab308;--sa2:#fde68a;--sa3:rgba(234,179,8,.14);--sa4:rgba(234,179,8,.07)}
  .sa-buff     {--sa:#6366f1;--sa2:#a5b4fc;--sa3:rgba(99,102,241,.14);--sa4:rgba(99,102,241,.07)}

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
  body{font-family:var(--fb)}
  #app{width:100vw;height:100dvh;position:relative}

  /* ── Animations ── */
  .view{position:absolute;inset:0;display:flex;flex-direction:column;animation:vIn .26s cubic-bezier(.3,0,.7,1) both}
  @keyframes vIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes hpPulse{0%,100%{opacity:1}50%{opacity:.48}}
  @keyframes turnBlink{0%,100%{opacity:1}50%{opacity:.38}}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes bandShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
  @keyframes selPop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

  /* ── Buttons ── */
  .btn{
    border:1px solid var(--border2);
    background:linear-gradient(180deg,#1c2848,#111930);
    color:var(--text);border-radius:10px;padding:10px 18px;
    font-family:var(--fd);letter-spacing:.1em;cursor:pointer;
    transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;
    touch-action:manipulation;min-height:44px;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    user-select:none;-webkit-user-select:none;position:relative;overflow:hidden;
  }
  .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 55%);pointer-events:none}
  .btn:hover{transform:translateY(-2px);border-color:var(--border3);box-shadow:0 5px 18px rgba(0,0,0,.45)}
  .btn:active{transform:translateY(1px) scale(.96)}
  .btn:disabled{opacity:.27;transform:none;cursor:not-allowed;box-shadow:none}
  .btn-p{background:linear-gradient(150deg,#e82040,#b01028);border-color:#ff3755;box-shadow:0 3px 14px rgba(184,16,40,.4)}
  .btn-p:hover{background:linear-gradient(150deg,#ff3f60,#c81535);box-shadow:0 6px 22px rgba(184,16,40,.6)}
  .btn-gold{background:linear-gradient(150deg,#d09830,#8a6012);border-color:var(--gold3);color:#110900;box-shadow:0 3px 14px rgba(192,136,40,.35)}
  .btn-gold:hover{background:linear-gradient(150deg,#f0b840,#aa7820)}

  /* ── Toast ── */
  .toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none}
  .toast{
    background:rgba(8,12,22,.97);border:1px solid var(--border2);
    border-radius:999px;padding:10px 20px;
    box-shadow:0 4px 24px rgba(0,0,0,.8);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    animation:vIn .2s ease both;font-size:.87rem;white-space:nowrap;
  }

  /* ════════════════════════════════════════════
     MENU
  ════════════════════════════════════════════ */
  .menu{
    align-items:center;justify-content:center;text-align:center;gap:24px;padding:28px;
    background:
      radial-gradient(ellipse 110% 60% at 50% 108%,rgba(184,16,40,.32),transparent 60%),
      radial-gradient(ellipse 70% 50% at 6% 14%,rgba(59,130,246,.09),transparent 55%),
      radial-gradient(ellipse 50% 38% at 94% 16%,rgba(168,85,247,.07),transparent 50%),
      var(--bg);
  }
  /* Ring rope grid */
  .menu::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:
      repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(192,136,40,.04) 60px),
      repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(192,136,40,.03) 60px);
  }
  /* Outer ring frame */
  .menu::after{content:'';position:absolute;inset:18px;pointer-events:none;border:1px solid rgba(192,136,40,.1);border-radius:22px}
  .menu>*{position:relative;z-index:1}

  .menu-logo{display:flex;flex-direction:column;align-items:center;gap:7px}
  .t1,.t3{font-family:var(--fd);font-size:clamp(3rem,12vw,7rem);line-height:.84;letter-spacing:.02em;text-shadow:0 0 60px rgba(184,16,40,.4),0 2px 0 rgba(0,0,0,.9)}
  .t2{
    font-family:var(--fd);font-size:clamp(2.2rem,9vw,4.8rem);line-height:1;
    background:linear-gradient(135deg,#ff3055,#b81028);
    display:inline-block;padding:3px 28px;transform:skewX(-8deg);
    box-shadow:6px 6px 0 rgba(0,0,0,.65),0 0 55px rgba(184,16,40,.55);position:relative;
  }
  .t2::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 55%);pointer-events:none}
  .t3{font-size:clamp(1.8rem,7vw,4rem);color:var(--muted2)}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .sub{color:var(--muted);font-size:.84rem;letter-spacing:.07em}
  .gold-rule{width:100px;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}

  /* ════════════════════════════════════════════
     PANEL (Deck Builder / Arena)
  ════════════════════════════════════════════ */
  .panel{
    margin:10px;border:1px solid var(--border);border-radius:16px;
    background:linear-gradient(180deg,#0d1628,#080e1e);
    padding:12px;overflow:hidden;display:flex;flex-direction:column;gap:10px;
  }
  .panel-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .panel-title{font-family:var(--fd);letter-spacing:.13em;font-size:1rem;color:var(--gold2)}
  .tabs{display:flex;gap:8px}
  .tally{display:flex;gap:6px;align-items:center}
  .tally-chip{
    font-size:.7rem;font-family:var(--fd);letter-spacing:.08em;
    background:var(--bg3);border:1px solid var(--border2);border-radius:999px;padding:3px 11px;color:var(--muted2);
  }
  .tally-chip.done{border-color:var(--gold);color:var(--gold2)}

  /* ════════════════════════════════════════════
     TCG CARDS GRID
  ════════════════════════════════════════════ */
  .cards{
    flex:1;overflow-y:auto;overflow-x:hidden;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(152px,1fr));
    grid-auto-rows:276px;
    gap:12px;align-content:start;padding-bottom:4px;
  }
  .cards::-webkit-scrollbar{width:4px}
  .cards::-webkit-scrollbar-track{background:transparent}
  .cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}

  /* ── Card frame ── */
  .tcg{
    position:relative;border-radius:13px;overflow:hidden;cursor:pointer;
    background:
      linear-gradient(160deg,rgba(255,255,255,.03) 0,transparent 40%),
      linear-gradient(165deg,#17223c 0%,#0c1326 55%,#090f1f 100%);
    border:1px solid var(--border2);
    box-shadow:0 6px 22px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);
    display:flex;flex-direction:column;
    transition:transform .2s cubic-bezier(.25,.8,.25,1),box-shadow .2s,border-color .2s;
    touch-action:manipulation;
  }
  .tcg:hover{
    transform:translateY(-6px) scale(1.028);
    border-color:var(--sa,var(--border3));
    box-shadow:0 18px 40px rgba(0,0,0,.75),0 0 0 1px var(--sa,var(--border3)),0 0 24px var(--sa3,transparent);
  }
  .tcg:active{transform:translateY(0) scale(.97)}
  .tcg.sel{
    border-color:var(--sa,var(--red3));
    box-shadow:0 0 0 2px var(--sa,var(--red3)),0 10px 30px rgba(0,0,0,.65),0 0 40px var(--sa3,rgba(184,16,40,.2));
  }
  /* Animated shimmer band at top */
  .tcg-band{
    height:5px;flex-shrink:0;
    background:linear-gradient(90deg,var(--sa,#3a4870),transparent 30%,var(--sa2,#6070a8),transparent 70%,var(--sa,#3a4870));
    background-size:250% auto;animation:bandShimmer 4s linear infinite;
  }
  .tcg.sel .tcg-band{animation:bandShimmer 1.4s linear infinite}
  /* Card header row */
  .tcg-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 8px 3px;flex-shrink:0;gap:5px}
  .tcg-type{
    font-size:.57rem;font-family:var(--fd);letter-spacing:.13em;
    border:1px solid var(--sa,var(--border2));color:var(--sa2,var(--muted2));
    background:var(--sa4,transparent);border-radius:999px;padding:2px 9px;white-space:nowrap;
  }
  .tcg-icon-sm{font-size:.9rem;line-height:1;flex-shrink:0}
  .tcg-cost-badge{
    font-size:.7rem;font-family:var(--fd);letter-spacing:.05em;
    background:linear-gradient(135deg,var(--gold2),#7a5c0e);color:#110800;
    border-radius:999px;padding:2px 9px;font-weight:700;
  }
  /* Art zone */
  .tcg-art{
    flex:1;margin:0 7px;border-radius:9px;min-height:0;
    background:#0a1020 center/cover no-repeat;
    border:1px solid rgba(255,255,255,.07);
    display:grid;place-items:center;font-size:3.4rem;
    position:relative;overflow:hidden;
  }
  .tcg-art::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 45%,rgba(4,7,16,.85));
    pointer-events:none;
  }
  /* Buff icon zone (no image) */
  .tcg-buff-ico{
    flex:1;margin:0 7px;border-radius:9px;min-height:0;
    background:radial-gradient(ellipse at 50% 55%,var(--sa3,rgba(99,102,241,.14)),transparent 72%);
    border:1px solid rgba(255,255,255,.06);
    display:grid;place-items:center;font-size:3.6rem;position:relative;
  }
  /* Nameplate */
  .tcg-plate{padding:5px 8px 3px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.06)}
  .tcg-name{font-family:var(--fd);font-size:.98rem;letter-spacing:.04em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcg-flavor{font-size:.69rem;color:var(--muted2);line-height:1.25;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Stat strip */
  .tcg-stats{
    display:flex;justify-content:space-around;
    padding:5px 7px 8px;flex-shrink:0;gap:2px;
    border-top:1px solid rgba(255,255,255,.05);
    background:linear-gradient(180deg,transparent,rgba(0,0,0,.4));
  }
  .ts{display:flex;flex-direction:column;align-items:center;gap:0px;flex:1}
  .ts-l{font-size:.55rem;letter-spacing:.1em;font-family:var(--fd);color:var(--muted)}
  .ts-v{font-size:.96rem;font-family:var(--fd);letter-spacing:.02em;line-height:1.1}
  /* Selected checkmark */
  .tcg-chk{
    position:absolute;top:9px;right:9px;width:22px;height:22px;
    background:var(--sa,var(--red2));border-radius:50%;
    display:grid;place-items:center;font-size:.75rem;color:#fff;
    z-index:4;box-shadow:0 2px 8px rgba(0,0,0,.5);
    animation:selPop .18s cubic-bezier(.35,0,.2,1.5) both;
  }

  /* ════════════════════════════════════════════
     ARENA SCREEN
  ════════════════════════════════════════════ */
  .arena-hd{
    font-family:var(--fd);letter-spacing:.13em;font-size:.88rem;color:var(--gold2);
    display:flex;align-items:center;gap:8px;
  }
  .arena-hd::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .choice{
    position:relative;border:1px solid var(--border);border-radius:14px;overflow:hidden;
    background:linear-gradient(165deg,#162038,#0c1428);
    padding:15px 13px;cursor:pointer;
    transition:transform .16s,box-shadow .16s,border-color .16s;touch-action:manipulation;
  }
  .choice::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#8a6012)}
  .choice:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 10px 28px rgba(0,0,0,.5),0 0 0 1px var(--gold)}
  .choice:active{transform:scale(.97)}
  .choice-ico{font-size:1.8rem;margin-bottom:7px;display:block}
  .choice h3{font-family:var(--fd);letter-spacing:.08em;font-size:1.15rem;color:var(--text)}
  .choice p{font-size:.76rem;color:var(--muted2);margin-top:4px;line-height:1.35}
  .rooms{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:148px;overflow-y:auto}
  .room{border:1px solid var(--border);border-radius:10px;background:var(--bg3);padding:9px 11px;cursor:pointer;transition:border-color .14s,background .14s;touch-action:manipulation}
  .room:hover{border-color:var(--border2);background:var(--bg4)}
  .room b{font-family:var(--fd);letter-spacing:.1em;font-size:1.05rem;color:var(--gold2)}
  .warn{border:1px solid #7a5e20;background:rgba(120,90,28,.15);color:#f0d090;border-radius:10px;padding:9px 12px;font-size:.78rem}

  /* ════════════════════════════════════════════
     BATTLE SCREEN
  ════════════════════════════════════════════ */
  .battle{
    display:grid;grid-template-rows:auto 1fr auto 1fr auto;overflow:hidden;
    background:
      radial-gradient(ellipse 140% 38% at 50% 0%,rgba(184,16,40,.12),transparent 50%),
      radial-gradient(ellipse 140% 38% at 50% 100%,rgba(59,130,246,.07),transparent 50%),
      var(--bg);
  }
  /* Opponent info bar */
  .bar{
    padding:7px 12px;
    background:linear-gradient(90deg,#080d1c,#0e1730);
    border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .bar-left{display:flex;align-items:center;gap:8px}
  .bar-lbl{font-family:var(--fd);letter-spacing:.07em;font-size:.9rem}
  .bar-tc{
    font-family:var(--fd);font-size:.78rem;letter-spacing:.06em;
    background:linear-gradient(135deg,var(--gold2),#7a5c10);color:#120900;
    border-radius:999px;padding:2px 10px;font-weight:700;
  }
  /* Fighter roster slots */
  .slots{display:flex;gap:5px;align-items:center}
  .slot{
    width:37px;height:37px;border:1px solid var(--border2);border-radius:9px;
    background:var(--bg3);display:grid;place-items:center;font-size:1.15rem;
    transition:all .14s;
  }
  button.slot{cursor:pointer;touch-action:manipulation}
  button.slot:not(:disabled):hover{border-color:var(--gold);background:var(--bg4);transform:scale(1.12)}
  button.slot:not(:disabled):active{transform:scale(.88)}
  .slot.dead{opacity:.17;filter:grayscale(1)}

  /* ── Active fighter card ── */
  .fight-card{
    margin:7px 10px;border-radius:13px;overflow:hidden;
    border:1px solid var(--border2);
    box-shadow:0 6px 22px rgba(0,0,0,.55);
    display:flex;align-items:stretch;
    background:linear-gradient(160deg,#162036,#0d1428);
  }
  .fc-accent{width:5px;flex-shrink:0;background:linear-gradient(180deg,var(--sa,#3a4870),var(--sa2,#6070b0))}
  .fc-art{
    width:82px;min-width:82px;
    background:#0b1022 center/cover no-repeat;
    display:grid;place-items:center;font-size:2.4rem;
    border-right:1px solid var(--border);flex-shrink:0;position:relative;
  }
  .fc-art::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 60%,rgba(0,0,0,.32));pointer-events:none}
  .fc-body{flex:1;padding:7px 10px;min-width:0;display:flex;flex-direction:column;gap:3px}
  .fc-row1{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
  .fname{font-family:var(--fd);font-size:1.1rem;letter-spacing:.04em;line-height:1}
  .fc-sty{
    font-size:.56rem;font-family:var(--fd);letter-spacing:.1em;
    border:1px solid var(--sa,var(--border2));color:var(--sa2,var(--muted2));
    background:var(--sa4,transparent);border-radius:999px;padding:2px 7px;white-space:nowrap;flex-shrink:0;
  }
  .fc-sub{font-size:.7rem;color:var(--muted2);line-height:1}
  .hp-hdr{display:flex;justify-content:space-between;align-items:center;font-size:.67rem;color:var(--muted);margin-top:2px}
  .hp-num{font-family:var(--fd);letter-spacing:.02em}
  .hp-num.low{color:#ff5575}
  .hp-num.mid{color:#f59e0b}
  .hpb{height:7px;border-radius:999px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.07);overflow:hidden;margin-bottom:3px}
  .hpfill{height:100%;background:linear-gradient(90deg,#00c05a,#00f880);transition:width .4s cubic-bezier(.25,.8,.25,1);border-radius:999px}
  .hpfill.mid{background:linear-gradient(90deg,#f59e0b,#fde08a)}
  .hpfill.low{background:linear-gradient(90deg,#ef4444,#ff6882);animation:hpPulse 1.1s ease-in-out infinite}
  .fc-stats{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .fst{display:flex;gap:2px;align-items:center}
  .fst-l{font-size:.58rem;font-family:var(--fd);letter-spacing:.08em;color:var(--muted)}
  .fst-v{font-size:.9rem;font-family:var(--fd)}
  .guard-tag{font-size:.58rem;font-family:var(--fd);letter-spacing:.07em;background:linear-gradient(135deg,#f59e0b,#c07800);color:#1a0e00;border-radius:999px;padding:2px 8px}

  /* ── Battle log ── */
  .logbox{
    display:flex;align-items:center;justify-content:center;
    padding:5px 14px;text-align:center;
    background:linear-gradient(90deg,var(--bg),rgba(255,255,255,.018),var(--bg));
    border-top:1px solid var(--border);border-bottom:1px solid var(--border);
    min-height:50px;position:relative;overflow:hidden;
  }
  .logbox::before{
    content:'';position:absolute;left:8%;right:8%;top:50%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(192,136,40,.14),transparent);
  }
  .log-inner{position:relative;z-index:1}
  .turn-lbl{font-family:var(--fd);letter-spacing:.26em;font-size:.7rem;color:var(--muted);margin-bottom:1px}
  .turn-lbl.yours{color:#ff5572;animation:turnBlink 1.2s ease-in-out infinite}
  .log-txt{font-family:var(--fd);font-size:1rem;letter-spacing:.04em}

  /* ── Controls panel ── */
  .ctrl{
    border-top:2px solid var(--border);
    background:linear-gradient(180deg,#0c1528,#070c1a);
    padding:7px 9px;display:flex;flex-direction:column;gap:7px;
  }
  .act-row{display:flex;gap:7px;align-items:stretch}
  .act-row .btn{flex:1;min-height:44px}
  .sw-row{display:flex;gap:5px;align-items:center}

  /* ── Battle buff chips ── */
  .buffs{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .buffs::-webkit-scrollbar{height:3px}
  .buffs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
  .buff{
    min-width:114px;flex-shrink:0;scroll-snap-align:start;
    border:1px solid var(--border2);border-radius:11px;
    background:linear-gradient(165deg,#14203a,#0b1428);
    padding:7px 8px;cursor:pointer;
    transition:transform .15s,border-color .15s,box-shadow .15s;touch-action:manipulation;
    position:relative;overflow:hidden;
  }

    function hashRoll(seed){let h=0;for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))%100000;return (Math.sin(h)+1)/2}

      if(hashRoll(`${salt}|dodge`) < dodgeChance){ atk.momentum=Math.min(3,atk.momentum+1); return {log:`${def.name} evades the punch!`}; }
      let dmg=Math.max(8,atk.atk-Math.floor(def.def/2))+styleBonus(atk.style)+(atk.momentum*2);
      const critChance=Math.min(0.35,0.08+atk.momentum*0.08);

      if(hashRoll(`${salt}|crit`) < critChance){dmg=Math.floor(dmg*1.5);crit=true;}

            <div class="fname">${bx.name}</div>
            <div class="fc-sty">${bx.style.toUpperCase()}</div>
          </div>
          <div class="fc-sub">${bx.title}</div>
          <div class="hp-hdr">
            <span>HP</span>
            <span class="hp-num ${hpC}">${bx.hp}<span style="color:var(--muted);font-size:.85em">/${bx.maxHp}</span></span>
          </div>
          <div class="hpb"><div class="hpfill ${hpC}" style="width:${pct}%"></div></div>
          <div class="fc-stats">
            <div class="fst"><span class="fst-l">ATK</span><span class="fst-v" style="color:#ffd787">${bx.atk}</span></div>
            <div class="fst"><span class="fst-l">DEF</span><span class="fst-v" style="color:#9fceff">${bx.def}</span></div>
            <div class="fst"><span class="fst-l">MOM</span><span class="fst-v" style="color:#e6beff">${bx.momentum||0}</span></div>
            ${bx.guard?'<div class="guard-tag">GUARD</div>':""}
          </div>
        </div>
      </div>`;
    }

    function renderBattle(){
      const b=S.battle;
      if(!b)return goto("menu");
      const myRole=b.mode==="online"?S.online.role:"host",myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";
      const me=b[myKey],op=b[opKey],myTurn=(b.mode==="ai"?b.turn==="host":b.turn===myRole),can=b.state==="playing"&&myTurn&&!S.online.lock;
      const isWin=(b.mode==="ai"&&b.winner==="host")||(b.mode==="online"&&b.winner===myRole);
      app().innerHTML=`<div class="view battle">
        <div class="bar">
          <div class="bar-left">
            <div class="slots">${op.boxers.map(x=>`<div class="slot ${x.dead?"dead":""}">${x.icon}</div>`).join("")}</div>
            <div class="bar-lbl">${op.label}</div>
          </div>
          <div class="bar-tc">TC ${op.tc}</div>
        </div>
        ${fightCard(op.boxers[op.active])}
        <div class="logbox">
          <div class="log-inner">
            <div class="turn-lbl${can?" yours":""}">${can?"● YOUR TURN":"○ OPPONENT TURN"}</div>
            <div class="log-txt">${b.log[b.log.length-1]||""}</div>
          </div>
        </div>
        ${fightCard(me.boxers[me.active])}
        <div class="ctrl">
          <div class="act-row">
            <div class="sw-row">${me.boxers.map((x,i)=>`<button class="slot ${x.dead?"dead":""}" data-sw="${i}" ${(!can||i===me.active||x.dead)?"disabled":""}>${x.icon}</button>`).join("")}</div>
            <button class="btn" id="a-guard" ${can?"":"disabled"}>GUARD</button>
            <button class="btn" id="a-pass" ${can?"":"disabled"}>PASS</button>
            <button class="btn btn-p" id="a-hit" ${can?"":"disabled"}>ATTACK</button>
          </div>
          <div class="buffs">${me.buffs.map((f,i)=>{const u=can&&!f.used&&me.tc>=f.cost;return `<button class="buff ${u?"":"dis"}" data-bf="${i}" ${u?"":"disabled"}><div class="buff-top2"><div class="buff-ico">${f.icon}</div><div class="buff-tc">${f.cost} TC</div></div><div class="buff-nm">${f.name}</div><div class="buff-dc">${f.desc}</div></button>`}).join("")}</div>
        </div>
        ${b.state==="finished"?`<div class="ov"><div class="ov-box">
          <div class="ov-result ${isWin?"win":"lose"}">${isWin?"VICTORY":"DEFEAT"}</div>
          <div class="ov-rule"></div>
          <div class="ov-sub">${isWin?"THE CROWD GOES WILD":"THE BELL HAS RUNG"}</div>
          <button class="btn btn-p" id="b-ex" style="font-size:1.1rem;padding:13px 32px">RETURN TO MENU</button>
        </div></div>`:""}
      </div>`;
      if(b.state==="finished"){document.getElementById("b-ex").onclick=()=>{if(S.online.roomCb&&S.online.roomId)roomsRef(S.online.roomId).off("value",S.online.roomCb);S.online.roomCb=null;S.online.roomId=null;S.online.role=null;S.battle=null;goto("menu")};return}
      document.getElementById("a-hit").onclick=()=>act("attack");
      document.getElementById("a-guard").onclick=()=>act("guard");
      document.getElementById("a-pass").onclick=()=>act("pass");
      app().querySelectorAll("[data-sw]").forEach(el=>el.onclick=()=>act("switch",+el.dataset.sw));
      app().querySelectorAll("[data-bf]").forEach(el=>el.onclick=()=>act("buff",+el.dataset.bf));
    }

    /* ════════════ ONLINE & AI LOGIC — UNCHANGED ════════════ */
    function onlineApplyAction(bb,role,kind,idx){const me=bb[role],op=bb[role==="host"?"guest":"host"],myA=me.boxers[me.active],opA=op.boxers[op.active];let log=null;if(kind==="attack"){const r=resolveAttack(bb,myA,opA,`${bb.turnCount}|${myA.iid}|${opA.iid}`);log=r.log;me.tc=Math.min(8,me.tc+1);if(opA.hp<=0){opA.hp=0;opA.dead=true;log=`KO! ${opA.name} is down`;const ni=nextAlive(op);if(ni<0){bb.state="finished";bb.winner=role}else op.active=ni}}else if(kind==="switch"){if(typeof idx!=="number"||idx===me.active||!me.boxers[idx]||me.boxers[idx].dead||me.tc<1)return null;me.active=idx;me.tc-=1;log=`${me.boxers[idx].name} tagged in`}else if(kind==="buff"){if(typeof idx!=="number"||!me.buffs[idx])return null;const f=me.buffs[idx];if(f.used||me.tc<f.cost||!condOk(f,me))return null;applyBuff(f,me);f.used=true;me.tc-=f.cost;log=`${myA.name} used ${f.name}`}else if(kind==="guard"){myA.guard=true;myA.momentum=Math.min(3,myA.momentum+1);log=`${myA.name} takes guard stance`}else if(kind==="pass"){me.tc=Math.min(8,me.tc+1);log="Turn passed (+1 TC)"}if(!log)return null;bb.log.push(log);endTurn(bb);return true}
    async function act(kind,idx){const b=S.battle;if(!b||b.state!=="playing")return;if(b.mode==="ai")return actAI(kind,idx);if(!S.online.roomId||S.online.lock)return;const role=S.online.role;if(b.turn!==role)return;S.online.lock=true;try{const tx=await roomsRef(S.online.roomId).transaction(room=>{if(!room||room.status!=="playing"||!room.battle)return room;const bb=room.battle;if(bb.turn!==role||bb.state!=="playing")return room;const ok=onlineApplyAction(bb,role,kind,idx);if(!ok)return room;if(bb.state==="finished")room.status="finished";room.updatedAt=now();return room},undefined,false);if(!tx.committed)toast("Action rejected.")}catch(e){console.error(e);toast(`Sync error: ${e.code||"unknown"}`)}finally{S.online.lock=false}}
    function actAI(kind,idx){const b=S.battle;if(!b||b.state!=="playing"||b.turn!=="host")return;const ok=onlineApplyAction(b,"host",kind,idx);if(!ok)return;renderBattle();if(b.state==="playing")setTimeout(aiTurn,700)}
    function aiTurn(){const b=S.battle;if(!b||b.mode!=="ai"||b.state!=="playing"||b.turn!=="guest")return;const ai=b.guest,a=ai.boxers[ai.active];const low=a.hp<=a.maxHp*.45;const canGuard=!a.guard&&ai.tc>=0;const usable=ai.buffs.map((f,i)=>({f,i})).filter(x=>!x.f.used&&ai.tc>=x.f.cost&&condOk(x.f,ai));if(low&&canGuard&&Math.random()<.35){onlineApplyAction(b,"guest","guard")}else if(usable.length&&Math.random()<.33){const pick=usable[Math.floor(Math.random()*usable.length)];onlineApplyAction(b,"guest","buff",pick.i)}else{onlineApplyAction(b,"guest","attack")}renderBattle()}

    load();render();
  </script>
</body>
</html>
