<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hajime no Ippo · Ring Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
  /* ══════════════════════════════════════
     RING CLASH v2 — MANGA PRINT PREMIUM
  ══════════════════════════════════════ */
  :root{
    --bg:#0a0a0a;--bg2:#111111;--bg3:#181818;--bg4:#202020;
    --border:#222;--border2:#333;--border3:#555;
    --text:#f5f0e8;--muted:#666;--muted2:#999;
    --ink:#1a1a1a;
    --red:#c8102e;--red2:#e8192f;--red3:#ff3048;
    --gold:#c89420;--gold2:#e8b030;--gold3:#f8cc50;--gold4:#fff8d0;
    --green:#18a848;--green2:#20d860;
    --cream:#f5f0e0;--cream2:#ede8d8;
    --fd:"Bebas Neue",sans-serif;
    --fh:"Bebas Neue",sans-serif;
    --fb:"Barlow Condensed",sans-serif;
    --fp:"Barlow",sans-serif;
    --radius:12px;--radius-sm:8px;
  }
  .sa-balanced{--sa:#3a6ee8;--sa2:#7aaaf8;--sa3:rgba(58,110,232,.22);--sa4:rgba(58,110,232,.08);--sag:58,110,232}
  .sa-slugger {--sa:#e04818;--sa2:#f89060;--sa3:rgba(224,72,24,.22);--sa4:rgba(224,72,24,.08);--sag:224,72,24}
  .sa-counter {--sa:#8830e0;--sa2:#c080f8;--sa3:rgba(136,48,224,.22);--sa4:rgba(136,48,224,.08);--sag:136,48,224}
  .sa-tank    {--sa:#18a848;--sa2:#60e890;--sa3:rgba(24,168,72,.22);--sa4:rgba(24,168,72,.08);--sag:24,168,72}
  .sa-speed   {--sa:#d8b020;--sa2:#f0d860;--sa3:rgba(216,176,32,.22);--sa4:rgba(216,176,32,.08);--sag:216,176,32}
  .sa-buff    {--sa:#5858e8;--sa2:#9898f8;--sa3:rgba(88,88,232,.22);--sa4:rgba(88,88,232,.08);--sag:88,88,232}

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
  body{font-family:var(--fb);font-weight:500}
  #app{width:100vw;height:100dvh;position:relative}

  /* ════════════════════════════
     KEYFRAMES
  ════════════════════════════ */
  .view{position:absolute;inset:0;display:flex;flex-direction:column;animation:vIn .28s cubic-bezier(.2,0,.5,1) both}
  @keyframes vIn        {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes hpPulse    {0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes floatY     {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes bandShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
  @keyframes selPop     {0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  @keyframes pipPop     {0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
  @keyframes stunShake  {0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
  @keyframes pulseGlow  {0%,100%{opacity:.7}50%{opacity:1}}
  @keyframes shimmerPass{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
  @keyframes inkDrip    {0%{transform:scaleY(0);transform-origin:top}100%{transform:scaleY(1);transform-origin:top}}
  @keyframes mangaFlash {0%{opacity:0}15%{opacity:1}85%{opacity:1}100%{opacity:0}}
  @keyframes speedLine  {0%{transform:translateX(-100%) skewX(-15deg)}100%{transform:translateX(200%) skewX(-15deg)}}
  /* Battle animations */
  @keyframes fcPunchUp  {0%{transform:translateY(0)scale(1)}22%{transform:translateY(-12px)scale(1.06)}65%{transform:translateY(3px)scale(.96)}100%{transform:translateY(0)scale(1)}}
  @keyframes fcPunchDn  {0%{transform:translateY(0)scale(1)}22%{transform:translateY(12px)scale(1.06)}65%{transform:translateY(-3px)scale(.96)}100%{transform:translateY(0)scale(1)}}
  @keyframes fcHit      {0%{transform:translateX(0)}10%{transform:translateX(-12px)}25%{transform:translateX(12px)}42%{transform:translateX(-8px)}58%{transform:translateX(8px)}74%{transform:translateX(-3px)}88%{transform:translateX(3px)}100%{transform:translateX(0)}}
  @keyframes hitFlash   {0%,100%{opacity:0}28%{opacity:.7}}
  @keyframes hitGold    {0%,100%{opacity:0}28%{opacity:.85}}
  @keyframes healFlash  {0%,100%{opacity:0}28%{opacity:.5}}
  @keyframes koFlash    {0%{opacity:0}12%{opacity:1}55%{opacity:.7}100%{opacity:0}}
  @keyframes sigRipple  {0%{transform:scale(.5);opacity:.9}100%{transform:scale(2.5);opacity:0}}
  @keyframes dmgFloat   {0%{opacity:1;transform:translateX(-50%)translateY(0)scale(1)}15%{opacity:1;transform:translateX(-50%)translateY(-18px)scale(1.15)}78%{opacity:.3;transform:translateX(-50%)translateY(-55px)scale(.82)}100%{opacity:0;transform:translateX(-50%)translateY(-72px)scale(.6)}}
  @keyframes logSlide   {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes sigBurst   {0%{transform:scale(1)}18%{transform:scale(1.09)}48%{transform:scale(.96)}74%{transform:scale(1.03)}100%{transform:scale(1)}}
  @keyframes ctrlIn     {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes newBoxerIn {0%{opacity:0;transform:scale(.84)translateY(18px)}55%{opacity:1;transform:scale(1.04)translateY(-4px)}100%{opacity:1;transform:scale(1)translateY(0)}}
  @keyframes cardIdle   {0%,100%{box-shadow:0 0 0 2px rgba(var(--sag,80,100,200),.22),0 10px 40px rgba(0,0,0,.9)}50%{box-shadow:0 0 0 2px rgba(var(--sag,80,100,200),.5),0 14px 50px rgba(0,0,0,.95),0 0 34px rgba(var(--sag,80,100,200),.15)}}
  @keyframes scanlines  {0%{background-position:0 0}100%{background-position:0 4px}}
  @keyframes titleDrop  {0%{opacity:0;transform:translateY(-30px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes subtitleFade{0%{opacity:0;letter-spacing:.6em}100%{opacity:1;letter-spacing:.22em}}

  .fight-card.punching-up {animation:fcPunchUp .4s cubic-bezier(.3,0,.7,1) both!important}
  .fight-card.punching-dn {animation:fcPunchDn .4s cubic-bezier(.3,0,.7,1) both!important}
  .fight-card.taking-hit  {animation:fcHit .38s cubic-bezier(.25,.8,.25,1) both!important}
  .fight-card.sig-burst   {animation:sigBurst .5s cubic-bezier(.3,0,.7,1) both!important}

  .hit-ov{position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;z-index:10}
  .hit-ov.red  {background:rgba(255,30,60,.45);animation:hitFlash .42s ease both}
  .hit-ov.gold {background:rgba(255,210,60,.5);animation:hitGold .55s ease both;box-shadow:inset 0 0 50px rgba(255,190,50,.3)}
  .hit-ov.heal {background:rgba(0,228,90,.28);animation:healFlash .44s ease both}
  .hit-ov.ko   {background:rgba(255,255,255,.88);animation:koFlash .62s ease both}
  .sig-ripple{position:absolute;border-radius:50%;border:2px solid var(--gold3);pointer-events:none;z-index:11;animation:sigRipple .68s ease both;width:100%;height:100%;top:0;left:0}

  /* Damage floats */
  .dmg-float{position:absolute;z-index:20;pointer-events:none;font-family:var(--fd);letter-spacing:.04em;animation:dmgFloat 1.1s cubic-bezier(.25,.8,.25,1) both;transform:translateX(-50%)}
  .dmg-float.crit {font-size:2.4rem;color:#ff1840;text-shadow:2px 2px 0 #000,0 0 20px rgba(255,24,64,.8),-2px -2px 0 #000}
  .dmg-float.sig  {font-size:2.2rem;color:var(--gold3);text-shadow:2px 2px 0 #000,0 0 20px rgba(248,204,80,.8)}
  .dmg-float.norm {font-size:1.7rem;color:#ff8888;text-shadow:2px 2px 0 #000}
  .dmg-float.heal {font-size:1.5rem;color:#30f870;text-shadow:2px 2px 0 #000}
  .dmg-float.bleed{font-size:1.2rem;color:#ff4444;text-shadow:1px 1px 0 #000}
  .log-txt.slide{animation:logSlide .28s ease both}
  .ctrl.ctrl-in {animation:ctrlIn .32s ease both}

  /* ════════════════════════════
     BUTTONS — Manga ink style
  ════════════════════════════ */
  .btn{
    border:2px solid var(--border2);
    background:var(--bg3);
    color:var(--text);border-radius:4px;padding:9px 14px;
    font-family:var(--fd);letter-spacing:.12em;cursor:pointer;font-size:.9rem;
    transition:transform .12s,box-shadow .12s,border-color .12s,background .12s;
    touch-action:manipulation;min-height:42px;
    display:inline-flex;align-items:center;justify-content:center;gap:5px;
    user-select:none;-webkit-user-select:none;position:relative;overflow:hidden;
    text-transform:uppercase;
  }
  .btn::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:none;pointer-events:none}
  .btn:hover{transform:translateY(-2px);border-color:var(--border3);background:var(--bg4);box-shadow:0 4px 16px rgba(0,0,0,.6)}
  .btn:hover::after{animation:shimmerPass .5s ease both}
  .btn:active{transform:translateY(1px)scale(.97)}
  .btn:disabled{opacity:.2;transform:none;cursor:not-allowed;box-shadow:none}
  .btn-p{background:var(--red);border-color:var(--red2);color:#fff;box-shadow:3px 3px 0 #6a0010}
  .btn-p:not(:disabled):hover{background:var(--red2);box-shadow:4px 4px 0 #8a0018,0 6px 20px rgba(200,16,40,.5)}
  .btn-sig{background:linear-gradient(135deg,var(--gold),#7a5800);border-color:var(--gold3);color:#1a0e00;box-shadow:3px 3px 0 rgba(0,0,0,.6)}
  .btn-sig.live{box-shadow:0 0 0 2px var(--gold3),3px 3px 0 rgba(0,0,0,.6),0 0 30px rgba(248,204,80,.35);animation:pulseGlow 1s ease-in-out infinite}
  .btn-sig:not(:disabled):hover{background:linear-gradient(135deg,var(--gold2),#9a7010);box-shadow:4px 4px 0 rgba(0,0,0,.7),0 6px 20px rgba(200,160,30,.5)}

  /* ════════════════════════════
     TOAST
  ════════════════════════════ */
  .toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none}
  .toast{background:#111;border:2px solid var(--border3);border-radius:4px;padding:9px 20px;box-shadow:4px 4px 0 rgba(0,0,0,.8);animation:vIn .2s ease both;font-family:var(--fd);font-size:.9rem;white-space:nowrap;letter-spacing:.08em}

  /* ════════════════════════════
     MENU — Manga title screen
  ════════════════════════════ */
  .menu{
    align-items:center;justify-content:center;text-align:center;gap:20px;padding:32px 24px;
    background:#0a0a0a;overflow:hidden;
  }
  /* Halftone dot bg */
  .menu::before{
    content:'';position:absolute;inset:0;pointer-events:none;opacity:.06;
    background-image:radial-gradient(circle,#fff 1px,transparent 1px);
    background-size:16px 16px;
  }
  /* Speed lines radiating from center */
  .menu::after{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:
      repeating-conic-gradient(from 0deg at 50% 55%,rgba(200,16,46,.0) 0deg, rgba(200,16,46,.03) .4deg, rgba(200,16,46,.0) .8deg);
    opacity:.7;
  }
  .menu>*{position:relative;z-index:1}

  .menu-logo{display:flex;flex-direction:column;align-items:center;gap:6px}

  /* Red action-panel title block */
  .title-block{
    position:relative;display:inline-block;
  }
  .t1{
    font-family:var(--fh);font-size:clamp(1.4rem,5vw,2.4rem);
    letter-spacing:.28em;color:var(--muted2);
    text-transform:uppercase;
    animation:subtitleFade .8s ease both;
  }
  .t2{
    font-family:var(--fh);font-size:clamp(5rem,20vw,10rem);
    line-height:.82;color:#fff;
    display:block;
    text-shadow:6px 6px 0 var(--red),-1px -1px 0 rgba(0,0,0,.9);
    animation:titleDrop .5s cubic-bezier(.2,0,.4,1.4) .1s both;
    letter-spacing:.02em;
  }
  .t3-wrap{
    background:var(--red);padding:6px 28px 5px;
    transform:skewX(-4deg);display:inline-block;
    box-shadow:4px 4px 0 #6a0010;margin-top:4px;
    animation:vIn .4s ease .25s both;
  }
  .t3{
    font-family:var(--fh);font-size:clamp(1.4rem,5vw,2.2rem);
    letter-spacing:.18em;color:#fff;
    display:block;transform:skewX(4deg);
  }
  .sub-tagline{
    font-family:var(--fb);font-size:.82rem;letter-spacing:.15em;
    color:var(--muted);text-transform:uppercase;margin-top:4px;
    animation:vIn .4s ease .4s both;
  }
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .sub{color:var(--muted);font-size:.78rem;letter-spacing:.1em}
  .ink-rule{width:80px;height:3px;background:var(--red);margin:0 auto}

  /* ════════════════════════════
     PANEL
  ════════════════════════════ */
  .panel{
    margin:0;border:none;border-radius:0;
    background:var(--bg);
    padding:12px;overflow:hidden;display:flex;flex-direction:column;gap:10px;
  }
  .panel-head{display:flex;justify-content:space-between;align-items:center;gap:8px;padding-bottom:8px;border-bottom:2px solid var(--border)}
  .panel-title{font-family:var(--fd);font-size:1.2rem;letter-spacing:.2em;color:var(--text)}
  .tabs{display:flex;gap:8px}
  .tally{display:flex;gap:6px;align-items:center}
  .tally-chip{font-family:var(--fd);font-size:.8rem;letter-spacing:.1em;background:var(--bg3);border:2px solid var(--border2);border-radius:3px;padding:3px 10px;color:var(--muted2)}
  .tally-chip.done{border-color:var(--gold2);color:var(--gold3)}

  /* ════════════════════════════
     TCG DECK CARDS
  ════════════════════════════ */
  .cards{flex:1;overflow-y:auto;overflow-x:hidden;display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));grid-auto-rows:278px;gap:10px;align-content:start;padding-bottom:4px}
  .cards::-webkit-scrollbar{width:3px}.cards::-webkit-scrollbar-track{background:transparent}.cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

  .tcg{
    position:relative;border-radius:6px;overflow:hidden;cursor:pointer;
    background:#111;
    border:2px solid var(--border);
    box-shadow:3px 3px 0 rgba(0,0,0,.8);
    display:flex;flex-direction:column;
    transition:transform .18s,box-shadow .18s,border-color .18s;
    touch-action:manipulation;
  }
  .tcg:hover{transform:translateY(-5px)scale(1.02);border-color:var(--sa,var(--border3));box-shadow:5px 8px 0 rgba(0,0,0,.9),0 0 20px var(--sa3,transparent)}
  .tcg:active{transform:translateY(0)scale(.97)}
  .tcg.sel{border-color:var(--sa,var(--red3));box-shadow:0 0 0 3px var(--sa,var(--red3)),3px 3px 0 rgba(0,0,0,.9)}
  .tcg-band{height:3px;flex-shrink:0;background:linear-gradient(90deg,transparent,var(--sa,#333),var(--sa2,#555),transparent);background-size:250% auto;animation:bandShimmer 3.5s linear infinite}
  .tcg.sel .tcg-band{animation:bandShimmer 1.2s linear infinite}
  .tcg-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 8px 3px;flex-shrink:0;gap:5px;background:#0d0d0d}
  .tcg-type{font-size:.58rem;font-family:var(--fd);letter-spacing:.14em;border:1px solid var(--sa,var(--border2));color:var(--sa2,var(--muted2));background:transparent;border-radius:2px;padding:1px 7px;white-space:nowrap}
  .tcg-icon-sm{font-size:.85rem;line-height:1;flex-shrink:0}
  .tcg-cost-badge{font-size:.65rem;font-family:var(--fd);letter-spacing:.06em;background:var(--gold);color:#0e0800;border-radius:2px;padding:1px 7px}
  .tcg-art{flex:1;margin:0 6px;border-radius:4px;min-height:0;background:#0a0a0a center/cover no-repeat;border:1px solid var(--border);display:grid;place-items:center;font-size:3.2rem;position:relative;overflow:hidden}
  .tcg-art::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.92));pointer-events:none}
  .tcg-buff-ico{flex:1;margin:0 6px;border-radius:4px;min-height:0;background:radial-gradient(ellipse at 50% 55%,var(--sa3,rgba(88,88,232,.15)),transparent 70%);border:1px solid var(--border);display:grid;place-items:center;font-size:3.4rem;position:relative}
  .tcg-plate{padding:4px 8px 3px;flex-shrink:0;border-top:1px solid var(--border)}
  .tcg-name{font-family:var(--fd);font-size:.95rem;letter-spacing:.04em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcg-flavor{font-size:.63rem;color:var(--muted2);line-height:1.2;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--fp)}
  .tcg-stats{display:flex;justify-content:space-around;padding:4px 6px 7px;flex-shrink:0;gap:2px;border-top:1px solid var(--border)}
  .ts{display:flex;flex-direction:column;align-items:center;gap:0;flex:1}
  .ts-l{font-size:.5rem;letter-spacing:.12em;font-family:var(--fd);color:var(--muted)}
  .ts-v{font-size:.92rem;font-family:var(--fd);letter-spacing:.02em;line-height:1.1}
  .tcg-sig{font-size:.56rem;font-family:var(--fd);letter-spacing:.08em;color:var(--gold2);text-align:center;padding:0 6px 5px;border-top:1px solid rgba(220,160,48,.15);padding-top:3px}
  .tcg-chk{position:absolute;top:8px;right:8px;width:20px;height:20px;background:var(--sa,var(--red2));border-radius:2px;display:grid;place-items:center;font-size:.7rem;color:#fff;z-index:4;box-shadow:2px 2px 0 rgba(0,0,0,.6);animation:selPop .18s cubic-bezier(.35,0,.2,1.5) both}

  /* ════════════════════════════
     ARENA LOBBY
  ════════════════════════════ */
  .arena-hd{font-family:var(--fd);letter-spacing:.18em;font-size:.9rem;color:var(--red2);display:flex;align-items:center;gap:8px;padding:2px 0}
  .arena-hd::after{content:'';flex:1;height:2px;background:var(--red)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .choice{
    position:relative;border:2px solid var(--border2);border-radius:4px;overflow:hidden;
    background:var(--bg2);padding:14px 12px;cursor:pointer;
    transition:transform .15s,box-shadow .15s,border-color .15s;touch-action:manipulation;
  }
  .choice::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
  .choice:hover{transform:translateY(-4px);border-color:var(--red2);box-shadow:4px 4px 0 rgba(0,0,0,.8)}
  .choice:active{transform:scale(.97)}
  .choice-ico{font-size:1.6rem;margin-bottom:6px;display:block}
  .choice h3{font-family:var(--fd);letter-spacing:.12em;font-size:1rem;color:var(--text)}
  .choice p{font-size:.7rem;color:var(--muted2);margin-top:3px;line-height:1.35;font-family:var(--fp)}
  .rooms{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;max-height:130px;overflow-y:auto}
  .room{border:2px solid var(--border);border-radius:4px;background:var(--bg2);padding:8px 10px;cursor:pointer;transition:border-color .12s,background .12s;touch-action:manipulation}
  .room:hover{border-color:var(--border2);background:var(--bg3)}
  .room b{font-family:var(--fd);letter-spacing:.12em;font-size:.95rem;color:var(--gold2)}
  .warn{border:2px solid rgba(168,130,40,.35);background:rgba(80,60,10,.12);color:#e8c870;border-radius:4px;padding:8px 10px;font-size:.73rem;font-family:var(--fp)}

  /* ════════════════════════════
     BATTLE LAYOUT
  ════════════════════════════ */
  .battle{
    display:grid;
    grid-template-columns:1fr 80px;
    grid-template-rows:auto 1fr auto 1fr auto;
    overflow:hidden;position:relative;
    background:#0a0a0a;
  }
  /* Manga panel lines */
  .battle::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:
      repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(255,255,255,.012) 2px),
      repeating-linear-gradient(90deg,transparent,transparent 1px,rgba(255,255,255,.006) 2px);
    background-size:100% 4px, 80px 100%;
  }
  .battle::after{
    content:'';position:absolute;left:0;right:0;top:50%;height:2px;
    background:linear-gradient(90deg,transparent 4%,rgba(200,16,46,.15) 15%,rgba(200,16,46,.4) 50%,rgba(200,16,46,.15) 85%,transparent 96%);
    pointer-events:none;z-index:0;
  }

/* ══════════════════════════════════════════
   BATTLE MECHANICS
══════════════════════════════════════════ */
function hpClass(h,m){const p=h/m;return p<.3?"low":p<.58?"mid":""}
function hashRoll(seed){let h=0;for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))%100000;return(Math.sin(h)+1)/2}
function styleBonus(style){if(style==="slugger")return 5;if(style==="speed")return 2;if(style==="balanced")return 1;return 0}
function nextAlive(s){return s.boxers.findIndex(x=>!x.dead)}
function condOk(f,s){if(!f.cond)return true;const a=s.boxers[s.active];if(f.cond==="low")return a.hp<=a.maxHp*.4;return true}

function applyEffect(effect,target,src){
  if(!target.statuses)target.statuses={};
  if(effect==="stun"){target.statuses.stun=1;return"⚡ STUNNED!"}
  if(effect==="bleed"){const dmg=Math.max(8,Math.floor(src.atk*.18));target.statuses.bleed={dmg,turns:2};return`🩸 BLEEDING (${dmg}/turn)`}
  if(effect==="weaken"){target.statuses.weaken={turns:2};return"🛡 WEAKENED!"}
  return null
}

function applyBuff(f,s,opSide){
  const a=s.boxers[s.active];
  if(!a.statuses)a.statuses={};
  if(f.effect==="hp")           a.hp=Math.min(a.maxHp,a.hp+f.val);
  else if(f.effect==="atk")     a.atk+=f.val;
  else if(f.effect==="def")     a.def+=f.val;
  else if(f.effect==="tc")      s.tc=Math.min(10,s.tc+f.val);
  else if(f.effect==="cleanse") a.statuses={};
  else if(f.effect==="cleanse_hp"){a.statuses={};a.hp=Math.min(a.maxHp,a.hp+f.val)}
  else if(f.effect==="atk_risk"){a.atk+=f.val;a.hp=Math.max(1,a.hp-(f.cost_hp||14))}
  else if(f.effect==="hp_pct")  a.hp=Math.min(a.maxHp,a.hp+Math.floor((a.maxHp-a.hp)*(f.val||.5)));
  else if(f.effect==="power_up")a.statuses.power_up={mult:f.mult||1.75};
  else if(f.effect==="multi"){
    a.atk+=(f.extra?.atk||0);a.def+=(f.extra?.def||0);
    if(f.extra?.hp)a.hp=Math.min(a.maxHp,a.hp+(f.extra.hp));
  }
  if(f.special==="cleanse_stun")delete a.statuses.stun;
}

function resolveAttack(state,atk,def,salt,isSpecial){
  const sig=isSpecial?SIGNATURES[atk.id]:null;
  if(!atk.statuses)atk.statuses={};
  if(!def.statuses)def.statuses={};

  if(!isSpecial){
    const dodgeChance=def.style==="speed"?.17:.06;
    if(hashRoll(`${salt}|dodge`)<dodgeChance){
      atk.momentum=Math.min(5,atk.momentum+1);
      return{log:`${def.name} slips the punch!`}
    }
  }

  let dmg=Math.max(8,atk.atk-Math.floor(def.def*.60))+styleBonus(atk.style)+(atk.momentum*2);
  if(sig)dmg=Math.floor(dmg*sig.mult);
  if(atk.statuses.power_up){dmg=Math.floor(dmg*(atk.statuses.power_up.mult||1.75));delete atk.statuses.power_up}
  if(def.statuses.weaken){dmg=Math.floor(dmg*1.32);def.statuses.weaken.turns--;if(def.statuses.weaken.turns<=0)delete def.statuses.weaken}

  let crit=false;
  if(!isSpecial){const critChance=Math.min(.25,.05+atk.momentum*.045);if(hashRoll(`${salt}|crit`)<critChance){dmg=Math.floor(dmg*1.5);crit=true}}

  let counter=0;
  if(def.guard){
    dmg=Math.floor(dmg*.5);
    if(def.style==="counter"){counter=Math.max(8,Math.floor(def.atk*.42));atk.hp=Math.max(0,atk.hp-counter)}
    def.guard=false;
  }

  def.hp=Math.max(0,def.hp-dmg);
  atk.momentum=isSpecial?0:Math.min(5,atk.momentum+1);

  let parts=[];
  if(isSpecial)parts.push(`${sig.icon} ${sig.name}!`);
  const hitter=isSpecial?"Deals":atk.name+" lands";
  parts.push(`${hitter} ${dmg}${crit?" 💥CRIT":""}`);
  if(counter)parts.push(`Counter ${counter}`);
  if(sig?.effect){const fx=applyEffect(sig.effect,def,atk);if(fx)parts.push(fx)}
  return{log:parts.join(" — "),dmg,crit}
}

function endTurn(bb){
  bb.turn=bb.turn==="host"?"guest":"host";
  bb.turnCount++;
  if(bb.state!=="playing")return;
  const incoming=bb[bb.turn];
  const bx=incoming.boxers[incoming.active];
  if(!bx||bx.dead)return;
  if(!bx.statuses)bx.statuses={};
  if(bx.statuses.bleed){
    const dmg=bx.statuses.bleed.dmg;
    bx.hp=Math.max(0,bx.hp-dmg);
    bx.statuses.bleed.turns--;
    if(bx.statuses.bleed.turns<=0)delete bx.statuses.bleed;
    bb.log.push(`🩸 ${bx.name} bleeds for ${dmg}!`);
    if(bx.hp<=0){
      bx.hp=0;bx.dead=true;
      const ni=nextAlive(incoming);
      if(ni<0){bb.state="finished";bb.winner=bb.turn==="host"?"guest":"host"}
      else{incoming.active=ni;bb.log.push(`${bx.name} collapses! ${incoming.boxers[ni].name} steps up!`)}
    }
  }
}

function onlineApplyAction(bb,role,kind,idx){
  const me=bb[role],op=bb[role==="host"?"guest":"host"];
  const myA=me.boxers[me.active],opA=op.boxers[op.active];
  if(!myA.statuses)myA.statuses={};if(!opA.statuses)opA.statuses={};
  const isStunned=!!(myA.statuses.stun&&myA.statuses.stun>0);
  if(isStunned&&kind!=="pass")return null;
  let log=null;
  const res={kind,ko:false,dmg:0,crit:false,isSig:false,dodged:false,heal:false,bleedDmg:0};

  if(kind==="attack"||kind==="special"){
    const isSpecial=kind==="special";
    if(isSpecial){if(myA.momentum<3||me.tc<2)return null;me.tc-=2}
    const r=resolveAttack(bb,myA,opA,`${bb.turnCount}|${myA.iid}|${opA.iid}`,isSpecial);
    log=r.log;res.dmg=r.dmg||0;res.crit=!!r.crit;res.isSig=isSpecial;res.dodged=!!r.dodged;
    if(!isSpecial)me.tc=Math.min(10,me.tc+1);
    if(opA.hp<=0){
      opA.hp=0;opA.dead=true;res.ko=true;log=`🥊 KO! ${opA.name} is down!`;
      const ni=nextAlive(op);
      if(ni<0){bb.state="finished";bb.winner=role}
      else{op.active=ni;log+=` ${op.boxers[ni].name} steps in!`}
    }
  }else if(kind==="switch"){
    if(typeof idx!=="number"||idx===me.active||!me.boxers[idx]||me.boxers[idx].dead||me.tc<1)return null;
    myA.momentum=0;me.active=idx;me.tc-=1;log=`🔄 ${me.boxers[idx].name} tagged in!`
  }else if(kind==="buff"){
    if(typeof idx!=="number"||!me.buffs[idx])return null;
    const f=me.buffs[idx];
    if(f.used||me.tc<f.cost||!condOk(f,me))return null;
    const hpBefore=myA.hp;
    applyBuff(f,me,op);f.used=true;me.tc-=f.cost;res.heal=myA.hp>hpBefore;
    log=`✨ ${myA.name} uses ${f.name}!`
  }else if(kind==="guard"){
    myA.guard=true;myA.momentum=Math.min(5,myA.momentum+1);
    log=`🛡 ${myA.name} raises guard! (+1 MOM)`
  }else if(kind==="pass"){
    if(isStunned){myA.statuses.stun--;if(myA.statuses.stun<=0)delete myA.statuses.stun;log=`💪 ${myA.name} shakes off the stun!`}
    else{me.tc=Math.min(10,me.tc+1);log="⏳ Passed — +1 TC"}
  }

  if(!log)return null;
  bb.log.push(log);
  const prevHp=bb[bb.turn==="host"?"guest":"host"]?.boxers[bb[bb.turn==="host"?"guest":"host"]?.active]?.hp;
  endTurn(bb);
  const afterSide=bb[bb.turn];const afterBx=afterSide?.boxers[afterSide?.active];
  if(afterBx&&afterBx.dead){res.ko=true}
  const incomingSide=bb[bb.turn];const incomingBx=incomingSide?.boxers[incomingSide?.active];
  if(incomingBx&&!incomingBx.dead&&typeof prevHp==="number"){const bleedDmg=prevHp-incomingBx.hp;if(bleedDmg>0)res.bleedDmg=bleedDmg}
  return res
}

  document.getElementById("a-cr").onclick=createRoom;
  document.getElementById("a-jn").onclick=joinByCode;
  app().querySelectorAll("[data-r]").forEach(el=>el.onclick=()=>joinRoom(el.dataset.r));
}

function startAI(){if(!readyDeck())return;const me={b:S.deckBoxers,f:S.deckBuffs},ai=mkAiDeck();S.battle=mkBattle("ai",me,ai,"YOU","CPU");goto("battle")}
async function createRoom(){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const id=rid(),code=rcode(),hostName="Host-"+S.online.uid.slice(-4).toUpperCase();const room={code,status:"open",createdAt:now(),updatedAt:now(),hostUid:S.online.uid,hostName,hostDeck:{b:S.deckBoxers,f:S.deckBuffs},guestUid:null,guestName:null,guestDeck:null,battle:null};try{await roomsRef(id).set(room);S.online.roomId=id;S.online.role="host";watchRoom(id);toast(`Room ${code} created.`)}catch(e){console.error(e);toast(`Create failed: ${e.code||"unknown"}`)}}
async function joinByCode(){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const code=(prompt("Enter room code:")||"").trim().toUpperCase();if(!code)return;try{const s=await roomsRef().orderByChild("code").equalTo(code).get();let id=null;s.forEach(c=>{const v=c.val()||{};if(!id&&v.status==="open")id=c.key});if(!id)return toast("No open room with that code.");await joinRoom(id)}catch(e){console.error(e);toast(`Join failed: ${e.code||"unknown"}`)}}
async function joinRoom(id){if(!readyDeck())return;if(!(await initOnline()))return;await detectNode();const ref=roomsRef(id);try{const tx=await ref.transaction(room=>{if(!room||room.status!=="open"||room.guestUid)return;room.guestUid=S.online.uid;room.guestName="Guest-"+S.online.uid.slice(-4).toUpperCase();room.guestDeck={b:S.deckBoxers,f:S.deckBuffs};room.status="playing";room.battle=mkBattle("online",room.hostDeck,room.guestDeck,room.hostName,room.guestName);room.updatedAt=now();return room},undefined,false);if(!tx.committed)return toast("Room not available.");S.online.roomId=id;S.online.role="guest";watchRoom(id)}catch(e){console.error(e);toast(`Join failed: ${e.code||"unknown"}`)}}
function subscribeRooms(){if(!S.online.db||S.online.listCb)return;const q=roomsRef().orderByChild("status").equalTo("open");const cb=snap=>{const rows=[];snap.forEach(ch=>{const v=ch.val()||{};rows.push({id:ch.key,code:v.code||"-----",hostName:v.hostName||"Host",createdAt:v.createdAt||0})});rows.sort((a,b)=>b.createdAt-a.createdAt);S.roomList=rows.slice(0,40);if(S.view==="arena")renderArena()};q.on("value",cb);S.online.listCb=cb}
function watchRoom(id){if(S.online.roomCb&&S.online.roomId)roomsRef(S.online.roomId).off("value",S.online.roomCb);const cb=snap=>{const room=snap.val();if(!room){toast("Room closed.");S.online.roomId=null;S.online.role=null;goto("arena");return}if(room.battle){S.battle=deep(room.battle);S.battle.mode="online";if(S.view!=="battle")goto("battle");else renderBattle()}};roomsRef(id).on("value",cb);S.online.roomCb=cb;if(S.view!=="battle")goto("battle")}

/* ══════════════════════════════════════════
   FIGHT CARD COMPONENTS
══════════════════════════════════════════ */
function momPips(mom){
  return Array.from({length:5},(_,i)=>{
    let cls="";
    if(i<mom){cls=mom>=5?"max":mom>=3?"rdy":"on"}
    return`<div class="pip ${cls}"></div>`
  }).join("")
}
function statusBadges(st){
  if(!st)return"";
  const b=[];
  if(st.bleed) b.push(`<span class="sbadge sb-bleed">🩸 BLEED ×${st.bleed.turns}</span>`);
  if(st.stun)  b.push(`<span class="sbadge sb-stun">⚡ STUNNED</span>`);
  if(st.weaken)b.push(`<span class="sbadge sb-weaken">🛡 WEAKEN ×${st.weaken.turns}</span>`);
  if(st.power_up) b.push(`<span class="sbadge sb-power">💢 POWERED</span>`);
  return b.join("")
}

function fightCard(bx,cardId){
  const pct=Math.max(0,(bx.hp/bx.maxHp)*100).toFixed(1);
  const hpC=hpClass(bx.hp,bx.maxHp);
  const badges=statusBadges(bx.statuses);
  const idAttr=cardId?`id="${cardId}"` :"";
  const wrapAttr=cardId?`id="${cardId}-wrap"`:"";
  const sig=SIGNATURES[bx.id]||{name:"SPECIAL",icon:"⚡"};
  return`<div class="fight-card-wrap sa-${bx.style}" ${wrapAttr}>
    <div class="fight-card sa-${bx.style}" ${idAttr}>
      <div class="fc-fullart" ${artBg(bx.img)}></div>
      <div class="fc-halftone"></div>
      <div class="fc-overlay"></div>
      <div class="fc-vignette"></div>
      <div class="fc-tint"></div>
      <div class="fc-shimmer"></div>
      <div class="fc-content">
        <div class="fc-band"></div>
        <div class="fc-hdr">
          <div class="fc-hdr-name">${bx.name}</div>
          <div class="fc-type-pill">${bx.style.toUpperCase()}</div>
          ${bx.guard?'<div class="fc-guard-pill">🛡 GUARD</div>':""}
        </div>
        ${bx.img?"":`<div class="fc-art-emoji">${bx.icon}</div>`}
        <div class="fc-art-zone"></div>
        <div class="fc-stats-panel">
          <div class="fc-subtitle">${bx.title} · ${sig.icon} ${sig.name}</div>
          <div class="fc-mom" ${cardId?`id="${cardId}-pips"`:""}>${momPips(bx.momentum||0)}</div>
          <div class="fc-srow">
            <div class="fst"><span class="fst-l">ATK</span><span class="fst-v" style="color:#ffcc60" ${cardId?`id="${cardId}-atk"`:""}>${bx.atk}</span></div>
            <div class="fst"><span class="fst-l">DEF</span><span class="fst-v" style="color:#80ccff" ${cardId?`id="${cardId}-def"`:""}>${bx.def}</span></div>
            <div class="fst"><span class="fst-l">MOM</span><span class="fst-v" ${cardId?`id="${cardId}-mom"`:""} style="color:${bx.momentum>=3?"var(--gold3)":"var(--muted2)"}">${bx.momentum||0}/5</span></div>
          </div>
          <div class="fc-statuses" ${cardId?`id="${cardId}-sts"`:""}>${badges}</div>
        </div>
      </div>
    </div>
    <div class="fc-hp-bar sa-${bx.style}" ${cardId?`id="${cardId}-hpbar"`:""}>

        <span class="hp-name">${bx.name}</span>
        <span class="hp-num ${hpC}" ${cardId?`id="${cardId}-hpnum"`:""}>${bx.hp}<span style="color:var(--muted);font-size:.82em">/${bx.maxHp}</span></span>
      </div>
      <div class="hpb"><div class="hpfill ${hpC}" ${cardId?`id="${cardId}-fill"`:""} style="width:${pct}%"></div></div>

function updateCard(bx,cardId){
  const pct=Math.max(0,(bx.hp/bx.maxHp)*100).toFixed(1);
  const hpC=hpClass(bx.hp,bx.maxHp);
  const fill=document.getElementById(`${cardId}-fill`);
  if(fill){fill.style.width=pct+"%";fill.className="hpfill"+(hpC?" "+hpC:"")}
  const hpn=document.getElementById(`${cardId}-hpnum`);
  if(hpn){hpn.className="hp-num"+(hpC?" "+hpC:"");hpn.innerHTML=`${bx.hp}<span style="color:var(--muted);font-size:.82em">/${bx.maxHp}</span>`}
  const momEl=document.getElementById(`${cardId}-mom`);
  if(momEl){momEl.textContent=`${bx.momentum||0}/5`;momEl.style.color=bx.momentum>=3?"#f8d068":"var(--muted2)"}
  const pipsEl=document.getElementById(`${cardId}-pips`);
  if(pipsEl)pipsEl.innerHTML=momPips(bx.momentum||0);
  const sts=document.getElementById(`${cardId}-sts`);if(sts)sts.innerHTML=statusBadges(bx.statuses);
  const atkEl=document.getElementById(`${cardId}-atk`);if(atkEl)atkEl.textContent=bx.atk;
  const defEl=document.getElementById(`${cardId}-def`);if(defEl)defEl.textContent=bx.def;
  const card=document.getElementById(cardId);
  if(card){
    let gp=card.querySelector(".fc-guard-pill");
    if(bx.guard&&!gp){const hdr=card.querySelector(".fc-hdr");if(hdr){gp=document.createElement("div");gp.className="fc-guard-pill";gp.textContent="🛡 GUARD";hdr.appendChild(gp)}}
    if(!bx.guard&&gp)gp.remove();
  }
}

function replaceCard(bx,cardId){
  const old=document.getElementById(cardId);if(!old)return;
  const wrap=document.getElementById(cardId+"-wrap")||old;
  wrap.style.transition="opacity .28s ease,transform .28s cubic-bezier(.5,0,.5,1),filter .28s ease";
  wrap.style.filter="brightness(3) saturate(0)";wrap.style.transform="scale(.95) translateY(4px)";wrap.style.opacity="0";
  setTimeout(()=>{
    const tmp=document.createElement("div");tmp.innerHTML=fightCard(bx,cardId);
    const newWrap=tmp.firstElementChild;newWrap.style.animation="newBoxerIn .5s cubic-bezier(.3,0,.7,1) both";wrap.replaceWith(newWrap);
  },300);
}

function spawnFloat(cardEl,text,cls){
  if(!cardEl)return;
  const f=document.createElement("div");f.className="dmg-float "+cls;f.textContent=text;
  f.style.left=(28+Math.random()*44)+"%";f.style.top="26%";
  cardEl.style.overflow="visible";cardEl.appendChild(f);
  setTimeout(()=>{f.remove()},1050);
}

function flashCard(cardEl,type){
  if(!cardEl)return;
  const ov=document.createElement("div");ov.className="hit-ov"+(type?" "+type:"");
  cardEl.appendChild(ov);setTimeout(()=>ov.remove(),520);
}

/* ══════════════════════════════════════════
   ANIMATION ENGINE
══════════════════════════════════════════ */
function animateAction(result,isPlayerAction,afterDone){
  const b=S.battle;
  const opCard=document.getElementById("fc-op");
  const myCard=document.getElementById("fc-me");
  const atkCard=isPlayerAction?myCard:opCard;
  const defCard=isPlayerAction?opCard:myCard;
  const ms=t=>new Promise(r=>setTimeout(r,t));
  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";

  async function run(){
    const kind=result?.kind||"pass";
    const isAtk=kind==="attack"||kind==="special";
    if(isAtk&&!result.dodged){
      if(atkCard){atkCard.classList.add(isPlayerAction?"punching-dn":"punching-up");if(result.isSig)atkCard.classList.add("sig-burst")}
      await ms(155);
      if(defCard){
        defCard.classList.add("taking-hit");flashCard(defCard,result.isSig?"gold":"red");
        if(result.isSig){const rip=document.createElement("div");rip.className="sig-ripple";defCard.appendChild(rip);setTimeout(()=>rip.remove(),750)}
        if(result.dmg>0){const cls=result.isSig?"sig":result.crit?"crit":"norm";spawnFloat(defCard,"-"+result.dmg,cls)}
      }
      await ms(88);
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(250);
      if(atkCard)atkCard.classList.remove("punching-dn","punching-up","sig-burst");
      if(defCard)defCard.classList.remove("taking-hit");
      if(result.ko){
        const defId=isPlayerAction?"fc-op":"fc-me";
        const defSide=isPlayerAction?b[opKey]:b[myKey];
        const koCard=document.getElementById(defId);if(koCard)flashCard(koCard,"ko");
        await ms(210);
        replaceCard(defSide.boxers[defSide.active],defId);
        updateCard(b[isPlayerAction?myKey:opKey].boxers[b[isPlayerAction?myKey:opKey].active],isPlayerAction?"fc-me":"fc-op");
      }
    }else if(isAtk&&result.dodged){
      if(defCard)defCard.classList.add("taking-hit");
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(380);if(defCard)defCard.classList.remove("taking-hit");
    }else{
      if(result.heal&&atkCard)flashCard(atkCard,"heal");
      if(result.heal&&atkCard)spawnFloat(atkCard,"+","heal");
      if(result.ko){
        const defId=isPlayerAction?"fc-op":"fc-me";
        const defSide=isPlayerAction?b[opKey]:b[myKey];
        replaceCard(defSide.boxers[defSide.active],defId);
      }else{
        updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
        updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      }
      await ms(270);
    }
    if(result.bleedDmg>0){
      const bleedTarget=isPlayerAction?opCard:myCard;
      spawnFloat(bleedTarget,"🩸 -"+result.bleedDmg,"bleed");
      await ms(65);
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(290);
    }
    const lt=document.querySelector(".log-txt");
    if(lt){lt.classList.remove("slide");void lt.offsetWidth;lt.textContent=b.log[b.log.length-1]||"";lt.classList.add("slide")}
    await ms(105);
    afterDone();
  }
  run().catch(console.error);
}

  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";

  const isStunned=!!(myA?.statuses?.stun&&myA.statuses.stun>0);

        <div class="bar-lbl">${op.label}</div>
        <div style="font-size:.58rem;font-family:var(--fd);color:var(--muted);letter-spacing:.06em">${op.boxers[op.active].name}</div>
      </div>
      <div class="bar-tc">TC ${op.tc}</div>
    </div>

    <div class="logbox">
      <div class="log-inner">
        <div class="${turnClass}">${turnLbl}</div>
        <div class="log-txt">${b.log[b.log.length-1]||""}</div>
      </div>
    </div>
    <div class="card-zone">${fightCard(myA,"fc-me")}</div>
    <div class="ctrl ctrl-in" id="ctrl-root">
      <div class="ctrl-top">
        <div class="ctrl-info">
          <span class="ctrl-lbl">${me.label}</span>
          <span style="font-size:.56rem;font-family:var(--fd);color:var(--muted);letter-spacing:.06em">${myA.name}</span>
          <span class="tc-badge" id="my-tc">TC ${me.tc}</span>
          ${isStunned&&can?'<span class="stun-note">⚡ STUNNED</span>':""}
        </div>
        <div class="slots">${me.boxers.map((x,i)=>`<button class="slot ${x.dead?"dead":""} ${i===me.active?"active-slot":""}" data-sw="${i}" ${(!can||i===me.active||x.dead||isStunned)?"disabled":""}>${x.icon}</button>`).join("")}</div>

        <button class="btn" id="a-pass" ${can?"":"disabled"}>${(isStunned&&can)?"SHAKE OFF":"PASS"}</button>
        <button class="btn btn-p" id="a-hit" ${(can&&!isStunned)?"":"disabled"}>ATTACK</button>
      </div>

      S.online.roomCb=null;S.online.roomId=null;S.online.role=null;S.battle=null;goto("menu")
    };return
  }

  document.getElementById("a-hit")?.addEventListener("click",()=>act("attack"));
  document.getElementById("a-sig")?.addEventListener("click",()=>act("special"));
  document.getElementById("a-guard")?.addEventListener("click",()=>act("guard"));
  document.getElementById("a-pass")?.addEventListener("click",()=>act("pass"));
  app().querySelectorAll("[data-sw]").forEach(el=>el.addEventListener("click",()=>act("switch",+el.dataset.sw)));
  app().querySelectorAll("[data-bf]").forEach(el=>el.addEventListener("click",()=>act("buff",+el.dataset.bf)));

/* ══════════════════════════════════════════
   ACTION ROUTER
══════════════════════════════════════════ */
async function act(kind,idx){
  const b=S.battle;if(!b||b.state!=="playing")return;
  if(b.mode==="ai")return actAI(kind,idx);
  if(!S.online.roomId||S.online.lock)return;
  const role=S.online.role;if(b.turn!==role)return;
  S.online.lock=true;
  try{
    const tx=await roomsRef(S.online.roomId).transaction(room=>{
      if(!room||room.status!=="playing"||!room.battle)return room;
      const bb=room.battle;if(bb.turn!==role||bb.state!=="playing")return room;
      const ok=onlineApplyAction(bb,role,kind,idx);if(!ok)return room;
      if(bb.state==="finished")room.status="finished";
      room.updatedAt=now();return room
    },undefined,false);
    if(!tx.committed)toast("Action rejected.")
  }catch(e){console.error(e);toast(`Sync error: ${e.code||"unknown"}`)}
  finally{S.online.lock=false}
}

function actAI(kind,idx){
  const b=S.battle;if(!b||b.state!=="playing"||b.turn!=="host"||S.animating)return;
  S.animating=true;setCtrlEnabled(false);
  const result=onlineApplyAction(b,"host",kind,idx);
  if(!result){S.animating=false;setCtrlEnabled(true);return}
  animateAction(result,true,()=>{
    S.animating=false;
    if(b.state==="finished"){renderBattle();return}
    setCtrlEnabled(true);refreshTurnUI();
    if(b.state==="playing")setTimeout(doAiTurn,660);
  });
}

function doAiTurn(){
  const b=S.battle;if(!b||b.mode!=="ai"||b.state!=="playing"||b.turn!=="guest"||S.animating)return;
  S.animating=true;setCtrlEnabled(false);
  const ai=b.guest,a=ai.boxers[ai.active];
  if(!a.statuses)a.statuses={};
  let kind="attack",idx=undefined;
  if(a.statuses.stun){kind="pass"}
  else{
    const low=a.hp<=a.maxHp*.38,canSig=a.momentum>=3&&ai.tc>=2;
    const all=ai.buffs.map((f,i)=>({f,i})).filter(x=>!x.f.used&&ai.tc>=x.f.cost&&condOk(x.f,ai));
    const heals=all.filter(x=>["hp","hp_pct","cleanse","cleanse_hp"].includes(x.f.effect));
    const power=all.filter(x=>["atk","power_up","atk_risk"].includes(x.f.effect));
    const roll=Math.random();
    if(canSig&&roll<.52)                    {kind="special"}
    else if(low&&heals.length&&roll<.62)    {kind="buff";idx=heals[Math.floor(Math.random()*heals.length)].i}
    else if(power.length&&roll<.26&&!low)   {kind="buff";idx=power[Math.floor(Math.random()*power.length)].i}
    else if(!a.guard&&a.momentum<3&&roll<.18){kind="guard"}
  }
  const result=onlineApplyAction(b,"guest",kind,idx);
  if(!result){S.animating=false;setCtrlEnabled(true);return}
  animateAction(result,false,()=>{
    S.animating=false;if(b.state==="finished"){renderBattle();return}
    setCtrlEnabled(true);refreshTurnUI();
  });
}

function setCtrlEnabled(on){
  ["a-hit","a-sig","a-guard","a-pass"].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.disabled=on?el.dataset.natural==="true"?false:el.disabled:true;
  });
}

function refreshTurnUI(){
  const b=S.battle;if(!b||b.state!=="playing")return;
  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";
  const me=b[myKey],op=b[opKey];
  const myA=me.boxers[me.active];
  const myTurn=b.mode==="ai"?b.turn==="host":b.turn===myRole;
  const can=b.state==="playing"&&myTurn&&!S.online.lock&&!S.animating;
  const isStunned=!!(myA?.statuses?.stun&&myA.statuses.stun>0);
  const sig=SIGNATURES[myA?.id]||{name:"SPECIAL",icon:"⚡"};
  const canSig=can&&!isStunned&&(myA?.momentum||0)>=3&&me.tc>=2;
  const lt=document.querySelector(".log-txt");
  if(lt){lt.classList.remove("slide");void lt.offsetWidth;lt.textContent=b.log[b.log.length-1]||"";lt.classList.add("slide")}
  const tl=document.querySelector(".turn-lbl");
  if(tl){
    if(!can){tl.textContent="○ OPPONENT TURN";tl.className="turn-lbl"}
    else if(isStunned){tl.textContent="⚡ STUNNED — PASS TO RECOVER";tl.className="turn-lbl stunned-lbl"}
    else{tl.textContent="● YOUR TURN";tl.className="turn-lbl yours"}
  }
  const myTcEl=document.getElementById("my-tc");if(myTcEl)myTcEl.textContent="TC "+me.tc;
  const opTcEl=document.querySelector(".bar-tc");if(opTcEl)opTcEl.textContent="TC "+op.tc;
  const ctrl=document.getElementById("ctrl-root");if(!ctrl)return;
  const actRow=ctrl.querySelector(".act-row");
  if(actRow){
    actRow.innerHTML=
      `<button class="btn" id="a-guard" ${(can&&!isStunned)?"":"disabled"}>🛡 GUARD</button>`+
      `<button class="btn btn-sig ${canSig?"live":""}" id="a-sig" ${canSig?"":"disabled"}>${sig.icon} ${sig.name}</button>`+
      `<button class="btn" id="a-pass" ${can?"":"disabled"}>${(isStunned&&can)?"SHAKE OFF":"PASS"}</button>`+
      `<button class="btn btn-p" id="a-hit" ${(can&&!isStunned)?"":"disabled"}>ATTACK</button>`;
    document.getElementById("a-hit")?.addEventListener("click",()=>act("attack"));
    document.getElementById("a-sig")?.addEventListener("click",()=>act("special"));
    document.getElementById("a-guard")?.addEventListener("click",()=>act("guard"));
    document.getElementById("a-pass")?.addEventListener("click",()=>act("pass"));
  }
  const swRow=ctrl.querySelector(".slots");
  if(swRow){
    swRow.innerHTML=me.boxers.map((x,i)=>`<button class="slot ${x.dead?"dead":""} ${i===me.active?"active-slot":""}" data-sw="${i}" ${(!can||i===me.active||x.dead||isStunned)?"disabled":""}>${x.icon}</button>`).join("");
    ctrl.querySelectorAll("[data-sw]").forEach(el=>el.addEventListener("click",()=>act("switch",+el.dataset.sw)));
  }
  const sidePanel=document.getElementById("buff-side-panel");
  if(sidePanel){
    sidePanel.innerHTML=me.buffs.map((f,i)=>{const u=can&&!f.used&&me.tc>=f.cost&&!isStunned;return`<button class="buff ${u?"":"dis"}" data-bf="${i}" ${u?"":"disabled"}><div class="buff-top"><div class="buff-ico">${f.icon}</div><div class="buff-tc">${f.cost}TC</div></div><div class="buff-nm">${f.name}</div></button>`}).join("");
    sidePanel.querySelectorAll("[data-bf]").forEach(el=>el.addEventListener("click",()=>act("buff",+el.dataset.bf)));
  }
}

load();render();
</script>
</body>
</html>
