<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hajime no Ippo Ring Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
  /* ══════════════════════════════════════
     DESIGN SYSTEM
  ══════════════════════════════════════ */
  :root{
    --bg:#070a10;--bg2:#0d1322;--bg3:#131d34;--bg4:#192440;
    --border:#1c2840;--border2:#2c3c66;--border3:#3e5090;
    --text:#eef2ff;--muted:#4e5f88;--muted2:#8898c0;
    --gold:#c08828;--gold2:#e0ae48;--gold3:#f8d068;
    --red:#b81028;--red2:#d81535;--red3:#ff3355;
    --green:#00c05a;--green2:#00f068;
    --fd:"Bebas Neue",sans-serif;--fb:"Barlow Condensed",sans-serif;
  }
  .sa-balanced{--sa:#3b82f6;--sa2:#93c5fd;--sa3:rgba(59,130,246,.16);--sa4:rgba(59,130,246,.07)}
  .sa-slugger {--sa:#f97316;--sa2:#fdba74;--sa3:rgba(249,115,22,.16);--sa4:rgba(249,115,22,.07)}
  .sa-counter  {--sa:#a855f7;--sa2:#d8b4fe;--sa3:rgba(168,85,247,.16);--sa4:rgba(168,85,247,.07)}
  .sa-tank     {--sa:#10b981;--sa2:#6ee7b7;--sa3:rgba(16,185,129,.16);--sa4:rgba(16,185,129,.07)}
  .sa-speed    {--sa:#eab308;--sa2:#fde68a;--sa3:rgba(234,179,8,.16);--sa4:rgba(234,179,8,.07)}
  .sa-buff     {--sa:#6366f1;--sa2:#a5b4fc;--sa3:rgba(99,102,241,.16);--sa4:rgba(99,102,241,.07)}

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
  body{font-family:var(--fb)}
  #app{width:100vw;height:100dvh;position:relative}

  /* ── Keyframes ── */
  .view{position:absolute;inset:0;display:flex;flex-direction:column;animation:vIn .26s cubic-bezier(.3,0,.7,1) both}
  @keyframes vIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes hpPulse{0%,100%{opacity:1}50%{opacity:.42}}
  @keyframes turnBlink{0%,100%{opacity:1}50%{opacity:.32}}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes bandShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
  @keyframes selPop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
  @keyframes pipPop{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
  @keyframes stunShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  @keyframes logIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  /* ── Battle action animations ── */
  @keyframes fcPunchUp  {0%{transform:translateY(0) scale(1)}30%{transform:translateY(-7px) scale(1.05)}65%{transform:translateY(2px) scale(.97)}100%{transform:translateY(0) scale(1)}}
  @keyframes fcPunchDn  {0%{transform:translateY(0) scale(1)}30%{transform:translateY(7px) scale(1.05)}65%{transform:translateY(-2px) scale(.97)}100%{transform:translateY(0) scale(1)}}
  @keyframes fcHit      {0%{transform:translateX(0)}15%{transform:translateX(-9px)}35%{transform:translateX(9px)}55%{transform:translateX(-5px)}75%{transform:translateX(5px)}100%{transform:translateX(0)}}
  @keyframes hitFlash   {0%,100%{opacity:0}35%{opacity:.6}}
  @keyframes hitGold    {0%,100%{opacity:0}35%{opacity:.75}}
  @keyframes healFlash  {0%,100%{opacity:0}35%{opacity:.4}}
  @keyframes dmgFloat   {0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}18%{opacity:1;transform:translateX(-50%) translateY(-16px) scale(1.12)}80%{opacity:.5;transform:translateX(-50%) translateY(-44px) scale(.88)}100%{opacity:0;transform:translateX(-50%) translateY(-62px) scale(.7)}}
  @keyframes logSlide   {from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
  @keyframes sigBurst   {0%{transform:scale(1)}25%{transform:scale(1.07)}55%{transform:scale(.97)}80%{transform:scale(1.02)}100%{transform:scale(1)}}
  @keyframes ctrlIn     {from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  /* fight-card states */
  .fight-card.punching-up   {animation:fcPunchUp .44s cubic-bezier(.3,0,.7,1) both}
  .fight-card.punching-dn   {animation:fcPunchDn .44s cubic-bezier(.3,0,.7,1) both}
  .fight-card.taking-hit    {animation:fcHit .37s cubic-bezier(.25,.8,.25,1) both}
  .fight-card.sig-burst     {animation:sigBurst .5s cubic-bezier(.3,0,.7,1) both}
  .hit-ov  {position:absolute;inset:0;border-radius:13px;pointer-events:none;z-index:6;background:rgba(239,68,68,.38);animation:hitFlash .4s ease both}
  .hit-ov.gold {background:rgba(248,208,104,.45);animation:hitGold .52s ease both}
  .hit-ov.heal {background:rgba(0,240,104,.28);animation:healFlash .42s ease both}
  .dmg-float{position:absolute;z-index:20;pointer-events:none;font-family:var(--fd);letter-spacing:.04em;text-shadow:0 2px 8px rgba(0,0,0,.8),0 0 18px currentColor;animation:dmgFloat .95s cubic-bezier(.25,.8,.25,1) both;transform:translateX(-50%)}
  .dmg-float.crit {font-size:2.1rem;color:#ff4060}
  .dmg-float.sig  {font-size:1.9rem;color:var(--gold3)}
  .dmg-float.norm {font-size:1.5rem;color:#ff9090}
  .dmg-float.heal {font-size:1.4rem;color:#00f880}
  .dmg-float.bleed{font-size:1.1rem;color:#ff6060}
  .log-txt.slide{animation:logSlide .28s ease both}
  .ctrl.ctrl-in {animation:ctrlIn .32s ease both}

  /* ── Buttons ── */
  .btn{
    border:1px solid var(--border2);background:linear-gradient(180deg,#1c2848,#111930);
    color:var(--text);border-radius:10px;padding:10px 14px;
    font-family:var(--fd);letter-spacing:.1em;cursor:pointer;
    transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;
    touch-action:manipulation;min-height:44px;
    display:inline-flex;align-items:center;justify-content:center;gap:5px;
    user-select:none;-webkit-user-select:none;position:relative;overflow:hidden;font-size:.9rem;
  }
  .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 55%);pointer-events:none}
  .btn:hover{transform:translateY(-2px);border-color:var(--border3);box-shadow:0 5px 18px rgba(0,0,0,.45)}
  .btn:active{transform:translateY(1px) scale(.96)}
  .btn:disabled{opacity:.22;transform:none;cursor:not-allowed;box-shadow:none}
  .btn-p{background:linear-gradient(150deg,#e82040,#b01028);border-color:#ff3755;box-shadow:0 3px 14px rgba(184,16,40,.4)}
  .btn-p:not(:disabled):hover{background:linear-gradient(150deg,#ff3f60,#c81535);box-shadow:0 6px 22px rgba(184,16,40,.6)}
  /* Signature button */
  .btn-sig{background:linear-gradient(150deg,#c89020,#7a5808);border-color:var(--gold3);color:#1a0e00;box-shadow:0 3px 14px rgba(200,144,32,.3)}
  .btn-sig.live{box-shadow:0 0 0 2px var(--gold3),0 4px 18px rgba(200,144,32,.7);animation:turnBlink 1.3s ease-in-out infinite}
  .btn-sig:not(:disabled):hover{background:linear-gradient(150deg,#f0b030,#9a6e10);box-shadow:0 6px 22px rgba(200,144,32,.7)}

  /* ── Toast ── */
  .toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none}
  .toast{background:rgba(8,12,22,.97);border:1px solid var(--border2);border-radius:999px;padding:10px 20px;box-shadow:0 4px 24px rgba(0,0,0,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);animation:vIn .2s ease both;font-size:.87rem;white-space:nowrap}

  /* ══════════════════════════════════════
     MENU
  ══════════════════════════════════════ */
  .menu{
    align-items:center;justify-content:center;text-align:center;gap:22px;padding:28px;
    background:radial-gradient(ellipse 110% 60% at 50% 108%,rgba(184,16,40,.32),transparent 60%),
    radial-gradient(ellipse 70% 50% at 6% 14%,rgba(59,130,246,.09),transparent 55%),
    radial-gradient(ellipse 50% 38% at 94% 16%,rgba(168,85,247,.07),transparent 50%),var(--bg);
  }
  .menu::before{content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(192,136,40,.04) 60px),
    repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(192,136,40,.03) 60px)}
  .menu::after{content:'';position:absolute;inset:18px;pointer-events:none;border:1px solid rgba(192,136,40,.1);border-radius:22px}
  .menu>*{position:relative;z-index:1}
  .menu-logo{display:flex;flex-direction:column;align-items:center;gap:7px}
  .t1,.t3{font-family:var(--fd);font-size:clamp(3rem,12vw,7rem);line-height:.84;letter-spacing:.02em;text-shadow:0 0 60px rgba(184,16,40,.4),0 2px 0 rgba(0,0,0,.9)}
  .t2{font-family:var(--fd);font-size:clamp(2.2rem,9vw,4.8rem);line-height:1;background:linear-gradient(135deg,#ff3055,#b81028);display:inline-block;padding:3px 28px;transform:skewX(-8deg);box-shadow:6px 6px 0 rgba(0,0,0,.65),0 0 55px rgba(184,16,40,.55);position:relative}
  .t2::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 55%);pointer-events:none}
  .t3{font-size:clamp(1.8rem,7vw,4rem);color:var(--muted2)}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .sub{color:var(--muted);font-size:.84rem;letter-spacing:.07em}
  .gold-rule{width:100px;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}

  /* ══════════════════════════════════════
     PANEL
  ══════════════════════════════════════ */
  .panel{margin:10px;border:1px solid var(--border);border-radius:16px;background:linear-gradient(180deg,#0d1628,#080e1e);padding:12px;overflow:hidden;display:flex;flex-direction:column;gap:10px}
  .panel-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .panel-title{font-family:var(--fd);letter-spacing:.13em;font-size:1rem;color:var(--gold2)}
  .tabs{display:flex;gap:8px}
  .tally{display:flex;gap:6px;align-items:center}
  .tally-chip{font-size:.7rem;font-family:var(--fd);letter-spacing:.08em;background:var(--bg3);border:1px solid var(--border2);border-radius:999px;padding:3px 11px;color:var(--muted2)}
  .tally-chip.done{border-color:var(--gold);color:var(--gold2)}

  /* ══════════════════════════════════════
     TCG CARDS (DECK BUILDER)
  ══════════════════════════════════════ */
  .cards{flex:1;overflow-y:auto;overflow-x:hidden;display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));grid-auto-rows:278px;gap:12px;align-content:start;padding-bottom:4px}
  .cards::-webkit-scrollbar{width:4px}.cards::-webkit-scrollbar-track{background:transparent}.cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
  .tcg{position:relative;border-radius:13px;overflow:hidden;cursor:pointer;background:linear-gradient(160deg,rgba(255,255,255,.03) 0,transparent 40%),linear-gradient(165deg,#17223c 0%,#0c1326 55%,#090f1f 100%);border:1px solid var(--border2);box-shadow:0 6px 22px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);display:flex;flex-direction:column;transition:transform .2s cubic-bezier(.25,.8,.25,1),box-shadow .2s,border-color .2s;touch-action:manipulation}
  .tcg:hover{transform:translateY(-6px) scale(1.028);border-color:var(--sa,var(--border3));box-shadow:0 18px 40px rgba(0,0,0,.75),0 0 0 1px var(--sa,var(--border3)),0 0 24px var(--sa3,transparent)}
  .tcg:active{transform:translateY(0) scale(.97)}
  .tcg.sel{border-color:var(--sa,var(--red3));box-shadow:0 0 0 2px var(--sa,var(--red3)),0 10px 30px rgba(0,0,0,.65),0 0 40px var(--sa3,rgba(184,16,40,.2))}
  .tcg-band{height:5px;flex-shrink:0;background:linear-gradient(90deg,var(--sa,#3a4870),transparent 30%,var(--sa2,#6070a8),transparent 70%,var(--sa,#3a4870));background-size:250% auto;animation:bandShimmer 4s linear infinite}
  .tcg.sel .tcg-band{animation:bandShimmer 1.4s linear infinite}
  .tcg-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 8px 3px;flex-shrink:0;gap:5px}
  .tcg-type{font-size:.57rem;font-family:var(--fd);letter-spacing:.13em;border:1px solid var(--sa,var(--border2));color:var(--sa2,var(--muted2));background:var(--sa4,transparent);border-radius:999px;padding:2px 9px;white-space:nowrap}
  .tcg-icon-sm{font-size:.9rem;line-height:1;flex-shrink:0}
  .tcg-cost-badge{font-size:.7rem;font-family:var(--fd);letter-spacing:.05em;background:linear-gradient(135deg,var(--gold2),#7a5c0e);color:#110800;border-radius:999px;padding:2px 9px;font-weight:700}
  .tcg-art{flex:1;margin:0 7px;border-radius:9px;min-height:0;background:#0a1020 center/cover no-repeat;border:1px solid rgba(255,255,255,.07);display:grid;place-items:center;font-size:3.4rem;position:relative;overflow:hidden}
  .tcg-art::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(4,7,16,.85));pointer-events:none}
  .tcg-buff-ico{flex:1;margin:0 7px;border-radius:9px;min-height:0;background:radial-gradient(ellipse at 50% 55%,var(--sa3,rgba(99,102,241,.14)),transparent 72%);border:1px solid rgba(255,255,255,.06);display:grid;place-items:center;font-size:3.6rem;position:relative}
  .tcg-plate{padding:5px 8px 3px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.06)}
  .tcg-name{font-family:var(--fd);font-size:.98rem;letter-spacing:.04em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcg-flavor{font-size:.69rem;color:var(--muted2);line-height:1.25;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcg-stats{display:flex;justify-content:space-around;padding:5px 7px 8px;flex-shrink:0;gap:2px;border-top:1px solid rgba(255,255,255,.05);background:linear-gradient(180deg,transparent,rgba(0,0,0,.4))}
  .ts{display:flex;flex-direction:column;align-items:center;gap:0;flex:1}
  .ts-l{font-size:.55rem;letter-spacing:.1em;font-family:var(--fd);color:var(--muted)}
  .ts-v{font-size:.96rem;font-family:var(--fd);letter-spacing:.02em;line-height:1.1}
  .tcg-sig{font-size:.6rem;font-family:var(--fd);letter-spacing:.07em;color:var(--gold2);text-align:center;padding:0 8px 6px;border-top:1px solid rgba(255,200,50,.08);padding-top:4px}
  .tcg-chk{position:absolute;top:9px;right:9px;width:22px;height:22px;background:var(--sa,var(--red2));border-radius:50%;display:grid;place-items:center;font-size:.75rem;color:#fff;z-index:4;box-shadow:0 2px 8px rgba(0,0,0,.5);animation:selPop .18s cubic-bezier(.35,0,.2,1.5) both}

  /* ══════════════════════════════════════
     ARENA
  ══════════════════════════════════════ */
  .arena-hd{font-family:var(--fd);letter-spacing:.13em;font-size:.88rem;color:var(--gold2);display:flex;align-items:center;gap:8px}
  .arena-hd::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .choice{position:relative;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:linear-gradient(165deg,#162038,#0c1428);padding:15px 13px;cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s;touch-action:manipulation}
  .choice::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#8a6012)}
  .choice:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 10px 28px rgba(0,0,0,.5),0 0 0 1px var(--gold)}
  .choice:active{transform:scale(.97)}
  .choice-ico{font-size:1.8rem;margin-bottom:7px;display:block}
  .choice h3{font-family:var(--fd);letter-spacing:.08em;font-size:1.15rem;color:var(--text)}
  .choice p{font-size:.76rem;color:var(--muted2);margin-top:4px;line-height:1.35}
  .rooms{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:148px;overflow-y:auto}
  .room{border:1px solid var(--border);border-radius:10px;background:var(--bg3);padding:9px 11px;cursor:pointer;transition:border-color .14s,background .14s;touch-action:manipulation}
  .room:hover{border-color:var(--border2);background:var(--bg4)}
  .room b{font-family:var(--fd);letter-spacing:.1em;font-size:1.05rem;color:var(--gold2)}
  .warn{border:1px solid #7a5e20;background:rgba(120,90,28,.15);color:#f0d090;border-radius:10px;padding:9px 12px;font-size:.78rem}

  /* ══════════════════════════════════════
     BATTLE LAYOUT
  ══════════════════════════════════════ */
  .battle{
    display:grid;grid-template-rows:auto 1fr auto 1fr auto;overflow:hidden;
    background:radial-gradient(ellipse 160% 35% at 50% 0%,rgba(184,16,40,.1),transparent 50%),
    radial-gradient(ellipse 160% 35% at 50% 100%,rgba(59,130,246,.06),transparent 50%),var(--bg);
  }

  /* Opponent bar */
  .bar{padding:6px 11px;background:linear-gradient(90deg,#080d1c,#0e1730);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .bar-left{display:flex;align-items:center;gap:8px}
  .bar-lbl{font-family:var(--fd);letter-spacing:.07em;font-size:.88rem}
  .bar-tc{font-family:var(--fd);font-size:.75rem;letter-spacing:.06em;background:linear-gradient(135deg,var(--gold2),#7a5c10);color:#120900;border-radius:999px;padding:2px 10px;font-weight:700}
  .slots{display:flex;gap:5px;align-items:center}
  .slot{width:36px;height:36px;border:1px solid var(--border2);border-radius:9px;background:var(--bg3);display:grid;place-items:center;font-size:1.1rem;transition:all .14s}
  button.slot{cursor:pointer;touch-action:manipulation}
  button.slot:not(:disabled):hover{border-color:var(--gold);background:var(--bg4);transform:scale(1.12)}
  button.slot:not(:disabled):active{transform:scale(.88)}
  .slot.dead{opacity:.16;filter:grayscale(1)}
  .slot.active-slot{border-color:var(--sa,var(--border3));box-shadow:0 0 8px var(--sa3,transparent)}

  /* ══════════════════════════════════════
     FIGHT CARD — REDESIGNED
  ══════════════════════════════════════ */
  .fight-card{
    margin:6px 10px;border-radius:14px;overflow:hidden;
    border:1px solid var(--border2);
    display:flex;flex-direction:column;
    background:linear-gradient(160deg,#14203a,#0c1428);
    box-shadow:0 6px 24px rgba(0,0,0,.55);
    position:relative;
  }
  /* Animated top color band */
  .fc-band{
    height:4px;flex-shrink:0;
    background:linear-gradient(90deg,var(--sa,#3a4870),var(--sa2,#6070a8),var(--sa,#3a4870));
    background-size:200% auto;animation:bandShimmer 3s linear infinite;
  }
  /* Card header row */
  .fc-hdr{
    display:flex;align-items:center;gap:7px;padding:5px 10px 4px;flex-shrink:0;
    background:linear-gradient(90deg,var(--sa4,rgba(0,0,0,.2)),transparent);
    border-bottom:1px solid rgba(255,255,255,.05);
  }
  .fc-hdr-name{font-family:var(--fd);font-size:1.05rem;letter-spacing:.04em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1}
  .fc-style-pill{font-size:.56rem;font-family:var(--fd);letter-spacing:.1em;border:1px solid var(--sa,var(--border2));color:var(--sa2,var(--muted2));background:var(--sa4,transparent);border-radius:999px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
  .fc-guard-pill{font-size:.56rem;font-family:var(--fd);letter-spacing:.07em;background:linear-gradient(135deg,#f59e0b,#c07800);color:#1a0e00;border-radius:999px;padding:2px 8px;flex-shrink:0}
  /* Momentum pips */
  .fc-mom{display:flex;gap:3px;align-items:center;flex-shrink:0;padding:0 2px}
  .pip{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);transition:all .2s}
  .pip.on{background:#3a4f8a;border-color:#5a6fb0}
  .pip.rdy{background:var(--gold2);border-color:var(--gold3);box-shadow:0 0 6px rgba(224,174,72,.65)}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
const app=()=>document.getElementById("app"),deep=x=>JSON.parse(JSON.stringify(x)),now=()=>Date.now(),
  hasCfg=()=>!!(FIREBASE_CONFIG.apiKey&&!FIREBASE_CONFIG.apiKey.startsWith("PASTE_")),

function toast(m){const w=document.getElementById("toast-wrap");w.innerHTML=`<div class="toast">${m}</div>`;clearTimeout(S.toastTmr);S.toastTmr=setTimeout(()=>w.innerHTML="",2800)}
function load(){try{const d=JSON.parse(localStorage.getItem("ring_clash_v2")||"{}");if(Array.isArray(d.b)&&d.b.length)S.deckBoxers=d.b;if(Array.isArray(d.f)&&d.f.length)S.deckBuffs=d.f}catch{}}

async function initOnline(){if(!hasCfg())return false;if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);if(!S.online.db)S.online.db=firebase.database();if(firebase.auth().currentUser){S.online.uid=firebase.auth().currentUser.uid;return true}try{await firebase.auth().signInAnonymously();S.online.uid=firebase.auth().currentUser?.uid||null;return!!S.online.uid}catch(e){console.error(e);toast("Enable Anonymous Auth in Firebase.");return false}}

/* ══════════════════════════════════════════
   BATTLE CONSTRUCTION
══════════════════════════════════════════ */
function mkSide(bids,fids,label){
  return{label,
    boxers:bids.map((id,i)=>{
      const b=BOXERS.find(x=>x.id===id);
      return{...b,maxHp:b.hp,hp:b.hp,dead:false,guard:false,momentum:0,statuses:{},iid:`${label}_${i}`}
    }),
    buffs:fids.map((id,i)=>{const f=BUFFS.find(x=>x.id===id);return{...f,used:false,iid:`${label}_f${i}`}}),
    active:0,tc:2,sigUsed:0
  }
}
function mkAiDeck(){return{b:deep(BOXERS).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.id),f:deep(BUFFS).sort(()=>Math.random()-.5).slice(0,5).map(x=>x.id)}}
function mkBattle(mode,hd,gd,hn,gn){return{mode,state:"playing",turn:"host",turnCount:1,winner:null,log:["🔔 The bell rings!"],host:mkSide(hd.b,hd.f,hn),guest:mkSide(gd.b,gd.f,gn)}}

/* ══════════════════════════════════════════
   BATTLE MECHANICS
══════════════════════════════════════════ */
function hpClass(h,m){const p=h/m;return p<.3?"low":p<.58?"mid":""}
function hashRoll(seed){let h=0;for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))%100000;return(Math.sin(h)+1)/2}
function styleBonus(style){if(style==="slugger")return 6;if(style==="speed")return 2;if(style==="balanced")return 1;return 0}
function nextAlive(s){return s.boxers.findIndex(x=>!x.dead)}
function condOk(f,s){if(!f.cond)return true;const a=s.boxers[s.active];if(f.cond==="low")return a.hp<=a.maxHp*.4;return true}

/* Apply status effect to a target boxer */
function applyEffect(effect,target,src){
  if(!target.statuses)target.statuses={};
  if(effect==="stun"){target.statuses.stun=1;return"⚡ STUNNED!"}
  if(effect==="bleed"){const dmg=Math.max(8,Math.floor(src.atk*.2));target.statuses.bleed={dmg,turns:2};return`🩸 BLEEDING (${dmg}/turn)`}
  if(effect==="weaken"){target.statuses.weaken={turns:2};return"🛡 WEAKENED!"}
  return null
}

/* New applyBuff — handles all effect types */
function applyBuff(f,s,opSide){
  const a=s.boxers[s.active];
  if(!a.statuses)a.statuses={};
  if(f.effect==="hp")          {a.hp=Math.min(a.maxHp,a.hp+f.val)}
  else if(f.effect==="atk")    {a.atk+=f.val}
  else if(f.effect==="def")    {a.def+=f.val}
  else if(f.effect==="tc")     {s.tc=Math.min(10,s.tc+f.val)}
  else if(f.effect==="cleanse"){a.statuses={}}
  else if(f.effect==="cleanse_hp"){a.statuses={};a.hp=Math.min(a.maxHp,a.hp+f.val)}
  else if(f.effect==="atk_risk"){a.atk+=f.val;a.hp=Math.max(1,a.hp-(f.cost_hp||15))}
  else if(f.effect==="hp_pct") {a.hp=Math.min(a.maxHp,a.hp+Math.floor((a.maxHp-a.hp)*(f.val||.5)))}
  else if(f.effect==="power_up"){a.statuses.power_up={mult:f.mult||1.8}}
  else if(f.effect==="multi")  {a.atk+=(f.extra?.atk||0);a.def+=(f.extra?.def||0)}
}

/* Core attack resolver — now supports special moves */
function resolveAttack(state,atk,def,salt,isSpecial){
  const sig=isSpecial?SIGNATURES[atk.id]:null;
  if(!atk.statuses)atk.statuses={};
  if(!def.statuses)def.statuses={};

  // Dodge (only on normal attacks)
  if(!isSpecial){
    const dodgeChance=def.style==="speed"?.18:.06;
    if(hashRoll(`${salt}|dodge`)<dodgeChance){
      atk.momentum=Math.min(5,atk.momentum+1);
      return{log:`${def.name} slips the punch!`}
    }
  }

  // Base damage
  let dmg=Math.max(8,atk.atk-Math.floor(def.def*.62))+styleBonus(atk.style)+(atk.momentum*2);

  // Signature multiplier
  if(sig)dmg=Math.floor(dmg*sig.mult);

  // Power-up buff: multiply then consume
  if(atk.statuses.power_up){
    dmg=Math.floor(dmg*(atk.statuses.power_up.mult||1.8));
    delete atk.statuses.power_up;
  }

  // Weaken debuff: defender takes +35% dmg
  if(def.statuses.weaken){
    dmg=Math.floor(dmg*1.35);
    def.statuses.weaken.turns--;
    if(def.statuses.weaken.turns<=0)delete def.statuses.weaken;
  }

  // Crit (not on specials — they're already powerful)
  let crit=false;
  if(!isSpecial){
    const critChance=Math.min(.26,.05+atk.momentum*.05);
    if(hashRoll(`${salt}|crit`)<critChance){dmg=Math.floor(dmg*1.55);crit=true}
  }

  // Guard reduction + counter-punch
  let counter=0;
  if(def.guard){
    dmg=Math.floor(dmg*.5);
    if(def.style==="counter"){counter=Math.max(8,Math.floor(def.atk*.45));atk.hp=Math.max(0,atk.hp-counter)}
    def.guard=false;
  }

  def.hp=Math.max(0,def.hp-dmg);
  // After special: momentum resets to 0; after normal: +1 (cap 5)
  atk.momentum=isSpecial?0:Math.min(5,atk.momentum+1);

  // Build log string
  let parts=[];
  if(isSpecial)parts.push(`${sig.icon} ${sig.name}!`);
  const hitter=isSpecial?"Deals":atk.name+" lands";
  parts.push(`${hitter} ${dmg}${crit?" 💥CRIT":""}`);
  if(counter)parts.push(`Counter ${counter}`);

  // Apply special effect
  if(sig?.effect){const fx=applyEffect(sig.effect,def,atk);if(fx)parts.push(fx)}

  return{log:parts.join(" — ")}
}

/* endTurn: flips turn AND procs bleed DoT on the incoming player */
function endTurn(bb){
  bb.turn=bb.turn==="host"?"guest":"host";
  bb.turnCount++;
  if(bb.state!=="playing")return;
  const incoming=bb[bb.turn];
  const bx=incoming.boxers[incoming.active];
  if(!bx||bx.dead)return;
  if(!bx.statuses)bx.statuses={};
  if(bx.statuses.bleed){
    const dmg=bx.statuses.bleed.dmg;
    bx.hp=Math.max(0,bx.hp-dmg);
    bx.statuses.bleed.turns--;
    if(bx.statuses.bleed.turns<=0)delete bx.statuses.bleed;
    bb.log.push(`🩸 ${bx.name} bleeds for ${dmg}!`);
    if(bx.hp<=0){
      bx.hp=0;bx.dead=true;
      const ni=nextAlive(incoming);
      if(ni<0){bb.state="finished";bb.winner=bb.turn==="host"?"guest":"host"}
      else{incoming.active=ni;bb.log.push(`${bx.name} collapses! ${incoming.boxers[ni].name} steps up!`)}
    }
  }
}

/* ══════════════════════════════════════════
   CORE ACTION HANDLER
   Supports: attack · special · guard · switch · buff · pass
══════════════════════════════════════════ */
function onlineApplyAction(bb,role,kind,idx){
  const me=bb[role],op=bb[role==="host"?"guest":"host"];
  const myA=me.boxers[me.active],opA=op.boxers[op.active];
  if(!myA.statuses)myA.statuses={};
  if(!opA.statuses)opA.statuses={};

  const isStunned=!!(myA.statuses.stun&&myA.statuses.stun>0);

  // Stun gate: only allow pass when stunned
  if(isStunned&&kind!=="pass")return null;

  let log=null;
  // Rich result object consumed by animateAction
  const res={kind,ko:false,dmg:0,crit:false,isSig:false,dodged:false,heal:false,bleedDmg:0};

  if(kind==="attack"||kind==="special"){
    const isSpecial=kind==="special";
    if(isSpecial){
      if(myA.momentum<3||me.tc<2)return null;
      me.tc-=2;
    }
    const r=resolveAttack(bb,myA,opA,`${bb.turnCount}|${myA.iid}|${opA.iid}`,isSpecial);
    log=r.log;
    res.dmg=r.dmg||0;
    res.crit=!!r.crit;
    res.isSig=isSpecial;
    res.dodged=!!r.dodged;
    if(!isSpecial)me.tc=Math.min(10,me.tc+1);
    if(opA.hp<=0){
      opA.hp=0;opA.dead=true;
      res.ko=true;
      log=`🥊 KO! ${opA.name} is down!`;
      const ni=nextAlive(op);
      if(ni<0){bb.state="finished";bb.winner=role}
      else{op.active=ni;log+=` ${op.boxers[ni].name} steps in!`}
    }
  }else if(kind==="switch"){
    if(typeof idx!=="number"||idx===me.active||!me.boxers[idx]||me.boxers[idx].dead||me.tc<1)return null;
    myA.momentum=0; // momentum lost on tag-out
    me.active=idx;me.tc-=1;
    log=`🔄 ${me.boxers[idx].name} tagged in!`
  }else if(kind==="buff"){
    if(typeof idx!=="number"||!me.buffs[idx])return null;
    const f=me.buffs[idx];
    if(f.used||me.tc<f.cost||!condOk(f,me))return null;
    const hpBefore=myA.hp;
    applyBuff(f,me,op);
    f.used=true;me.tc-=f.cost;
    res.heal=myA.hp>hpBefore;
    log=`✨ ${myA.name} uses ${f.name}!`
  }else if(kind==="guard"){
    myA.guard=true;myA.momentum=Math.min(5,myA.momentum+1);
    log=`🛡 ${myA.name} raises guard! (+1 MOM)`
  }else if(kind==="pass"){
    if(isStunned){
      myA.statuses.stun--;
      if(myA.statuses.stun<=0)delete myA.statuses.stun;
      log=`💪 ${myA.name} shakes off the stun!`
    }else{
      me.tc=Math.min(10,me.tc+1);
      log="⏳ Passed — +1 TC"
    }
  }

  if(!log)return null;
  bb.log.push(log);

  // Capture bleed damage that endTurn may apply, and detect KO from bleed
  const prevHp=bb[bb.turn==="host"?"guest":"host"]?.boxers[bb[bb.turn==="host"?"guest":"host"]?.active]?.hp;
  endTurn(bb);
  const afterSide=bb[bb.turn];
  const afterBx=afterSide?.boxers[afterSide?.active];
  if(afterBx&&afterBx.dead){res.ko=true}
  // Detect bleed DoT damage that occurred during endTurn
  const incomingSide=bb[bb.turn];
  const incomingBx=incomingSide?.boxers[incomingSide?.active];
  if(incomingBx&&!incomingBx.dead&&typeof prevHp==="number"){
    const bleedDmg=prevHp-incomingBx.hp;
    if(bleedDmg>0)res.bleedDmg=bleedDmg;
  }

  return res;
}

function momPips(mom){
  return Array.from({length:5},(_,i)=>{
    let cls="";
    if(i<mom){cls=mom>=5?"max":mom>=3?"rdy":"on"}
    return`<div class="pip ${cls}"></div>`
  }).join("")
}
function statusBadges(st){
  if(!st)return"";
  const b=[];
  if(st.bleed) b.push(`<span class="sbadge sb-bleed">🩸 BLEED ×${st.bleed.turns}</span>`);
  if(st.stun)  b.push(`<span class="sbadge sb-stun">⚡ STUNNED</span>`);
  if(st.weaken)b.push(`<span class="sbadge sb-weaken">🛡 WEAKEN ×${st.weaken.turns}</span>`);
  if(st.power_up) b.push(`<span class="sbadge sb-power">💢 POWERED</span>`);
  return b.join("")
}

function updateCard(bx,cardId){

/* Fully replace a fight card when a KO swaps the active boxer */
function replaceCard(bx,cardId){
  const old=document.getElementById(cardId);
  if(!old)return;
  const tmp=document.createElement("div");
  tmp.innerHTML=fightCard(bx,cardId);
  const newCard=tmp.firstElementChild;
  // Brief fade-in for the new boxer entering
  newCard.style.opacity="0";

/* ══════════════════════════════════════════
   ANIMATION ENGINE — sequences every action visually
══════════════════════════════════════════ */
function animateAction(result,isPlayerAction,afterDone){
  const b=S.battle;
  const opCard=document.getElementById("fc-op");
  const myCard=document.getElementById("fc-me");
  const atkCard=isPlayerAction?myCard:opCard;
  const defCard=isPlayerAction?opCard:myCard;
  const ms=t=>new Promise(r=>setTimeout(r,t));

  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";

  async function run(){
    const kind=result?.kind||"pass";
    const isAtk=kind==="attack"||kind==="special";

    if(isAtk&&!result.dodged){
      // 1 — Attacker bounce
      if(atkCard){
        atkCard.classList.add(isPlayerAction?"punching-dn":"punching-up");
        if(result.isSig)atkCard.classList.add("sig-burst");
      }
      await ms(160);

      // 2 — Defender shakes + flash + float
      if(defCard){
        defCard.classList.add("taking-hit");
        flashCard(defCard,result.isSig?"gold":"");
        if(result.dmg>0){
          const cls=result.isSig?"sig":result.crit?"crit":"norm";
          spawnFloat(defCard,"-"+result.dmg,cls);
        }
      }

      // 3 — HP bar update (CSS handles smooth slide)
      await ms(90);
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(260);
      if(atkCard)atkCard.classList.remove("punching-dn","punching-up","sig-burst");
      if(defCard)defCard.classList.remove("taking-hit");

      // If a KO happened the active boxer changed — replace the whole card
      if(result.ko){
        const defId=isPlayerAction?"fc-op":"fc-me";
        const defSide=isPlayerAction?b[opKey]:b[myKey];
        await ms(120);
        replaceCard(defSide.boxers[defSide.active],defId);
        // Also update the attacker card (momentum reset etc.)
        updateCard(b[isPlayerAction?myKey:opKey].boxers[b[isPlayerAction?myKey:opKey].active],
                   isPlayerAction?"fc-me":"fc-op");
      }

    }else if(isAtk&&result.dodged){
      if(defCard)defCard.classList.add("taking-hit");
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(400);
      if(defCard)defCard.classList.remove("taking-hit");

    }else{
      // Buff / guard / pass / switch — also handle switch KO (switch to new boxer)
      if(result.heal&&atkCard)flashCard(atkCard,"heal");
      if(result.heal&&atkCard)spawnFloat(atkCard,"+","heal");
      if(result.ko){
        // KO from bleed etc.
        const defId=isPlayerAction?"fc-op":"fc-me";
        const defSide=isPlayerAction?b[opKey]:b[myKey];
        replaceCard(defSide.boxers[defSide.active],defId);
      } else {
        updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
        updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      }
      await ms(280);
    }

    // 4 — Bleed DoT float
    if(result.bleedDmg>0){
      const bleedTarget=isPlayerAction?opCard:myCard;
      spawnFloat(bleedTarget,"🩸 -"+result.bleedDmg,"bleed");
      await ms(70);
      updateCard(b[opKey].boxers[b[opKey].active],"fc-op");
      updateCard(b[myKey].boxers[b[myKey].active],"fc-me");
      await ms(300);
    }

    // 5 — Slide log
    const lt=document.querySelector(".log-txt");
    if(lt){lt.classList.remove("slide");void lt.offsetWidth;lt.textContent=b.log[b.log.length-1]||"";lt.classList.add("slide")}
    await ms(110);

    afterDone();
  }
  run().catch(console.error);
}


/* ══════════════════════════════════════════
   RENDER BATTLE
══════════════════════════════════════════ */
function renderBattle(){
  const b=S.battle;
  if(!b)return goto("menu");
  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";
  const me=b[myKey],op=b[opKey];
  const myTurn=b.mode==="ai"?b.turn==="host":b.turn===myRole;
  const can=b.state==="playing"&&myTurn&&!S.online.lock;
  const myA=me.boxers[me.active];
  const isStunned=!!(myA?.statuses?.stun&&myA.statuses.stun>0);
  const sig=SIGNATURES[myA?.id]||{name:"SPECIAL",icon:"⚡"};
  const canSig=can&&!isStunned&&(myA?.momentum||0)>=3&&me.tc>=2;
  const isWin=(b.mode==="ai"&&b.winner==="host")||(b.mode==="online"&&b.winner===myRole);

  // Turn label
  let turnLbl,turnClass="turn-lbl";
  if(!can){turnLbl="○ OPPONENT TURN"}
  else if(isStunned){turnLbl="⚡ STUNNED — PASS TO RECOVER";turnClass="turn-lbl stunned-lbl"}
  else{turnLbl="● YOUR TURN";turnClass="turn-lbl yours"}

  app().innerHTML=`<div class="view battle">
    <!-- Opponent bar -->
    <div class="bar">
      <div class="bar-left">
        <div class="slots">${op.boxers.map((x,i)=>`<div class="slot ${x.dead?"dead":""} ${i===op.active?"active-slot":""}">${x.icon}</div>`).join("")}</div>
        <div class="bar-lbl">${op.label}</div>
      </div>
      <div class="bar-tc">TC ${op.tc}</div>
    </div>

    <!-- Opponent fight card -->
    ${fightCard(op.boxers[op.active],"fc-op")}

    <!-- Battle log -->
    <div class="logbox">
      <div class="log-inner">
        <div class="${turnClass}">${turnLbl}</div>
        <div class="log-txt">${b.log[b.log.length-1]||""}</div>
      </div>
    </div>

    <!-- My fight card -->
    ${fightCard(myA,"fc-me")}

    <!-- Controls -->
    <div class="ctrl ctrl-in" id="ctrl-root">
      <div class="ctrl-top">
        <div class="ctrl-info">
          <span class="ctrl-lbl">${me.label}</span>
          <span class="tc-badge" id="my-tc">TC ${me.tc}</span>
          ${isStunned&&can?'<span class="stun-note">⚡ STUNNED</span>':""}
        </div>
        <div class="slots">${me.boxers.map((x,i)=>`<button class="slot ${x.dead?"dead":""} ${i===me.active?"active-slot":""}" data-sw="${i}" ${(!can||i===me.active||x.dead||isStunned)?"disabled":""}>${x.icon}</button>`).join("")}</div>
      </div>
      <div class="act-row">
        <button class="btn" id="a-guard" ${(can&&!isStunned)?"":"disabled"}>GUARD</button>
        <button class="btn btn-sig ${canSig?"live":""}" id="a-sig" ${canSig?"":"disabled"}>${sig.icon} ${sig.name}</button>
        <button class="btn" id="a-pass" ${can?"":"disabled"}>${(isStunned&&can)?"SHAKE OFF":"PASS"}</button>
        <button class="btn btn-p" id="a-hit" ${(can&&!isStunned)?"":"disabled"}>ATTACK</button>
      </div>
      <div class="buffs">${me.buffs.map((f,i)=>{
        const u=can&&!f.used&&me.tc>=f.cost&&!isStunned;
        return`<button class="buff ${u?"":"dis"}" data-bf="${i}" ${u?"":"disabled"}>
          <div class="buff-top"><div class="buff-ico">${f.icon}</div><div class="buff-tc">${f.cost}TC</div></div>
          <div class="buff-nm">${f.name}</div>
          <div class="buff-dc">${f.desc}</div>
        </button>`
      }).join("")}</div>
    </div>

    <!-- Victory/Defeat overlay -->
    ${b.state==="finished"?`<div class="ov"><div class="ov-box">
      <div class="ov-result ${isWin?"win":"lose"}">${isWin?"VICTORY":"DEFEAT"}</div>
      <div class="ov-rule"></div>
      <div class="ov-sub">${isWin?"THE CROWD GOES WILD":"THE BELL HAS RUNG"}</div>
      <div class="ov-stats">
        <div class="ov-stat"><b>Turn ${b.turnCount}</b><span>turns fought</span></div>
      </div>
      <button class="btn btn-p" id="b-ex" style="font-size:1.1rem;padding:13px 32px">RETURN TO MENU</button>
    </div></div>`:""}
  </div>`;

  if(b.state==="finished"){
    document.getElementById("b-ex").onclick=()=>{
      if(S.online.roomCb&&S.online.roomId)roomsRef(S.online.roomId).off("value",S.online.roomCb);
      S.online.roomCb=null;S.online.roomId=null;S.online.role=null;S.battle=null;goto("menu")
    };return
  }

  document.getElementById("a-hit")?.addEventListener("click",()=>act("attack"));
  document.getElementById("a-sig")?.addEventListener("click",()=>act("special"));
  document.getElementById("a-guard")?.addEventListener("click",()=>act("guard"));
  document.getElementById("a-pass")?.addEventListener("click",()=>act("pass"));
  app().querySelectorAll("[data-sw]").forEach(el=>el.addEventListener("click",()=>act("switch",+el.dataset.sw)));
  app().querySelectorAll("[data-bf]").forEach(el=>el.addEventListener("click",()=>act("buff",+el.dataset.bf)));
}

/* ══════════════════════════════════════════
   ACT — routes to AI or online
══════════════════════════════════════════ */
async function act(kind,idx){
  const b=S.battle;if(!b||b.state!=="playing")return;
  if(b.mode==="ai")return actAI(kind,idx);
  if(!S.online.roomId||S.online.lock)return;
  const role=S.online.role;if(b.turn!==role)return;
  S.online.lock=true;
  try{
    const tx=await roomsRef(S.online.roomId).transaction(room=>{
      if(!room||room.status!=="playing"||!room.battle)return room;
      const bb=room.battle;if(bb.turn!==role||bb.state!=="playing")return room;
      const ok=onlineApplyAction(bb,role,kind,idx);if(!ok)return room;
      if(bb.state==="finished")room.status="finished";
      room.updatedAt=now();return room
    },undefined,false);
    if(!tx.committed)toast("Action rejected.")
  }catch(e){console.error(e);toast(`Sync error: ${e.code||"unknown"}`)}
  finally{S.online.lock=false}
}

function actAI(kind,idx){
  const b=S.battle;
  if(!b||b.state!=="playing"||b.turn!=="host"||S.animating)return;
  S.animating=true;
  setCtrlEnabled(false);
  const result=onlineApplyAction(b,"host",kind,idx);
  if(!result){S.animating=false;setCtrlEnabled(true);return}
  animateAction(result,true,()=>{
    S.animating=false;
    if(b.state==="finished"){renderBattle();return}
    setCtrlEnabled(true);
    refreshTurnUI();
    if(b.state==="playing")setTimeout(doAiTurn,680);
  });
}

function doAiTurn(){
  const b=S.battle;
  if(!b||b.mode!=="ai"||b.state!=="playing"||b.turn!=="guest"||S.animating)return;
  S.animating=true;setCtrlEnabled(false);
  const ai=b.guest,a=ai.boxers[ai.active];
  if(!a.statuses)a.statuses={};
  let kind="attack",idx=undefined;
  if(a.statuses.stun){kind="pass"}
  else{
    const low=a.hp<=a.maxHp*.38,canSig=a.momentum>=3&&ai.tc>=2;
    const all=ai.buffs.map((f,i)=>({f,i})).filter(x=>!x.f.used&&ai.tc>=x.f.cost&&condOk(x.f,ai));
    const heals=all.filter(x=>["hp","hp_pct","cleanse","cleanse_hp"].includes(x.f.effect));
    const power=all.filter(x=>["atk","power_up","atk_risk"].includes(x.f.effect));
    const roll=Math.random();
    if(canSig&&roll<.52)                    {kind="special"}
    else if(low&&heals.length&&roll<.62)    {kind="buff";idx=heals[Math.floor(Math.random()*heals.length)].i}
    else if(power.length&&roll<.26&&!low)   {kind="buff";idx=power[Math.floor(Math.random()*power.length)].i}
    else if(!a.guard&&a.momentum<3&&roll<.18){kind="guard"}
  }
  const result=onlineApplyAction(b,"guest",kind,idx);
  if(!result){S.animating=false;setCtrlEnabled(true);return}
  animateAction(result,false,()=>{
    S.animating=false;
    if(b.state==="finished"){renderBattle();return}
    setCtrlEnabled(true);
    refreshTurnUI();
  });
}

function setCtrlEnabled(on){
  ["a-hit","a-sig","a-guard","a-pass"].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.disabled=on?el.dataset.natural==="true"?false:el.disabled:true;
  });
}

function refreshTurnUI(){
  const b=S.battle;if(!b||b.state!=="playing")return;
  const myRole=b.mode==="online"?S.online.role:"host";
  const myKey=myRole==="guest"?"guest":"host",opKey=myKey==="host"?"guest":"host";
  const me=b[myKey],op=b[opKey];
  const myA=me.boxers[me.active];
  const myTurn=b.mode==="ai"?b.turn==="host":b.turn===myRole;
  const can=b.state==="playing"&&myTurn&&!S.online.lock&&!S.animating;
  const isStunned=!!(myA?.statuses?.stun&&myA.statuses.stun>0);
  const sig=SIGNATURES[myA?.id]||{name:"SPECIAL",icon:"⚡"};
  const canSig=can&&!isStunned&&(myA?.momentum||0)>=3&&me.tc>=2;
  // Log
  const lt=document.querySelector(".log-txt");
  if(lt){lt.classList.remove("slide");void lt.offsetWidth;lt.textContent=b.log[b.log.length-1]||"";lt.classList.add("slide")}
  // Turn label
  const tl=document.querySelector(".turn-lbl");
  if(tl){
    if(!can){tl.textContent="○ OPPONENT TURN";tl.className="turn-lbl"}
    else if(isStunned){tl.textContent="⚡ STUNNED — PASS TO RECOVER";tl.className="turn-lbl stunned-lbl"}
    else{tl.textContent="● YOUR TURN";tl.className="turn-lbl yours"}
  }
  // TC
  const myTcEl=document.getElementById("my-tc");if(myTcEl)myTcEl.textContent="TC "+me.tc;
  const opTcEl=document.querySelector(".bar-tc");if(opTcEl)opTcEl.textContent="TC "+op.tc;
  // Rebuild ctrl
  const ctrl=document.getElementById("ctrl-root");if(!ctrl)return;
  const actRow=ctrl.querySelector(".act-row");
  if(actRow){
    actRow.innerHTML=
      `<button class="btn" id="a-guard" ${(can&&!isStunned)?"":"disabled"}>🛡 GUARD</button>`+
      `<button class="btn btn-sig ${canSig?"live":""}" id="a-sig" ${canSig?"":"disabled"}>${sig.icon} ${sig.name}</button>`+
      `<button class="btn" id="a-pass" ${can?"":"disabled"}>${(isStunned&&can)?"SHAKE OFF":"PASS"}</button>`+
      `<button class="btn btn-p" id="a-hit" ${(can&&!isStunned)?"":"disabled"}>ATTACK</button>`;
    document.getElementById("a-hit")?.addEventListener("click",()=>act("attack"));
    document.getElementById("a-sig")?.addEventListener("click",()=>act("special"));
    document.getElementById("a-guard")?.addEventListener("click",()=>act("guard"));
    document.getElementById("a-pass")?.addEventListener("click",()=>act("pass"));
  }
  const swRow=ctrl.querySelector(".slots");
  if(swRow){
    swRow.innerHTML=me.boxers.map((x,i)=>`<button class="slot ${x.dead?"dead":""} ${i===me.active?"active-slot":""}" data-sw="${i}" ${(!can||i===me.active||x.dead||isStunned)?"disabled":""}>${x.icon}</button>`).join("");
    ctrl.querySelectorAll("[data-sw]").forEach(el=>el.addEventListener("click",()=>act("switch",+el.dataset.sw)));
  }
  const bufRow=ctrl.querySelector(".buffs");
  if(bufRow){
    bufRow.innerHTML=me.buffs.map((f,i)=>{const u=can&&!f.used&&me.tc>=f.cost&&!isStunned;return`<button class="buff ${u?"":"dis"}" data-bf="${i}" ${u?"":"disabled"}><div class="buff-top"><div class="buff-ico">${f.icon}</div><div class="buff-tc">${f.cost}TC</div></div><div class="buff-nm">${f.name}</div><div class="buff-dc">${f.desc}</div></button>`}).join("");
    ctrl.querySelectorAll("[data-bf]").forEach(el=>el.addEventListener("click",()=>act("buff",+el.dataset.bf)));
  }
}


    load();render();
  </script>
